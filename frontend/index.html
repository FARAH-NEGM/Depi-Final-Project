<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cyber Control Tower — SOC Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ================================================================
   CYBER CONTROL TOWER — Design System
   ────────────────────────────────────────────────────────────────
   Dark ops-room aesthetic. IBM Plex Mono for data/labels, Inter for
   UI copy. Amber is the single brand signal; cyan is the secondary
   data accent; severity colors are semantic, not decorative.
   ================================================================ */

:root {
  --bg-base:   #090C13;
  --bg-panel:  #0D1119;
  --bg-raised: #131A24;
  --border:         #1B2332;
  --border-accent:  rgba(245,166,35,0.22);
  --border-cyan:    rgba(34,211,238,0.18);
  --text-main:  #E2E8EE;
  --text-dim:   #67778A;
  --text-faint: #3D4A58;
  --accent:       #F5A623;
  --accent-hover: #FFBE45;
  --accent-glow:  rgba(245,166,35,0.13);
  --cyan:       #22D3EE;
  --cyan-glow:  rgba(34,211,238,0.10);
  --sev-critical: #E5484D;
  --sev-crit-bg:  rgba(229,72,77,0.11);
  --sev-crit-bd:  rgba(229,72,77,0.25);
  --sev-high:     #F5A623;
  --sev-high-bg:  rgba(245,166,35,0.11);
  --sev-high-bd:  rgba(245,166,35,0.25);
  --sev-medium:   #E8C547;
  --sev-med-bg:   rgba(232,197,71,0.11);
  --sev-med-bd:   rgba(232,197,71,0.25);
  --sev-low:      #3FB68B;
  --sev-low-bg:   rgba(63,182,139,0.11);
  --sev-low-bd:   rgba(63,182,139,0.25);
  --font-ui:   'Inter', system-ui, sans-serif;
  --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
  --r:    8px;
  --r-lg: 12px;
  --r-xl: 16px;
  --r-pill: 999px;
}

*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  background: var(--bg-base);
  color: var(--text-main);
  font-family: var(--font-ui);
}

body::before {
  content: "";
  position: fixed; inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,0.013) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.013) 1px, transparent 1px);
  background-size: 32px 32px;
  z-index: 0;
}

body::after {
  content: "";
  position: fixed; inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 14% 0%, rgba(245,166,35,0.05), transparent 38%),
    radial-gradient(circle at 87% 6%, rgba(34,211,238,0.05), transparent 34%);
  z-index: 0;
}

button, input, select { font: inherit; }
::selection { background: var(--accent); color: #0A0900; }
a { color: var(--accent); text-decoration: none; }

/* ═══════════════════════════════════════
   LOGIN SCREEN
═══════════════════════════════════════ */
.login-shell {
  min-height: 100vh;
  display: grid; place-items: center;
  position: relative; z-index: 1;
  padding: 24px;
}

.login-card {
  width: 100%; max-width: 428px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 28px;
}

.login-brand {
  display: flex; align-items: center; gap: 11px;
  margin-bottom: 4px;
}

.login-brand .logo {
  width: 34px; height: 34px;
  border-radius: var(--r);
  display: grid; place-items: center;
  font-size: 16px;
  color: var(--bg-base);
  background: var(--accent);
  box-shadow: 0 0 22px var(--accent-glow);
  flex-shrink: 0;
}

.login-brand h1 {
  margin: 0;
  font-size: 14px; font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: 0.07em;
  text-transform: uppercase;
}

.login-card > p.subtitle {
  margin: 14px 0 22px;
  color: var(--text-dim);
  font-size: 13px;
}

.field { margin-bottom: 14px; }

.field label {
  display: block;
  color: var(--text-dim);
  font-size: 10px; font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 6px;
}

.field input {
  width: 100%;
  border: 1px solid var(--border);
  color: var(--text-main);
  background: var(--bg-raised);
  border-radius: var(--r);
  outline: none;
  padding: 11px 12px; font-size: 14px;
  transition: border-color 0.15s;
}

.field input:focus { border-color: var(--accent); }

.login-error {
  margin-bottom: 14px;
  padding: 10px 12px;
  border-radius: var(--r);
  background: var(--sev-crit-bg);
  border: 1px solid var(--sev-crit-bd);
  color: var(--sev-critical);
  font-size: 12px; font-family: var(--font-mono);
}

.login-submit {
  width: 100%;
  border: 0; border-radius: var(--r);
  padding: 12px 13px;
  cursor: pointer; font-weight: 700; font-size: 14px;
  background: var(--accent);
  color: #0A0900;
  transition: all 0.15s ease;
}

.login-submit:hover:not(:disabled) {
  background: var(--accent-hover);
  box-shadow: 0 0 22px var(--accent-glow);
}

.login-submit:disabled { opacity: 0.6; cursor: default; }

.login-divider {
  margin: 22px 0 16px;
  border-top: 1px solid var(--border);
  position: relative;
}

.demo-label {
  color: var(--text-faint);
  font-size: 9px; font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: 0.13em; text-transform: uppercase;
  margin-bottom: 11px;
}

.demo-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
  padding: 10px 0;
}

.demo-row + .demo-row { border-top: 1px solid var(--border); }

.demo-row-id b {
  display: block; color: var(--text-main); font-size: 13px;
}

.demo-row-id code {
  display: block; margin-top: 2px;
  color: var(--accent); font-family: var(--font-mono); font-size: 11px;
}

.demo-use-btn {
  border: 1px solid var(--border);
  background: var(--bg-raised);
  color: var(--text-main);
  border-radius: var(--r);
  padding: 7px 12px;
  font-size: 12px; font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}

.demo-use-btn:hover { border-color: var(--accent); color: var(--accent); }

.login-back {
  display: block; text-align: center;
  margin-top: 18px;
  color: var(--text-dim);
  font-size: 12px;
}

.login-back:hover { color: var(--text-main); }

/* ═══════════════════════════════════════
   APP SHELL
═══════════════════════════════════════ */
.cct-app {
  min-height: 100vh;
  display: flex;
  position: relative;
  z-index: 1;
}

/* ═══════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════ */
.sidebar {
  width: 248px;
  min-height: 100vh;
  position: sticky;
  top: 0; height: 100vh;
  padding: 16px 11px 16px 12px;
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  flex-shrink: 0;
  transition: transform 0.2s ease;
}

/* Hamburger button that opens the sidebar on narrow viewports.
   Hidden by default; only shown under the 1180px breakpoint below. */
.sidebar-menu-btn {
  display: none;
  position: fixed;
  top: 14px; left: 14px;
  z-index: 40;
  width: 40px; height: 40px;
  border-radius: var(--r);
  border: 1px solid var(--border);
  background: var(--bg-panel);
  cursor: pointer;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.sidebar-menu-btn span {
  display: block;
  width: 18px; height: 2px;
  background: var(--text-main);
  border-radius: 2px;
}

.sidebar-close-btn {
  display: none;
  margin-left: auto;
  background: transparent;
  border: none;
  color: var(--text-dim);
  font-size: 16px;
  cursor: pointer;
  padding: 4px 6px;
}

/* Dark overlay behind the sidebar when it's open as a drawer on
   narrow viewports. Hidden on desktop; toggled via .is-visible. */
.sidebar-backdrop {
  display: none;
}

.brand {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 11px 12px;
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  background: rgba(255,255,255,0.018);
  text-decoration: none;
}

.logo {
  width: 40px; height: 40px;
  border-radius: var(--r);
  display: grid; place-items: center;
  font-size: 19px;
  color: var(--bg-base);
  background: var(--accent);
  box-shadow: 0 0 22px var(--accent-glow);
  flex-shrink: 0;
}

.brand h1 {
  margin: 0;
  font-size: 13px; font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: 0.07em;
  color: var(--text-main);
  text-transform: uppercase;
}

.brand p {
  margin: 2px 0 0;
  color: var(--text-dim);
  font-size: 10px;
  font-family: var(--font-mono);
}

.user-card {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
  margin-top: 10px;
  padding: 10px 11px;
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  background: var(--bg-raised);
}

.user-card-id b {
  display: block; color: var(--text-main); font-size: 12px;
}

.user-card-id span {
  display: block; margin-top: 2px;
  color: var(--accent); font-size: 10px;
  font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.06em;
}

.logout-btn {
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  border-radius: var(--r);
  padding: 6px 9px;
  font-size: 11px; font-weight: 600;
  cursor: pointer;
  flex-shrink: 0;
}

.logout-btn:hover { color: var(--sev-critical); border-color: var(--sev-crit-bd); background: var(--sev-crit-bg); }

nav {
  margin-top: 16px;
  display: flex; flex-direction: column;
  gap: 2px;
}

.nav-section-label {
  margin: 14px 0 4px 11px;
  color: var(--text-faint);
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.13em; text-transform: uppercase;
  font-family: var(--font-mono);
}

nav button {
  width: 100%;
  padding: 9px 11px;
  border: 0;
  border-radius: var(--r);
  color: var(--text-dim);
  background: transparent;
  text-align: left;
  cursor: pointer;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px; font-weight: 500;
  transition: all 0.15s ease;
  position: relative;
  gap: 8px;
}

nav button:hover { background: var(--bg-raised); color: var(--text-main); }
nav button:focus { outline: none; }
nav button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

.nav-active {
  background: var(--accent-glow) !important;
  color: var(--accent) !important;
  font-weight: 600 !important;
}

.nav-active::before {
  content: '';
  position: absolute; left: 0; top: 5px; bottom: 5px;
  width: 3px;
  background: var(--accent);
  border-radius: var(--r-pill);
}

nav button span.badge {
  background: var(--sev-crit-bg);
  color: var(--sev-critical);
  border: 1px solid var(--sev-crit-bd);
  padding: 2px 7px;
  border-radius: var(--r-pill);
  font-size: 10px;
  font-family: var(--font-mono);
  font-weight: 700;
  flex-shrink: 0;
}

nav button .nav-label { display: flex; align-items: center; gap: 7px; overflow: hidden; }
nav button .nav-lock { color: var(--text-faint); font-size: 11px; flex-shrink: 0; }

.sidebar-note {
  margin-top: auto;
  padding: 13px;
  border-radius: var(--r-lg);
  border: 1px solid var(--border-accent);
  background: var(--accent-glow);
}

.sidebar-note b {
  color: var(--accent);
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  display: block; margin-bottom: 6px;
  font-family: var(--font-mono);
}

.sidebar-note p {
  color: var(--text-dim);
  line-height: 1.6; font-size: 12px;
  margin: 0;
}

/* ═══════════════════════════════════════
   MAIN CONTENT
═══════════════════════════════════════ */
.main {
  flex: 1; min-width: 0;
  padding: 20px 22px;
  overflow-y: auto;
}

/* ═══════════════════════════════════════
   TOPBAR
═══════════════════════════════════════ */
.topbar {
  display: flex;
  justify-content: space-between;
  gap: 20px; align-items: center;
  margin-bottom: 18px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--border);
}

.topbar h1 {
  margin: 0;
  color: var(--text-main);
  font-size: 24px; letter-spacing: -0.04em; font-weight: 800;
}

.topbar p { margin: 5px 0 0; color: var(--text-dim); font-size: 13px; }

.top-actions {
  display: flex; align-items: center;
  gap: 8px; flex-wrap: wrap;
  justify-content: flex-end;
}

.top-actions > span {
  color: var(--text-dim);
  font-family: var(--font-mono); font-size: 11px;
  padding: 8px 10px;
  border-radius: var(--r);
  background: var(--bg-raised);
  border: 1px solid var(--border);
}

.live-clock {
  color: var(--accent) !important;
  background: var(--accent-glow) !important;
  border: 1px solid var(--border-accent) !important;
  letter-spacing: 0.08em !important;
  font-weight: 500 !important;
}

/* ═══════════════════════════════════════
   BUTTONS
═══════════════════════════════════════ */
.primary-btn, .ghost-btn {
  border: 0; border-radius: var(--r);
  padding: 9px 13px;
  cursor: pointer; font-weight: 600; font-size: 13px;
  transition: all 0.15s ease;
  white-space: nowrap;
}

.primary-btn {
  background: var(--accent);
  color: #0A0900; font-weight: 700;
}

.primary-btn:hover:not(:disabled) {
  background: var(--accent-hover);
  box-shadow: 0 0 22px var(--accent-glow);
}

.primary-btn:disabled { opacity: 0.55; cursor: default; }

.ghost-btn {
  color: var(--text-dim);
  background: transparent;
  border: 1px solid var(--border);
}

.ghost-btn:hover { color: var(--text-main); border-color: var(--text-dim); background: var(--bg-raised); }

/* ═══════════════════════════════════════
   NOTICE / ERROR
═══════════════════════════════════════ */
.notice {
  margin: -6px 0 16px;
  padding: 9px 13px;
  border-radius: var(--r);
  color: var(--accent);
  background: var(--accent-glow);
  border: 1px solid var(--border-accent);
  font-size: 12px; font-family: var(--font-mono);
}

.notice.error {
  color: var(--sev-critical);
  background: var(--sev-crit-bg);
  border-color: var(--sev-crit-bd);
}

/* ═══════════════════════════════════════
   TOAST / ESCALATION POP-UPS
═══════════════════════════════════════ */
.toast-stack {
  position: fixed;
  top: 18px; right: 18px;
  z-index: 999;
  display: flex; flex-direction: column;
  gap: 10px;
  width: min(340px, calc(100vw - 36px));
  pointer-events: none;
}

.toast {
  pointer-events: auto;
  background: var(--bg-raised);
  border: 1px solid var(--sev-high-bd);
  border-left: 3px solid var(--sev-high);
  border-radius: var(--r-lg);
  padding: 11px 13px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.45);
  animation: toast-in 0.18s ease-out;
  display: flex; gap: 10px; align-items: flex-start;
}

.toast.toast-info { border-left-color: var(--cyan); border-color: var(--border-cyan); }

.toast-icon { font-size: 15px; line-height: 1; margin-top: 1px; flex-shrink: 0; }

.toast-body { flex: 1; min-width: 0; }

.toast-title {
  font-size: 12px; font-weight: 700;
  color: var(--text-main);
  margin: 0 0 2px;
}

.toast-msg {
  font-size: 11px; font-family: var(--font-mono);
  color: var(--text-dim);
  margin: 0;
  line-height: 1.4;
}

.toast-close {
  background: transparent; border: 0;
  color: var(--text-faint);
  cursor: pointer; font-size: 13px;
  padding: 0; line-height: 1;
  flex-shrink: 0;
}

.toast-close:hover { color: var(--text-main); }

@keyframes toast-in {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════
   STATS GRID
═══════════════════════════════════════ */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0,1fr));
  gap: 12px; margin-bottom: 18px;
}

.stat-card {
  position: relative;
  padding: 16px;
  border-radius: var(--r-lg);
  border: 1px solid var(--border);
  border-top: 2px solid var(--border);
  background: var(--bg-panel);
}

.stat-card:not(.danger):not(.warning):not(.success):not(.cyan) { border-top-color: var(--cyan); }
.stat-card.cyan    { border-top-color: var(--cyan); }
.stat-card.danger  { border-top-color: var(--sev-critical); }
.stat-card.warning { border-top-color: var(--sev-high); }
.stat-card.success { border-top-color: var(--sev-low); }

.stat-title {
  margin: 0;
  color: var(--text-dim);
  font-size: 10px; font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: 0.13em; text-transform: uppercase;
}

.stat-card h3 {
  margin: 10px 0 0;
  color: var(--text-main);
  font-size: 30px; letter-spacing: -0.05em; font-weight: 800;
  font-family: var(--font-mono);
}

.stat-subtitle { margin: 5px 0 0; color: var(--text-dim); font-size: 12px; }

.stat-dot {
  position: absolute; top: 14px; right: 14px;
  width: 8px; height: 8px;
  border-radius: var(--r-pill);
  background: var(--cyan);
  animation: dotPulse 2.2s infinite;
}

.stat-card.danger  .stat-dot { background: var(--sev-critical); }
.stat-card.warning .stat-dot { background: var(--sev-high); }
.stat-card.success .stat-dot { background: var(--sev-low); }

@keyframes dotPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.35; transform: scale(0.8); }
}

/* ═══════════════════════════════════════
   WORKSPACE / LAYOUT GRIDS
═══════════════════════════════════════ */
.workspace {
  display: grid;
  grid-template-columns: 346px minmax(0, 1fr) 326px;
  gap: 14px; align-items: start;
}

.module-layout {
  display: grid;
  grid-template-columns: 346px minmax(0, 1fr) 326px;
  gap: 14px; align-items: start;
}

.left-column, .center-column, .right-column { display: grid; gap: 14px; align-content: start; }

.module-grid { display: grid; gap: 14px; margin-top: 14px; }
.module-grid.two-column { grid-template-columns: minmax(0,1fr) minmax(0,1fr); }

/* ═══════════════════════════════════════
   PANELS
═══════════════════════════════════════ */
.panel {
  border: 1px solid var(--border);
  background: var(--bg-panel);
  border-radius: var(--r-xl);
  padding: 14px;
}

.panel-title {
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px; margin-bottom: 13px;
  padding-bottom: 11px;
  border-bottom: 1px solid var(--border);
}

.panel-title h3 {
  margin: 0;
  color: var(--text-main);
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  font-family: var(--font-mono);
}

.panel-title.compact { margin-bottom: 10px; padding-bottom: 0; border-bottom: 0; }
.panel-title.compact h3 { font-size: 11px; }

.panel-title p { margin: 3px 0 0; color: var(--text-dim); font-size: 11px; }

.panel-title > span:not(.panel-icon) {
  margin: 0;
  color: var(--text-dim); font-size: 11px;
}

.panel-icon {
  display: grid; place-items: center;
  width: 28px; height: 28px;
  border-radius: var(--r);
  background: var(--bg-raised);
  color: var(--accent) !important;
  margin: 0 !important;
  font-size: 13px;
  border: 1px solid var(--border);
  flex-shrink: 0;
}

.lock-banner {
  display: flex; align-items: center; gap: 12px;
  padding: 22px;
  border: 1px dashed var(--border);
  border-radius: var(--r-xl);
  background: var(--bg-panel);
}

.lock-banner .lock-icon {
  width: 40px; height: 40px; flex-shrink: 0;
  display: grid; place-items: center;
  border-radius: var(--r-lg);
  background: var(--bg-raised);
  border: 1px solid var(--border);
  font-size: 18px;
  color: var(--text-dim);
}

.lock-banner h3 { margin: 0; font-size: 14px; color: var(--text-main); }
.lock-banner p { margin: 4px 0 0; font-size: 12px; color: var(--text-dim); line-height: 1.5; }

/* ═══════════════════════════════════════
   FILTERS / SEARCH
═══════════════════════════════════════ */
.filters {
  display: grid;
  grid-template-columns: 1fr 96px;
  gap: 8px; margin-bottom: 11px;
}

.filters input, .filters select {
  width: 100%;
  border: 1px solid var(--border);
  color: var(--text-main);
  background: var(--bg-raised);
  border-radius: var(--r);
  outline: none;
  padding: 9px 10px; font-size: 13px;
  transition: border-color 0.15s;
}

.filters input:focus, .filters select:focus { border-color: var(--accent); }
.filters input::placeholder { color: var(--text-faint); }
.filters select option { background: var(--bg-raised); }

/* ═══════════════════════════════════════
   INCIDENT LIST
═══════════════════════════════════════ */
.incident-list { display: grid; gap: 8px; max-height: 640px; overflow-y: auto; padding-right: 2px; }

.incident-item {
  width: 100%; text-align: left;
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  background: var(--bg-raised);
  padding: 11px;
  cursor: pointer; color: inherit;
  transition: all 0.15s ease;
}

.incident-item:hover {
  border-color: rgba(255,255,255,0.14);
  background: #19212F;
  transform: translateY(-1px);
}

.incident-item.active {
  border-color: var(--accent);
  background: var(--accent-glow);
}

.incident-top {
  display: flex; justify-content: space-between;
  gap: 10px; align-items: flex-start;
}

.incident-meta {
  display: flex; gap: 7px; align-items: center;
  margin-bottom: 5px; flex-wrap: wrap;
}

.incident-item h4 {
  margin: 0;
  color: var(--text-main);
  line-height: 1.35; font-size: 13px; font-weight: 600;
}

/* ═══════════════════════════════════════
   SEVERITY / STATUS BADGES
═══════════════════════════════════════ */
.sev {
  display: inline-flex; align-items: center;
  border-radius: var(--r-pill); border: 1px solid;
  padding: 2px 7px;
  font-size: 9px; font-weight: 800;
  font-family: var(--font-mono);
  letter-spacing: 0.05em; text-transform: uppercase;
  white-space: nowrap;
}

.sev-critical { color:var(--sev-critical); background:var(--sev-crit-bg); border-color:var(--sev-crit-bd); }
.sev-high     { color:var(--sev-high);     background:var(--sev-high-bg); border-color:var(--sev-high-bd); }
.sev-medium   { color:var(--sev-medium);   background:var(--sev-med-bg);  border-color:var(--sev-med-bd);  }
.sev-low      { color:var(--sev-low);      background:var(--sev-low-bg);  border-color:var(--sev-low-bd);  }

.status-pill {
  display: inline-flex; align-items: center; gap: 5px;
  border-radius: var(--r-pill); border: 1px solid var(--border);
  background: var(--bg-raised);
  padding: 2px 8px;
  font-size: 9px; font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: 0.05em; text-transform: uppercase;
  color: var(--text-dim);
  white-space: nowrap;
}

.status-pill.status-open          { color: var(--text-dim); }
.status-pill.status-investigating { color: var(--cyan); border-color: var(--border-cyan); background: var(--cyan-glow); }
.status-pill.status-contained     { color: var(--sev-low); border-color: var(--sev-low-bd); background: var(--sev-low-bg); }
.status-pill.status-resolved      { color: var(--accent); border-color: var(--border-accent); background: var(--accent-glow); }

/* ═══════════════════════════════════════
   RISK BOX
═══════════════════════════════════════ */
.risk-box {
  flex: 0 0 auto; min-width: 50px;
  text-align: center;
  border-radius: var(--r);
  padding: 7px 8px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
}

.risk-box strong {
  display: block;
  color: var(--text-main);
  font-size: 17px; font-weight: 700;
  font-family: var(--font-mono);
}

.risk-box span {
  color: var(--text-dim);
  font-size: 9px; text-transform: uppercase;
  letter-spacing: 0.1em;
  font-family: var(--font-mono);
}

/* ═══════════════════════════════════════
   INCIDENT GRID (mini meta)
═══════════════════════════════════════ */
.incident-grid {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 5px; margin-top: 9px;
}

.incident-grid div {
  padding: 6px 7px;
  border-radius: var(--r);
  background: rgba(0,0,0,0.25);
  border: 1px solid var(--border);
}

.incident-grid span {
  display: block;
  color: var(--text-dim);
  font-size: 9px; font-family: var(--font-mono);
  text-transform: uppercase; letter-spacing: 0.08em;
}

.incident-grid b {
  display: block; margin-top: 3px;
  color: var(--text-main);
  font-size: 11px; font-family: var(--font-mono);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ═══════════════════════════════════════
   DETAIL CARD
═══════════════════════════════════════ */
.detail-header {
  display: flex; justify-content: space-between;
  gap: 16px; align-items: flex-start;
}

.tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }

.soft-tag {
  border: 1px solid var(--border);
  background: var(--bg-raised);
  color: var(--text-dim);
  border-radius: var(--r-pill);
  padding: 3px 8px;
  font-size: 10px; font-family: var(--font-mono);
}

.detail-panel h2 {
  color: var(--text-main);
  margin: 6px 0 0;
  font-size: 19px; letter-spacing: -0.03em; font-weight: 700;
  line-height: 1.3;
}

.detail-panel p.summary {
  color: var(--text-dim);
  line-height: 1.65; margin: 8px 0 0; font-size: 13px;
}

.detail-actions { display: flex; gap: 8px; flex-shrink: 0; align-items: center; flex-wrap: wrap; }

.status-select {
  border: 1px solid var(--border);
  background: var(--bg-raised);
  color: var(--text-main);
  border-radius: var(--r);
  padding: 8px 10px; font-size: 12px;
  font-family: var(--font-mono);
}

/* ═══════════════════════════════════════
   RESPONSE MODE TOGGLE
═══════════════════════════════════════ */
.response-panel .panel-title { margin-bottom: 14px; }

.response-mode-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
  padding: 14px;
  border-radius: var(--r-lg);
  background: var(--bg-raised);
  border: 1px solid var(--border);
}

.response-mode-row.is-enforce {
  border-color: var(--sev-crit-bd);
  background: var(--sev-crit-bg);
}

.response-mode-copy b {
  display: block; color: var(--text-main); font-size: 13px;
}

.response-mode-copy p {
  margin: 4px 0 0; color: var(--text-dim); font-size: 11.5px; line-height: 1.5;
  max-width: 420px;
}

.toggle-switch {
  position: relative;
  width: 46px; height: 26px;
  flex-shrink: 0;
  border-radius: var(--r-pill);
  border: 1px solid var(--border);
  background: var(--bg-panel);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}

.toggle-switch.is-on {
  background: var(--sev-critical);
  border-color: var(--sev-critical);
}

.toggle-switch:disabled { opacity: 0.5; cursor: default; }

.toggle-switch .knob {
  position: absolute;
  top: 2px; left: 2px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--text-main);
  transition: transform 0.15s;
}

.toggle-switch.is-on .knob { transform: translateX(20px); }

.response-mode-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 9px;
  border-radius: var(--r-pill);
  font-size: 10px; font-weight: 700; font-family: var(--font-mono);
  letter-spacing: 0.06em; text-transform: uppercase;
  border: 1px solid var(--border);
  color: var(--text-dim);
}

.response-mode-badge.is-enforce {
  color: var(--sev-critical);
  border-color: var(--sev-crit-bd);
  background: var(--sev-crit-bg);
}

.info-grid {
  display: grid; grid-template-columns: repeat(3, minmax(0,1fr));
  gap: 8px; margin-top: 14px;
}

.info-tile {
  padding: 11px;
  border-radius: var(--r);
  background: var(--bg-raised);
  border: 1px solid var(--border);
}

.info-tile span {
  display: block; color: var(--text-dim);
  font-size: 9px; font-family: var(--font-mono);
  text-transform: uppercase; letter-spacing: 0.1em;
}

.info-tile strong {
  display: block; color: var(--text-main);
  margin-top: 5px; font-size: 12px;
  font-family: var(--font-mono);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ═══════════════════════════════════════
   RISK GAUGE
═══════════════════════════════════════ */
.middle-grid {
  display: grid; grid-template-columns: 235px minmax(0,1fr);
  gap: 14px;
}

.risk-gauge-card {
  min-height: 275px; padding: 16px;
  border-radius: var(--r-xl);
  border: 1px solid var(--border);
  background: var(--bg-panel);
  display: grid; align-content: center;
  justify-items: center; text-align: center;
}

.gauge-wrap {
  position: relative; width: 155px; height: 155px;
  border-radius: 50%; display: grid; place-items: center;
  overflow: hidden;
  background: var(--bg-base);
  border: 1px solid var(--border);
}

.gauge-track, .gauge-fill {
  position: absolute; inset: 9px; border-radius: 50%;
  border: 10px solid var(--bg-raised);
}

.gauge-fill {
  border-color: var(--accent) transparent transparent transparent;
  transition: transform .38s cubic-bezier(.4,0,.2,1);
}

.gauge-inner {
  position: relative; width: 107px; height: 107px;
  border-radius: 50%;
  background: var(--bg-panel);
  display: grid; place-items: center; align-content: center;
  border: 1px solid var(--border);
}

.gauge-inner strong {
  color: var(--text-main); font-size: 35px;
  letter-spacing: -0.07em;
  font-family: var(--font-mono); font-weight: 700;
}

.gauge-inner span {
  color: var(--text-dim); font-size: 9px;
  font-family: var(--font-mono); text-transform: uppercase;
  letter-spacing: 0.07em;
}

.risk-gauge-card p {
  color: var(--text-dim); font-size: 12px;
  line-height: 1.6; max-width: 195px; margin-top: 13px;
}

/* ═══════════════════════════════════════
   GRAPH / DIGITAL TWIN
═══════════════════════════════════════ */
.graph-panel { min-height: 275px; }

#cyGraph {
  height: 460px;
  border-radius: var(--r);
  background: var(--bg-raised);
  border: 1px solid var(--border);
}

.graph-legend {
  display: flex; gap: 14px; flex-wrap: wrap;
  margin-top: 10px;
}

.graph-legend span {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--text-dim); font-size: 11px;
}

.legend-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }

/* ═══════════════════════════════════════
   CHARTS
═══════════════════════════════════════ */
.charts-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 14px; margin-top: 14px;
}

.chart-card { min-height: 180px; }

.line-chart {
  width: 100%; height: 110px;
  stroke: var(--cyan); stroke-width: 2;
  fill: none;
}

.bars { display: grid; gap: 9px; margin-top: 4px; }

.bar-row { display: grid; grid-template-columns: 70px 1fr 32px; align-items: center; gap: 9px; }
.bar-row span { color: var(--text-dim); font-size: 12px; }
.bar-row div { height: 7px; border-radius: var(--r-pill); background: var(--bg-raised); overflow: hidden; }
.bar-row i { display: block; height: 100%; background: var(--accent); border-radius: var(--r-pill); }
.bar-row b { color: var(--text-main); font-size: 12px; font-family: var(--font-mono); text-align: right; }

/* ═══════════════════════════════════════
   SOURCES / BACKEND PANEL
═══════════════════════════════════════ */
.source-list { display: grid; gap: 8px; }

.source-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 9px 10px;
  border-radius: var(--r);
  background: var(--bg-raised);
  border: 1px solid var(--border);
}

.source-row > div { display: flex; align-items: center; gap: 9px; }
.source-row b { color: var(--text-main); font-size: 12px; display: block; }
.source-row p { margin: 1px 0 0; color: var(--text-dim); font-size: 11px; }
.source-row > span { color: var(--text-dim); font-size: 11px; font-family: var(--font-mono); }

.status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.status-dot.online { background: var(--sev-low); box-shadow: 0 0 8px var(--sev-low); }
.status-dot.delay  { background: var(--sev-high); }

.api-list { display: grid; gap: 6px; }
.api-list code {
  display: block; padding: 8px 10px;
  border-radius: var(--r);
  background: var(--bg-raised);
  border: 1px solid var(--border);
  color: var(--cyan); font-size: 11px;
}

/* ═══════════════════════════════════════
   TIMELINE
═══════════════════════════════════════ */
.timeline { display: grid; gap: 0; }

.timeline-row {
  display: grid; grid-template-columns: 50px 16px 1fr;
  gap: 10px; padding-bottom: 16px; position: relative;
}

.timeline-row:not(:last-child)::before {
  content: ''; position: absolute; left: 57px; top: 16px; bottom: 0;
  width: 1px; background: var(--border);
}

.timeline-row .time {
  color: var(--text-dim); font-size: 11px; font-family: var(--font-mono); padding-top: 2px;
}

.timeline-row .node {
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--accent); margin-top: 4px; flex-shrink: 0;
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.timeline-row b { display: block; color: var(--text-main); font-size: 13px; }
.timeline-row p { margin: 3px 0 0; color: var(--text-dim); font-size: 12px; line-height: 1.4; }

/* ═══════════════════════════════════════
   MITRE HEATMAP
═══════════════════════════════════════ */
.heatmap-list { display: grid; gap: 7px; }

.heatmap-row {
  display: grid; grid-template-columns: 64px 1fr 90px 50px;
  align-items: center; gap: 10px;
  padding: 8px 9px;
  border-radius: var(--r);
  background: var(--bg-raised);
  border: 1px solid var(--border);
}

.heatmap-row code { color: var(--cyan); font-size: 11px; }
.heatmap-row .tname { color: var(--text-main); font-size: 12px; }
.heatmap-row .ttactic { color: var(--text-dim); font-size: 10px; }
.heatmap-row .tcount { text-align: right; color: var(--text-main); font-family: var(--font-mono); font-size: 13px; font-weight: 700; }

.heatmap-bar { height: 5px; border-radius: var(--r-pill); background: var(--bg-base); overflow: hidden; margin-top: 4px; }
.heatmap-bar i { display: block; height: 100%; background: var(--cyan); }

/* ATT&CK matrix (tactic columns x technique cells, shaded by count) */
.attck-matrix {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 6px;
}

.attck-col {
  min-width: 168px;
  flex: 0 0 168px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.attck-col-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 6px;
  padding: 0 2px 6px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2px;
}

.attck-col-title {
  color: var(--text-main);
  font-size: 10.5px;
  font-weight: 700;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  line-height: 1.3;
}

.attck-col-total {
  color: var(--text-dim);
  font-size: 10px;
  font-family: var(--font-mono);
  flex-shrink: 0;
}

.attck-cell {
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 7px 8px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.attck-cell code {
  color: var(--text-main);
  font-size: 10px;
  font-weight: 700;
}

.attck-cell span {
  color: var(--text-main);
  font-size: 11px;
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.attck-cell b {
  color: var(--text-main);
  font-size: 10px;
  font-family: var(--font-mono);
  align-self: flex-end;
}

/* ═══════════════════════════════════════
   TRUST SCORE LEADERBOARD
═══════════════════════════════════════ */
.leaderboard-list { display: grid; gap: 7px; }

.leaderboard-row {
  display: grid; grid-template-columns: 28px 1fr 70px 110px;
  align-items: center; gap: 10px;
  padding: 9px 10px;
  border-radius: var(--r);
  background: var(--bg-raised);
  border: 1px solid var(--border);
  cursor: pointer;
}

.leaderboard-row:hover { border-color: var(--accent); }
.leaderboard-row .rank { color: var(--text-faint); font-family: var(--font-mono); font-size: 12px; }
.leaderboard-row .name { color: var(--text-main); font-size: 13px; }
.leaderboard-row .score { text-align: right; font-family: var(--font-mono); font-weight: 700; font-size: 14px; }

/* ═══════════════════════════════════════
   METRICS TABLE
═══════════════════════════════════════ */
.metrics-tiles {
  display: grid; grid-template-columns: repeat(4, minmax(0,1fr));
  gap: 10px;
}

.metric-tile {
  padding: 13px;
  border-radius: var(--r-lg);
  background: var(--bg-raised);
  border: 1px solid var(--border);
  text-align: center;
}

.metric-tile span { display: block; color: var(--text-dim); font-size: 10px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.08em; }
.metric-tile strong { display: block; margin-top: 6px; color: var(--text-main); font-size: 21px; font-family: var(--font-mono); }

/* ═══════════════════════════════════════
   AUDIT LIST
═══════════════════════════════════════ */
.audit-list { display: grid; gap: 0; max-height: 600px; overflow-y: auto; }

.audit-row {
  display: grid; grid-template-columns: 64px 1fr;
  gap: 12px; padding: 11px 0;
  border-bottom: 1px solid var(--border);
}

.audit-row:last-child { border-bottom: 0; }

.audit-row > span {
  color: var(--accent); font-weight: 700;
  font-family: var(--font-mono); font-size: 10px;
  padding-top: 2px;
}

.audit-row b { color: var(--text-main); font-size: 13px; }
.audit-row p { margin: 4px 0 0; color: var(--text-dim); font-size: 12px; line-height: 1.4; }

/* ═══════════════════════════════════════
   SEARCH / THREAT HUNTING
═══════════════════════════════════════ */
.hunt-bar {
  display: grid; grid-template-columns: 1fr 100px;
  gap: 8px; margin-bottom: 12px;
}

.hunt-bar input {
  width: 100%;
  border: 1px solid var(--border);
  color: var(--text-main);
  background: var(--bg-raised);
  border-radius: var(--r);
  outline: none;
  padding: 10px 12px; font-size: 13px;
  font-family: var(--font-mono);
}

.hunt-bar input:focus { border-color: var(--accent); }

.hunt-chips { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; }

.hunt-chip {
  border: 1px solid var(--border);
  background: var(--bg-raised);
  color: var(--text-dim);
  border-radius: var(--r-pill);
  padding: 6px 11px;
  font-size: 11px; font-family: var(--font-mono);
  cursor: pointer;
  transition: all 0.15s;
}

.hunt-chip:hover { color: var(--cyan); border-color: var(--border-cyan); background: var(--cyan-glow); }

.hunt-results-meta {
  color: var(--text-dim); font-size: 12px; font-family: var(--font-mono);
  margin-bottom: 10px;
}

/* ═══════════════════════════════════════
   TABLE
═══════════════════════════════════════ */
.table-wrap { overflow-x: auto; }

table {
  width: 100%; border-collapse: separate;
  border-spacing: 0 6px; min-width: 640px;
}

th {
  color: var(--text-dim); font-size: 10px;
  text-align: left; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em;
  padding: 0 12px 5px;
  font-family: var(--font-mono);
}

td {
  color: var(--text-main); padding: 11px 12px;
  background: var(--bg-raised);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}

td:first-child { border-left: 1px solid var(--border); border-radius: var(--r) 0 0 var(--r); }
td:last-child  { border-right: 1px solid var(--border); border-radius: 0 var(--r) var(--r) 0; }

tbody tr { cursor: pointer; transition: all 0.1s; }
tbody tr:hover td { background: var(--accent-glow); border-color: var(--accent); }

.empty-state { color: var(--text-dim); font-size: 13px; text-align: center; padding: 30px 10px; }

.loading-state {
  display: flex; align-items: center; justify-content: center;
  min-height: 240px;
  color: var(--text-dim); font-size: 13px; font-family: var(--font-mono);
}

/* ═══════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════ */
@media (max-width: 1500px) {
  .workspace { grid-template-columns: 326px minmax(0, 1fr); }
  .right-column { grid-column: 1 / -1; grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .module-layout { grid-template-columns: 326px minmax(0, 1fr); }
  .module-layout .right-column { grid-column: 1 / -1; grid-template-columns: repeat(3, minmax(0, 1fr)); }
}

@media (max-width: 1180px) {
  .sidebar {
    position: fixed;
    top: 0; left: 0;

<body>
<div id="app"></div>
<script>
/* ================================================================
   CYBER CONTROL TOWER — Application
   ================================================================ */
const API_BASE = "";

async function api(path, options = {}) {
  const res = await fetch(API_BASE + path, {
    credentials: "include",
    headers: { "Content-Type": "application/json", ...(options.headers || {}) },
    ...options,
  });
  let body = null;
  try { body = await res.json(); } catch (e) { /* no body */ }
  if (!res.ok) {
    const err = new Error((body && (body.message || body.error)) || `Request failed (${res.status})`);
    err.status = res.status;
    err.body = body;
    throw err;
  }
  return body;
}

/* ── Global state ── */

/* ── Global auth state ── */
let currentUser    = null;
let permissions    = {};
let authMode       = "login";     // "login" | "register"
let authError      = "";
let authSuccess    = "";
let authSubmitting = false;

let activePage = "command";
let sidebarOpen = false; // mobile/narrow-viewport sidebar toggle (< 1180px)
let incidents = [];
let incidentsLoaded = false;
let incidentsError = "";
let selectedId = null;
let query = "";
let severityFilter = "All";
let statusFilter = "All";
let notice = "";
let toasts = [];   // { id, tone, title, msg } — floating pop-up notifications (escalations etc.)

let summary = null;
let graphData = null;
let mitreHeatmap = null;
let trustBoard = null;
let metricsReport = null;
let auditLog = null;
let huntQuery = "";
let huntResults = null;
let huntSuggested = [];
let demoAccounts = [];
let correlationStats = null;
let systemHealth = null;
let responseMode = null;        // { mode: "notify"|"enforce", valid_modes: [...] } | { error }
let responseModeSaving = false; // disables the toggle while a save is in-flight

const app = document.getElementById("app");

/* ── Utilities ── */
function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

// Mirrors response/engine.py's ACTION_BY_ATTACK_TYPE — used only to show
// the analyst what action the "Take protective action" button will take
// before they click it. The backend is the source of truth; this is UI copy.
const RESPONSE_ACTION_BY_ATTACK_TYPE = {
  "Intrusion":     "Block",
  "SQL Injection": "Block",
  "XSS":           "Block",
  "DDoS":          "Block",
  "Phishing":      "Quarantine",
  "Malware":       "Quarantine",
  "Ransomware":    "Quarantine",
};
function ACTION_BY_ATTACK_TYPE_HINT(attackType) {
  return RESPONSE_ACTION_BY_ATTACK_TYPE[attackType] || "Quarantine";
}

function severityClass(severity) {
  if (severity === "Critical") return "sev sev-critical";
  if (severity === "High")     return "sev sev-high";
  if (severity === "Medium")   return "sev sev-medium";
  return "sev sev-low";
}

function statusClass(status) {
  return "status-pill status-" + String(status || "open").toLowerCase();
}

function riskLabel(risk) {
  if (risk >= 80) return "Critical Exposure";
  if (risk >= 60) return "High Risk";
  if (risk >= 30) return "Needs Review";
  return "Stable";
}

function fmtDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return d.toLocaleString("en-US", { month: "short", day: "numeric", year: "numeric", hour: "2-digit", minute: "2-digit" });
}

function fmtMinutes(mins) {
  if (mins == null) return "—";
  if (mins < 60) return `${mins.toFixed(1)}m`;
  const h = Math.floor(mins / 60);
  const m = Math.round(mins % 60);
  return `${h}h ${m}m`;
}

function mttrDisplay(incident) {
  // Point 2 / 16: MTTR only means something once an incident is actually
  // Resolved — showing it for Open/Investigating incidents implies a
  // resolution that hasn't happened yet.
  if (incident.status === "Open")          return "— (Pending)";
  if (incident.status === "Investigating") return "—";
  if (incident.status === "Contained")     return `${fmtMinutes(incident.mttr_minutes)} (MTTC, not yet closed)`;
  return fmtMinutes(incident.mttr_minutes); // Resolved
}

function debounce(fn, ms) {
  let t = null;
  return (...args) => {
    clearTimeout(t);
    t = setTimeout(() => fn(...args), ms);
  };
}

/* ── Login screen ── */
function renderLogin() {
  app.innerHTML = `
    <div class="login-shell">
      <div class="login-card">

        <div class="login-brand">
          <div class="logo">⛭</div>
          <h1>Cyber Control Tower</h1>
        </div>
        <p class="subtitle">Sign in to access the SOC console.</p>

        <!-- Tab switcher -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--r);padding:4px;margin-bottom:20px;">
          <button
            id="tabLogin"
            style="border:0;border-radius:6px;padding:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;
                   background:${authMode==='login' ? 'var(--bg-panel)' : 'transparent'};
                   color:${authMode==='login' ? 'var(--accent)' : 'var(--text-dim)'};
                   ${authMode==='login' ? 'border:1px solid var(--border-accent);' : ''}">
            Sign in
          </button>
          <button
            id="tabRegister"
            style="border:0;border-radius:6px;padding:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;
                   background:${authMode==='register' ? 'var(--bg-panel)' : 'transparent'};
                   color:${authMode==='register' ? 'var(--accent)' : 'var(--text-dim)'};
                   ${authMode==='register' ? 'border:1px solid var(--border-accent);' : ''}">
            Sign up
          </button>
        </div>

        <!-- Error message -->
        ${authError   ? `<div class="login-error">${escapeHtml(authError)}</div>`   : ""}
        ${authSuccess ? `<div style="margin-bottom:14px;padding:10px 12px;border-radius:var(--r);background:var(--sev-low-bg);border:1px solid var(--sev-low-bd);color:var(--sev-low);font-size:12px;font-family:var(--font-mono);">${escapeHtml(authSuccess)}</div>` : ""}

        <!-- SIGN IN FORM -->
        ${authMode === "login" ? `
          <div id="loginForm">
            <div class="field">
              <label for="loginUsername">Username</label>
              <input id="loginUsername" autocomplete="username" placeholder="analyst" />
            </div>
            <div class="field">
              <label for="loginPassword">Password</label>

            </div>
            <button class="login-submit" id="loginBtn" ${authSubmitting ? "disabled" : ""}>
              ${authSubmitting ? "Signing in…" : "Sign in"}
            </button>
          </div>

          <div class="login-divider"></div>
          <p class="demo-label">Demo accounts</p>
          ${demoAccounts.map((acc) => `
            <div class="demo-row">
              <div class="demo-row-id">
                <b>${escapeHtml(acc.role_label)}</b>

                data-demo-user="${escapeHtml(acc.username)}"
                data-demo-pass="${escapeHtml(acc.password)}">Use</button>

          `).join("")}
        ` : ""}

        <!-- SIGN UP FORM -->
        ${authMode === "register" ? `
          <div id="registerForm">
            <div class="field">
              <label for="regUsername">Username <span style="color:var(--sev-critical)">*</span></label>
              <input id="regUsername" autocomplete="username" placeholder="e.g. john_doe (min. 3 chars)" />
            </div>
            <div class="field">
              <label for="regDisplay">Display name</label>
              <input id="regDisplay" placeholder="e.g. John Smith (optional)" />
            </div>
            <div class="field">
              <label for="regRole">Role <span style="color:var(--sev-critical)">*</span></label>
              <select id="regRole" style="width:100%;border:1px solid var(--border);color:var(--text-main);background:var(--bg-raised);border-radius:var(--r);outline:none;padding:11px 12px;font-size:14px;">
                <option value="analyst">Security Analyst</option>
                <option value="responder">Incident Responder</option>
                <option value="manager">SOC Manager</option>
              </select>
            </div>

              <input id="regPassword" type="password" autocomplete="new-password" placeholder="Min. 6 characters" />
            </div>
            <button class="login-submit" id="registerBtn" ${authSubmitting ? "disabled" : ""}>

  `;

  /* ── Tab switching ── */
  document.getElementById("tabLogin").addEventListener("click", () => {
    authMode = "login"; authError = ""; authSuccess = ""; renderLogin();
  });
  document.getElementById("tabRegister").addEventListener("click", () => {

/* ── Client-side validation before hitting the API ── */
function validateLogin(username, password) {
  if (!username)        return "Please enter your username.";
  if (!password)        return "Please enter your password.";
  return null;
}

function validateRegister(username, password) {
  if (!username)           return "Username is required.";
  if (username.length < 3) return "Username must be at least 3 characters.";
  if (!password)           return "Password is required.";
  if (password.length < 6) return "Password must be at least 6 characters.";
  return null;
}

/* ── Submit login ── */
async function submitLogin(username, password) {
  const validationError = validateLogin(username, password);
  if (validationError) {
    authError = validationError;
    renderLogin();
    return;
  }

  authSubmitting = true;
  authError      = "";
  renderLogin();

  try {
    const data = await api("/api/auth/login", {
      method: "POST",
      body: JSON.stringify({ username, password }),
    });
    currentUser    = data.user;
    permissions    = data.permissions || {};
    authSubmitting = false;
    authError      = "";
    authSuccess    = "";
    resetWorkspaceState();
    startNotificationPolling();
    render();
  } catch (err) {
    authSubmitting = false;
    authError      = err.message || "Sign in failed. Check your username and password.";
    renderLogin();
  }
}

/* ── Submit register ── */
async function submitRegister(username, displayName, role, password) {
  const validationError = validateRegister(username, password);
  if (validationError) {
    authError = validationError;
    renderLogin();
    return;
  }

  authSubmitting = true;
  authError      = "";
  renderLogin();

  try {
    const data = await api("/api/auth/register", {
      method: "POST",
      body: JSON.stringify({ username, display_name: displayName, role, password }),
    });
    // Backend auto-logs in — same response shape as login
    currentUser    = data.user;
    permissions    = data.permissions || {};
    authSubmitting = false;
    authError      = "";
    authSuccess    = "";
    resetWorkspaceState();
    startNotificationPolling();
    render();
  } catch (err) {
    authSubmitting = false;
    authError      = err.message || "Could not create account. Please try again.";
    renderLogin();
  }
}

async function handleLogout() {
  try { await api("/api/auth/logout", { method: "POST" }); } catch (e) { /* ignore */ }
  currentUser = null;
  permissions = {};
  authMode    = "login";
  authError   = "";
  authSuccess = "";
  resetWorkspaceState();
  stopNotificationPolling();
  render();
}

function resetWorkspaceState() {
  activePage = "command";
  sidebarOpen = false;
  incidents = [];
  incidentsLoaded = false;
  incidentsError = "";
  selectedId = null;
  query = "";
  severityFilter = "All";
  statusFilter = "All";
  notice = "";
  summary = null;
  graphData = null;
  mitreHeatmap = null;
  trustBoard = null;
  metricsReport = null;
  auditLog = null;
  huntQuery = "";
  huntResults = null;
  correlationStats = null;
  systemHealth = null;
  responseMode = null;

}

/* ── Data loading ── */

async function saveResponseMode(newMode) {

  render();
  try {
    const updated = await api("/api/settings/response-mode", {

    });

      ? "Enforce mode enabled — Critical/High incidents will be auto-contained."
      : "Enforce mode disabled — back to notify-only.";
    systemHealth = null; // module status line shows the mode; refresh it
  } catch (err) {
    showError(err.message || "Could not update response mode.");
  }
  responseModeSaving = false;
  render();
}

async function respondToIncident(incidentId) {
  try {
    const updated = await api(`/api/incidents/${encodeURIComponent(incidentId)}/respond`, {
      method: "POST",
    });
    incidents = incidents.map((i) => (i.incident_id === incidentId ? updated : i));
    notice = `${incidentId} contained (${updated.action_taken}).`;
  } catch (err) {
    showError(err.message || "Could not execute response action.");
  }
  render();
}

async function loadSuggestedHunts() {

async function runHunt(q) {

    const data = await api("/api/search?q=" + encodeURIComponent(q));

async function escalateIncident(incidentId, reason) {
  // Guard against double-escalation using what we already know locally —
  // covers the case where two clicks land before the first response/render
  // completes, or the local copy is stale relative to another session.
  const local = incidents.find((i) => i.incident_id === incidentId);
  if (local && local.escalated) {
    pushToast("Already escalated", `${incidentId} was already escalated to ${local.escalated_to}.`, "info");
    return;
  }

  try {
    const updated = await api(`/api/incidents/${encodeURIComponent(incidentId)}/escalate`, {
      method: "POST",
      body: JSON.stringify({ reason }),
    });
    incidents = incidents.map((i) => (i.incident_id === incidentId ? updated : i));
    notice = `${incidentId} escalated to ${updated.escalated_to}.`;
    // The server enqueues the "you've been escalated something" alert for
    // the target role itself (see POST /api/incidents/<id>/escalate) —
    // nothing to do here on the client beyond the local state update.
  } catch (err) {
    // Backend already knows about it (409 or similar "already escalated"
    // response) — treat as informational rather than a hard error.
    if (err.status === 409 || /already escalated/i.test(err.message || "")) {
      pushToast("Already escalated", err.message || `${incidentId} was already escalated.`, "info");
      if (err.body && err.body.incident) {
        incidents = incidents.map((i) => (i.incident_id === incidentId ? err.body.incident : i));
      }
    } else {
      showError(err.message || "Could not escalate incident.");
    }
  }
  render();
}

async function changeIncidentStatus(incidentId, newStatus) {
  try {
    const updated = await api(`/api/incidents/${encodeURIComponent(incidentId)}/status`, {
      method: "POST",
      body: JSON.stringify({ status: newStatus }),
    });
    incidents = incidents.map((i) => (i.incident_id === incidentId ? updated : i));
    notice = `${incidentId} moved to ${newStatus}.`;
  } catch (err) {
    notice = "";
    showError(err.message || "Could not update status.");
  }
  render();
}

let transientError = "";
function showError(msg) {
  transientError = msg;
  render();
  setTimeout(() => { transientError = ""; render(); }, 4000);
}

// Mirrors ESCALATION_TARGET_ROLE in auth/users.py — display-only label
// for the Escalate button. The backend independently resolves the real
// target user server-side; this just tells the analyst/responder who
// they're about to hand the incident to before they click.
const ESCALATION_TARGET_LABEL = {
  analyst:   "Incident Responder",
  responder: "SOC Manager",
};

// The actual role key (not just the label) each role escalates to —
// used to address the "you've been escalated to" pop-up at the right
// audience. Mirrors the same ESCALATION_TARGET_ROLE map on the backend.
const ESCALATION_TARGET_ROLE = {
  analyst:   "responder",
  responder: "manager",
};

/* ── Toast pop-ups (escalation alerts, etc.) ──
   Small floating notifications rendered on top of the app shell —
   distinct from the inline `.notice` banner, which is for the acting
   user's own action confirmations (e.g. "X escalated to Y"). Toasts are
   for alerts that can also arrive passively, from someone else's action. */
let _toastSeq = 0;
function pushToast(title, msg, tone = "alert", ttl = 7000) {
  const id = ++_toastSeq;
  toasts = [...toasts, { id, title, msg, tone }];
  render();
  setTimeout(() => dismissToast(id), ttl);
}

function dismissToast(id) {
  const before = toasts.length;
  toasts = toasts.filter((t) => t.id !== id);
  if (toasts.length !== before) render();
}

function renderToastStack() {
  if (!toasts.length) return "";
  return `
    <div class="toast-stack">
      ${toasts.map((t) => `
        <div class="toast ${t.tone === "info" ? "toast-info" : ""}" data-toast-id="${t.id}">
          <span class="toast-icon">${t.tone === "info" ? "ℹ️" : "🚨"}</span>
          <div class="toast-body">
            <p class="toast-title">${escapeHtml(t.title)}</p>
            <p class="toast-msg">${escapeHtml(t.msg)}</p>
          </div>
          <button class="toast-close" data-dismiss-toast="${t.id}" aria-label="Dismiss">✕</button>
        </div>
      `).join("")}
    </div>
  `;
}

/* ── Cross-session escalation alerts ──
   Routed through the server (GET /api/notifications), not the browser.
   This backend's login session is one cookie for the whole browser, so
   two different roles can never be signed in in two tabs of the same
   browser at once — a client-only channel (BroadcastChannel/localStorage)
   would never actually have anyone on the other end to notify. Polling
   the server instead works no matter which browser/session is signed in
   as the target role, and survives page reloads/multiple devices. */
const NOTIFICATION_POLL_MS = 6000;
let _notificationPollTimer = null;

async function pollNotifications() {
  if (!currentUser) return;
  try {
    const pending = await api("/api/notifications");
    (pending || []).forEach((n) => {
      pushToast(n.title || "Attention needed", n.message || "", "alert");
    });
  } catch (e) { /* not logged in / transient — try again next tick */ }
}

function startNotificationPolling() {
  stopNotificationPolling();
  pollNotifications(); // pick up anything that queued before this tab was open
  _notificationPollTimer = setInterval(pollNotifications, NOTIFICATION_POLL_MS);
}

function stopNotificationPolling() {
  if (_notificationPollTimer) clearInterval(_notificationPollTimer);
  _notificationPollTimer = null;
}

function hasAccess(item) {
  if (!item.cap) return true;
  return !!permissions[item.cap];

function getFilteredIncidents() {
  return incidents
    .filter((item) => severityFilter === "All" || item.severity === severityFilter)
    .filter((item) => statusFilter === "All" || item.status === statusFilter)
    .filter((item) => {
      const techIds = (item.mitre_techniques || []).map((t) => t.technique_id).join(" ");
      const haystack = `${item.incident_id} ${item.user} ${item.source_ip} ${item.dst_ip} ` +
        `${item.attack_type} ${item.network_segment} ${item.hostname} ${item.device_name} ` +
        `${item.asset_id} ${item.business_unit} ${item.os_name} ${item.status} ${techIds}`;
      return haystack.toLowerCase().includes(query.toLowerCase());
    })
    .sort((a, b) => b.risk_score - a.risk_score);
}

function getSelectedIncident() {
  return incidents.find((item) => item.incident_id === selectedId) || incidents[0] || null;

function validatePanel(incident) {
  // Step 1 of real-world triage: is this incident real, and how urgent
  // is the SLA clock? Confidence + correlation reasoning + SLA status
  // grouped together because they answer the same question analysts ask
  // first, before scoping or classifying anything.
  if (!incident) return "";
  const conf = incident.correlation_confidence || 0;
  const confPct = Math.round(conf * 100);
  const confClass = conf >= 0.7 ? "sev-low" : conf >= 0.4 ? "sev-medium" : "sev-critical";
  const confWord = conf >= 0.7 ? "High confidence" : conf >= 0.4 ? "Medium confidence" : "Needs validation";

  const slaRows = [
    ["Detection SLA", incident.detection_sla_minutes, incident.detection_sla_breached],
    ["Response SLA", incident.response_sla_minutes, incident.response_sla_breached],
    ["Containment SLA", incident.containment_sla_minutes, incident.containment_sla_breached],
  ];

  return `
    <div class="panel">
      <div class="panel-title">
        <div><h3>1 · Validate</h3><p>Is this real, and how much SLA time is left?</p></div>
        <span class="sev ${confClass}">${confWord} · ${confPct}%</span>

        ${slaRows.map(([label, mins, breached]) => `
          <div class="info-tile" style="${breached ? "border-color:var(--sev-crit-bd);background:var(--sev-crit-bg);" : ""}">
            <span>${escapeHtml(label)}</span>
            <strong>${escapeHtml(String(mins))}m target${breached ? " · BREACHED" : ""}</strong>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

function furthestTacticStage(incident) {
  // How far along the kill chain the attacker got, per ATTCK_TACTIC_ORDER.
  // Used to weight urgency beyond raw risk_score — e.g. a Critical still
  // at Reconnaissance is not the same urgency as a Critical that's
  // reached Lateral Movement or Exfiltration.
  const chain = (incident && incident.tactic_chain) || [];
  let idx = -1, tactic = null;
  chain.forEach((t) => {
    const i = ATTCK_TACTIC_ORDER.indexOf(t);
    if (i > idx) { idx = i; tactic = t; }
  });
  return { idx, tactic };
}

function mitreChainPanel(incident) {
  if (!incident) return "";
  const techs = incident.mitre_techniques || [];
  const stage = furthestTacticStage(incident);
  const lateStage = stage.idx >= ATTCK_TACTIC_ORDER.indexOf("Lateral Movement");
  return `
    <div class="panel">
      <div class="panel-title">
        <div><h3>3 · Classify</h3><p>Tactic chain: ${escapeHtml((incident.tactic_chain || []).join(" → ") || "—")} · ${escapeHtml(String(incident.event_count))} event(s)</p></div>
        ${stage.tactic ? `<span class="sev ${lateStage ? "sev-critical" : "sev-medium"}">Reached: ${escapeHtml(stage.tactic)}</span>` : `<span class="panel-icon">⛨</span>`}
      </div>
      <div class="heatmap-list">
        ${techs.length ? techs.map((t) => `
          <div class="heatmap-row" style="grid-template-columns: 64px 1fr 80px;">
            <code>${escapeHtml(t.technique_id)}</code>

}

/* ── Stats (loads /api/summary lazily) ── */
function renderStats() {
  if (!summary) {
    loadSummary();
    return `<section class="stats-grid">${[1,2,3,4].map(() => statCard("…", "—", "Loading…")).join("")}</section>`;
  }
  if (summary.error) {
    return `<div class="notice error">Could not load summary: ${escapeHtml(summary.error)}</div>`;
  }
  const avgRisk = incidents.length ? Math.round(incidents.reduce((s, i) => s + i.risk_score, 0) / incidents.length) : 0;
  const openCount = incidents.filter((i) => i.status !== "Contained" && i.status !== "Resolved").length;
  const containedCount = incidents.filter((i) => i.status === "Contained" || i.status === "Resolved").length;
  const resolved = incidents.filter((i) => i.status === "Resolved");
  const avgMttd = incidents.length ? Math.round(incidents.reduce((s, i) => s + i.mttd_minutes, 0) / incidents.length) : 0;
  const avgMttr = resolved.length ? Math.round(resolved.reduce((s, i) => s + i.mttr_minutes, 0) / resolved.length) : 0;

  return `
    <section class="stats-grid">
      ${statCard("Avg risk score", `${avgRisk}/100`, "Across all correlated incidents", "danger")}
      ${statCard("Open incidents", openCount, "Awaiting investigation or containment", "warning")}
      ${statCard("Attack chains", summary.attack_chain_count, "Multi-stage incidents detected", "cyan")}
      ${statCard("Contained / Resolved", containedCount, "Moved through the workflow", "success")}
    </section>
    <section class="stats-grid">
      
      ${statCard("Avg MTTR", resolved.length ? fmtMinutes(avgMttr) : "—", "Mean time to resolve, resolved only", "success")}

    </section>
    <section class="stats-grid">

      ${statCard("Users affected", summary.users_affected, "Distinct accounts across incidents", "cyan")}

  `;
}

function computeNextMove(incident) {
  // Step 4: decide. Real triage doesn't decide off risk_score alone —
  // confidence gates everything (don't act on something unvalidated),
  // and how far the attacker got along the kill chain raises urgency
  // independent of the nominal severity label.
  const conf = incident.correlation_confidence || 0;
  const stage = furthestTacticStage(incident);
  const lateStage = stage.idx >= ATTCK_TACTIC_ORDER.indexOf("Lateral Movement");

  if (conf < 0.4) {
    return { text: "Validate further — low correlation confidence", tone: "sev-medium" };
  }
  if (incident.risk_score >= 60 && lateStage) {
    return { text: `Contain immediately — attacker reached ${stage.tactic}`, tone: "sev-critical" };
  }
  if (incident.risk_score >= 60) {
    return { text: "Investigate and contain", tone: "sev-high" };
  }
  return { text: "Monitor", tone: "sev-low" };
}

function triageView() {
  // Incident Triage is the decision workspace, not a second overview.
  // Detail card, MITRE classify, timeline, and risk gauge all now live
  // on Command Center — showing them here too would just be the same
  // reference panels duplicated across two pages. What's left is the
  // stuff that's actually specific to making a triage decision: the
  // Validate/Scope explanation steps, and Decide & act (status changes,
  // escalation, protective action). The "attacker reached X" context
  // that used to come from the Classify panel is still surfaced inline
  // in the Next move line below, so the reasoning isn't lost — just the

  const filtered = getFilteredIncidents();
  const selected = getSelectedIncident();
  const canChange = !!permissions.change_incident_status;

  return `

              <div style="display:flex; justify-content:space-between;"><b style="color:var(--text-main);font-size:13px;">Priority</b><span style="color:var(--text-dim);font-size:13px;">${escapeHtml(riskLabel(selected.risk_score))}</span></div>
              <div style="display:flex; justify-content:space-between;"><b style="color:var(--text-main);font-size:13px;">Current status</b><span class="${statusClass(selected.status)}">${escapeHtml(selected.status)}</span></div>
              <div style="display:flex; justify-content:space-between;"><b style="color:var(--text-main);font-size:13px;">Affected users</b><span style="color:var(--text-dim);font-size:13px;">${escapeHtml((selected.affected_users || []).join(", "))}</span></div>
              <div style="display:flex; justify-content:space-between; align-items:center;"><b style="color:var(--text-main);font-size:13px;">Next move</b><span class="sev ${nextMove.tone}">${escapeHtml(nextMove.text)}</span></div>
            </div>
            ${canChange ? `
              <div style="margin-top:14px; display:flex; gap:8px; flex-wrap:wrap;">
                <button class="primary-btn" data-quick-status="${escapeHtml(selected.incident_id)}|Contained">Mark contained</button>
                <button class="ghost-btn" data-quick-status="${escapeHtml(selected.incident_id)}|Resolved">Mark resolved</button>
              </div>
            ` : ""}
            ${!!permissions.escalate_incident ? `
              <div style="margin-top:8px;">
                ${selected.escalated ? `
                  <div style="border:1px solid var(--sev-high-bd); border-radius:8px; padding:8px 10px; font-size:12px; color:var(--sev-high);">

                `}
              </div>
            ` : ""}
            ${(() => {
              // Once you've escalated, you've handed off ownership — if your
              // role has a tier above it (analyst -> responder, responder ->
              // manager), taking protective action yourself no longer makes
              // sense and the button disappears for you. Top-tier roles
              // (nothing left in ESCALATION_TARGET_ROLE, i.e. the manager
              // an escalation lands on) keep it, since they're the ones who
              // now own the call.
              const relinquishedToEscalation = selected.escalated && !!ESCALATION_TARGET_ROLE[currentUser.role];
              const canTakeAction = !!permissions.manage_response_mode && !relinquishedToEscalation
                && selected.status !== "Contained" && selected.status !== "Resolved";

              return `

              </div>
              `;
            })()}

        </div>
      </div>
    </section>
  `;
}

// Canonical MITRE ATT&CK Enterprise tactic order (kill-chain sequence).
// Used to order matrix columns left-to-right the way ATT&CK Navigator
// does, rather than alphabetically or by whatever order the backend
// happens to return.
const ATTCK_TACTIC_ORDER = [
  "Reconnaissance", "Resource Development", "Initial Access", "Execution",
  "Persistence", "Privilege Escalation", "Defense Evasion", "Credential Access",
  "Discovery", "Lateral Movement", "Collection", "Command and Control",
  "Exfiltration", "Impact",
];

function attckMatrixPanel(mitreHeatmap) {
  const maxCount = Math.max(1, ...mitreHeatmap.map((r) => r.incident_count));

  // Group observed techniques by tactic.
  const byTactic = new Map();
  mitreHeatmap.forEach((row) => {
    const tactic = row.tactic || "Unspecified";
    if (!byTactic.has(tactic)) byTactic.set(tactic, []);
    byTactic.get(tactic).push(row);
  });

  // Order columns by kill-chain sequence; any tactic not in the
  // canonical list (unexpected data) is appended at the end rather
  // than silently dropped.
  const tacticsPresent = [...byTactic.keys()];
  const orderedTactics = [
    ...ATTCK_TACTIC_ORDER.filter((t) => byTactic.has(t)),
    ...tacticsPresent.filter((t) => !ATTCK_TACTIC_ORDER.includes(t)),
  ];

  const heatCellStyle = (count) => {
    const intensity = Math.max(0.12, count / maxCount); // floor so low counts stay visible
    return `background: rgba(245,166,35, ${intensity.toFixed(2)}); border-color: rgba(245,166,35, ${Math.min(1, intensity + 0.15).toFixed(2)});`;
  };

  return `
    <div class="panel">
      <div class="panel-title">
        <div><h3>ATT&CK matrix</h3><p>Tactics (kill-chain stage) × techniques observed, shaded by incident count</p></div>
        <span class="panel-icon">▦</span>
      </div>
      <div class="attck-matrix">
        ${orderedTactics.map((tactic) => {
          const rows = [...byTactic.get(tactic)].sort((a, b) => b.incident_count - a.incident_count);
          const tacticTotal = rows.reduce((s, r) => s + r.incident_count, 0);
          return `
            <div class="attck-col">
              <div class="attck-col-head">
                <span class="attck-col-title">${escapeHtml(tactic)}</span>
                <span class="attck-col-total">${tacticTotal}</span>
              </div>
              ${rows.map((row) => `
                <div class="attck-cell" style="${heatCellStyle(row.incident_count)}" title="${escapeHtml(row.technique_name)} — ${row.incident_count} incident(s)">
                  <code>${escapeHtml(row.technique_id)}</code>
                  <span>${escapeHtml(row.technique_name)}</span>
                  <b>${row.incident_count}</b>
                </div>
              `).join("")}
            </div>
          `;
        }).join("")}
      </div>
      <p style="color:var(--text-faint);font-size:11px;font-family:var(--font-mono);margin:10px 0 0;">
        Columns follow the ATT&CK Enterprise kill-chain order. Darker cell = more incidents used that technique.
      </p>
    </div>
  `;
}

              `).join("")}
            </tbody>
          </table>
        </div>
      </div>
      <div class="panel">
        <div class="panel-title">
          <div><h3>By attack type</h3><p>Detection &amp; response performance per attack category</p></div>
          <span class="panel-icon">▦</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Attack type</th><th>Count</th><th>MTTD mean</th><th>MTTR mean</th></tr></thead>
            <tbody>
              ${Object.entries(metricsReport.by_attack_type || {}).map(([type, m]) => `
                <tr>
                  <td>${escapeHtml(type)}</td>
                  <td>${m.count}</td>
                  <td>${fmtMinutes(m.mttd_mean)}</td>

          </table>
        </div>
      </div>
    </section>
  `;
}

  if (responseMode.error) {
    return `<div class="panel response-panel"><div class="notice error">Could not load response mode: ${escapeHtml(responseMode.error)}</div></div>`;
  }

  const isEnforce = responseMode.mode === "enforce";

  return `

      <div class="panel-title">
        <div><h3>Response mode</h3><p>Notify only, or auto-contain Critical/High incidents on detection</p></div>
        <span class="response-mode-badge ${isEnforce ? "is-enforce" : ""}">${isEnforce ? "Enforce" : "Notify"}</span>
      </div>
      <div class="response-mode-row ${isEnforce ? "is-enforce" : ""}">
        <div class="response-mode-copy">
          <b>${isEnforce ? "Auto-containment is ON" : "Auto-containment is OFF"}</b>
          <p>
            ${isEnforce
              ? "New Critical and High severity incidents are automatically blocked or quarantined the moment they're detected, and marked Contained. Every automatic action is logged to the Audit Trail."

          </p>
        </div>
        ${canManage ? `
          <button
