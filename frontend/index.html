<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cyber Control Tower — SOC Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ================================================================
   CYBER CONTROL TOWER — Design System
   ────────────────────────────────────────────────────────────────
   Dark ops-room aesthetic. IBM Plex Mono for data/labels, Inter for
   UI copy. Amber is the single brand signal; cyan is the secondary
   data accent; severity colors are semantic, not decorative.
   ================================================================ */

:root {
  --bg-base:   #090C13;
  --bg-panel:  #0D1119;
  --bg-raised: #131A24;
  --border:         #1B2332;
  --border-accent:  rgba(245,166,35,0.22);
  --border-cyan:    rgba(34,211,238,0.18);
  --text-main:  #E2E8EE;
  --text-dim:   #67778A;
  --text-faint: #3D4A58;
  --accent:       #F5A623;
  --accent-hover: #FFBE45;
  --accent-glow:  rgba(245,166,35,0.13);
  --cyan:       #22D3EE;
  --cyan-glow:  rgba(34,211,238,0.10);
  --sev-critical: #E5484D;
  --sev-crit-bg:  rgba(229,72,77,0.11);
  --sev-crit-bd:  rgba(229,72,77,0.25);
  --sev-high:     #F5A623;
  --sev-high-bg:  rgba(245,166,35,0.11);
  --sev-high-bd:  rgba(245,166,35,0.25);
  --sev-medium:   #E8C547;
  --sev-med-bg:   rgba(232,197,71,0.11);
  --sev-med-bd:   rgba(232,197,71,0.25);
  --sev-low:      #3FB68B;
  --sev-low-bg:   rgba(63,182,139,0.11);
  --sev-low-bd:   rgba(63,182,139,0.25);
  --font-ui:   'Inter', system-ui, sans-serif;
  --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
  --r:    8px;
  --r-lg: 12px;
  --r-xl: 16px;
  --r-pill: 999px;
}

*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  background: var(--bg-base);
  color: var(--text-main);
  font-family: var(--font-ui);
}

body::before {
  content: "";
  position: fixed; inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,0.013) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.013) 1px, transparent 1px);
  background-size: 32px 32px;
  z-index: 0;
}

body::after {
  content: "";
  position: fixed; inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 14% 0%, rgba(245,166,35,0.05), transparent 38%),
    radial-gradient(circle at 87% 6%, rgba(34,211,238,0.05), transparent 34%);
  z-index: 0;
}

button, input, select { font: inherit; }
::selection { background: var(--accent); color: #0A0900; }
a { color: var(--accent); text-decoration: none; }

/* ═══════════════════════════════════════
   LOGIN SCREEN
═══════════════════════════════════════ */
.login-shell {
  min-height: 100vh;
  display: grid; place-items: center;
  position: relative; z-index: 1;
  padding: 24px;
}

.login-card {
  width: 100%; max-width: 428px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 28px;
}

.login-brand {
  display: flex; align-items: center; gap: 11px;
  margin-bottom: 4px;
}

.login-brand .logo {
  width: 34px; height: 34px;
  border-radius: var(--r);
  display: grid; place-items: center;
  font-size: 16px;
  color: var(--bg-base);
  background: var(--accent);
  box-shadow: 0 0 22px var(--accent-glow);
  flex-shrink: 0;
}

.login-brand h1 {
  margin: 0;
  font-size: 14px; font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: 0.07em;
  text-transform: uppercase;
}

.login-card > p.subtitle {
  margin: 14px 0 22px;
  color: var(--text-dim);
  font-size: 13px;
}

.field { margin-bottom: 14px; }

.field label {
  display: block;
  color: var(--text-dim);
  font-size: 10px; font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 6px;
}

.field input {
  width: 100%;
  border: 1px solid var(--border);
  color: var(--text-main);
  background: var(--bg-raised);
  border-radius: var(--r);
  outline: none;
  padding: 11px 12px; font-size: 14px;
  transition: border-color 0.15s;
}

.field input:focus { border-color: var(--accent); }

.login-error {
  margin-bottom: 14px;
  padding: 10px 12px;
  border-radius: var(--r);
  background: var(--sev-crit-bg);
  border: 1px solid var(--sev-crit-bd);
  color: var(--sev-critical);
  font-size: 12px; font-family: var(--font-mono);
}

.login-submit {
  width: 100%;
  border: 0; border-radius: var(--r);
  padding: 12px 13px;
  cursor: pointer; font-weight: 700; font-size: 14px;
  background: var(--accent);
  color: #0A0900;
  transition: all 0.15s ease;
}

.login-submit:hover:not(:disabled) {
  background: var(--accent-hover);
  box-shadow: 0 0 22px var(--accent-glow);
}

.login-submit:disabled { opacity: 0.6; cursor: default; }

.login-divider {
  margin: 22px 0 16px;
  border-top: 1px solid var(--border);
  position: relative;
}

.demo-label {
  color: var(--text-faint);
  font-size: 9px; font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: 0.13em; text-transform: uppercase;
  margin-bottom: 11px;
}

.demo-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
  padding: 10px 0;
}

.demo-row + .demo-row { border-top: 1px solid var(--border); }

.demo-row-id b {
  display: block; color: var(--text-main); font-size: 13px;
}

.demo-row-id code {
  display: block; margin-top: 2px;
  color: var(--accent); font-family: var(--font-mono); font-size: 11px;
}

.demo-use-btn {
  border: 1px solid var(--border);
  background: var(--bg-raised);
  color: var(--text-main);
  border-radius: var(--r);
  padding: 7px 12px;
  font-size: 12px; font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}

.demo-use-btn:hover { border-color: var(--accent); color: var(--accent); }

.login-back {
  display: block; text-align: center;
  margin-top: 18px;
  color: var(--text-dim);
  font-size: 12px;
}

.login-back:hover { color: var(--text-main); }

/* ═══════════════════════════════════════
   APP SHELL
═══════════════════════════════════════ */
.cct-app {
  min-height: 100vh;
  display: flex;
  position: relative;
  z-index: 1;
}

/* ═══════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════ */
.sidebar {
  width: 248px;
  min-height: 100vh;
  position: sticky;
  top: 0; height: 100vh;
  padding: 16px 11px 16px 12px;
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  flex-shrink: 0;
}

.brand {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 11px 12px;
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  background: rgba(255,255,255,0.018);
  text-decoration: none;
}

.logo {
  width: 40px; height: 40px;
  border-radius: var(--r);
  display: grid; place-items: center;
  font-size: 19px;
  color: var(--bg-base);
  background: var(--accent);
  box-shadow: 0 0 22px var(--accent-glow);
  flex-shrink: 0;
}

.brand h1 {
  margin: 0;
  font-size: 13px; font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: 0.07em;
  color: var(--text-main);
  text-transform: uppercase;
}

.brand p {
  margin: 2px 0 0;
  color: var(--text-dim);
  font-size: 10px;
  font-family: var(--font-mono);
}

.user-card {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
  margin-top: 10px;
  padding: 10px 11px;
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  background: var(--bg-raised);
}

.user-card-id b {
  display: block; color: var(--text-main); font-size: 12px;
}

.user-card-id span {
  display: block; margin-top: 2px;
  color: var(--accent); font-size: 10px;
  font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.06em;
}

.logout-btn {
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  border-radius: var(--r);
  padding: 6px 9px;
  font-size: 11px; font-weight: 600;
  cursor: pointer;
  flex-shrink: 0;
}

.logout-btn:hover { color: var(--sev-critical); border-color: var(--sev-crit-bd); background: var(--sev-crit-bg); }

nav {
  margin-top: 16px;
  display: flex; flex-direction: column;
  gap: 2px;
}

.nav-section-label {
  margin: 14px 0 4px 11px;
  color: var(--text-faint);
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.13em; text-transform: uppercase;
  font-family: var(--font-mono);
}

nav button {
  width: 100%;
  padding: 9px 11px;
  border: 0;
  border-radius: var(--r);
  color: var(--text-dim);
  background: transparent;
  text-align: left;
  cursor: pointer;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px; font-weight: 500;
  transition: all 0.15s ease;
  position: relative;
  gap: 8px;
}

nav button:hover { background: var(--bg-raised); color: var(--text-main); }
nav button:focus { outline: none; }
nav button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

.nav-active {
  background: var(--accent-glow) !important;
  color: var(--accent) !important;
  font-weight: 600 !important;
}

.nav-active::before {
  content: '';
  position: absolute; left: 0; top: 5px; bottom: 5px;
  width: 3px;
  background: var(--accent);
  border-radius: var(--r-pill);
}

nav button span.badge {
  background: var(--sev-crit-bg);
  color: var(--sev-critical);
  border: 1px solid var(--sev-crit-bd);
  padding: 2px 7px;
  border-radius: var(--r-pill);
  font-size: 10px;
  font-family: var(--font-mono);
  font-weight: 700;
  flex-shrink: 0;
}

nav button .nav-label { display: flex; align-items: center; gap: 7px; overflow: hidden; }
nav button .nav-lock { color: var(--text-faint); font-size: 11px; flex-shrink: 0; }

.sidebar-note {
  margin-top: auto;
  padding: 13px;
  border-radius: var(--r-lg);
  border: 1px solid var(--border-accent);
  background: var(--accent-glow);
}

.sidebar-note b {
  color: var(--accent);
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  display: block; margin-bottom: 6px;
  font-family: var(--font-mono);
}

.sidebar-note p {
  color: var(--text-dim);
  line-height: 1.6; font-size: 12px;
  margin: 0;
}

/* ═══════════════════════════════════════
   MAIN CONTENT
═══════════════════════════════════════ */
.main {
  flex: 1; min-width: 0;
  padding: 20px 22px;
  overflow-y: auto;
}

/* ═══════════════════════════════════════
   TOPBAR
═══════════════════════════════════════ */
.topbar {
  display: flex;
  justify-content: space-between;
  gap: 20px; align-items: center;
  margin-bottom: 18px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--border);
}

.topbar h1 {
  margin: 0;
  color: var(--text-main);
  font-size: 24px; letter-spacing: -0.04em; font-weight: 800;
}

.topbar p { margin: 5px 0 0; color: var(--text-dim); font-size: 13px; }

.top-actions {
  display: flex; align-items: center;
  gap: 8px; flex-wrap: wrap;
  justify-content: flex-end;
}

.top-actions > span {
  color: var(--text-dim);
  font-family: var(--font-mono); font-size: 11px;
  padding: 8px 10px;
  border-radius: var(--r);
  background: var(--bg-raised);
  border: 1px solid var(--border);
}

.live-clock {
  color: var(--accent) !important;
  background: var(--accent-glow) !important;
  border: 1px solid var(--border-accent) !important;
  letter-spacing: 0.08em !important;
  font-weight: 500 !important;
}

/* ═══════════════════════════════════════
   BUTTONS
═══════════════════════════════════════ */
.primary-btn, .ghost-btn {
  border: 0; border-radius: var(--r);
  padding: 9px 13px;
  cursor: pointer; font-weight: 600; font-size: 13px;
  transition: all 0.15s ease;
  white-space: nowrap;
}

.primary-btn {
  background: var(--accent);
  color: #0A0900; font-weight: 700;
}

.primary-btn:hover:not(:disabled) {
  background: var(--accent-hover);
  box-shadow: 0 0 22px var(--accent-glow);
}

.primary-btn:disabled { opacity: 0.55; cursor: default; }

.ghost-btn {
  color: var(--text-dim);
  background: transparent;
  border: 1px solid var(--border);
}

.ghost-btn:hover { color: var(--text-main); border-color: var(--text-dim); background: var(--bg-raised); }

/* ═══════════════════════════════════════
   NOTICE / ERROR
═══════════════════════════════════════ */
.notice {
  margin: -6px 0 16px;
  padding: 9px 13px;
  border-radius: var(--r);
  color: var(--accent);
  background: var(--accent-glow);
  border: 1px solid var(--border-accent);
  font-size: 12px; font-family: var(--font-mono);
}

.notice.error {
  color: var(--sev-critical);
  background: var(--sev-crit-bg);
  border-color: var(--sev-crit-bd);
}

/* ═══════════════════════════════════════
   STATS GRID
═══════════════════════════════════════ */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0,1fr));
  gap: 12px; margin-bottom: 18px;
}

.stat-card {
  position: relative;
  padding: 16px;
  border-radius: var(--r-lg);
  border: 1px solid var(--border);
  border-top: 2px solid var(--border);
  background: var(--bg-panel);
}

.stat-card:not(.danger):not(.warning):not(.success):not(.cyan) { border-top-color: var(--cyan); }
.stat-card.cyan    { border-top-color: var(--cyan); }
.stat-card.danger  { border-top-color: var(--sev-critical); }
.stat-card.warning { border-top-color: var(--sev-high); }
.stat-card.success { border-top-color: var(--sev-low); }

.stat-title {
  margin: 0;
  color: var(--text-dim);
  font-size: 10px; font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: 0.13em; text-transform: uppercase;
}

.stat-card h3 {
  margin: 10px 0 0;
  color: var(--text-main);
  font-size: 30px; letter-spacing: -0.05em; font-weight: 800;
  font-family: var(--font-mono);
}

.stat-subtitle { margin: 5px 0 0; color: var(--text-dim); font-size: 12px; }

.stat-dot {
  position: absolute; top: 14px; right: 14px;
  width: 8px; height: 8px;
  border-radius: var(--r-pill);
  background: var(--cyan);
  animation: dotPulse 2.2s infinite;
}

.stat-card.danger  .stat-dot { background: var(--sev-critical); }
.stat-card.warning .stat-dot { background: var(--sev-high); }
.stat-card.success .stat-dot { background: var(--sev-low); }

@keyframes dotPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.35; transform: scale(0.8); }
}

/* ═══════════════════════════════════════
   WORKSPACE / LAYOUT GRIDS
═══════════════════════════════════════ */
.workspace {
  display: grid;
  grid-template-columns: 346px minmax(0, 1fr) 326px;
  gap: 14px; align-items: start;
}

.module-layout {
  display: grid;
  grid-template-columns: 346px minmax(0, 1fr) 326px;
  gap: 14px; align-items: start;
}

.left-column, .center-column, .right-column { display: grid; gap: 14px; align-content: start; }

.module-grid { display: grid; gap: 14px; margin-top: 14px; }
.module-grid.two-column { grid-template-columns: minmax(0,1fr) minmax(0,1fr); }

/* ═══════════════════════════════════════
   PANELS
═══════════════════════════════════════ */
.panel {
  border: 1px solid var(--border);
  background: var(--bg-panel);
  border-radius: var(--r-xl);
  padding: 14px;
}

.panel-title {
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px; margin-bottom: 13px;
  padding-bottom: 11px;
  border-bottom: 1px solid var(--border);
}

.panel-title h3 {
  margin: 0;
  color: var(--text-main);
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  font-family: var(--font-mono);
}

.panel-title.compact { margin-bottom: 10px; padding-bottom: 0; border-bottom: 0; }
.panel-title.compact h3 { font-size: 11px; }

.panel-title p { margin: 3px 0 0; color: var(--text-dim); font-size: 11px; }

.panel-title > span:not(.panel-icon) {
  margin: 0;
  color: var(--text-dim); font-size: 11px;
}

.panel-icon {
  display: grid; place-items: center;
  width: 28px; height: 28px;
  border-radius: var(--r);
  background: var(--bg-raised);
  color: var(--accent) !important;
  margin: 0 !important;
  font-size: 13px;
  border: 1px solid var(--border);
  flex-shrink: 0;
}

.lock-banner {
  display: flex; align-items: center; gap: 12px;
  padding: 22px;
  border: 1px dashed var(--border);
  border-radius: var(--r-xl);
  background: var(--bg-panel);
}

.lock-banner .lock-icon {
  width: 40px; height: 40px; flex-shrink: 0;
  display: grid; place-items: center;
  border-radius: var(--r-lg);
  background: var(--bg-raised);
  border: 1px solid var(--border);
  font-size: 18px;
  color: var(--text-dim);
}

.lock-banner h3 { margin: 0; font-size: 14px; color: var(--text-main); }
.lock-banner p { margin: 4px 0 0; font-size: 12px; color: var(--text-dim); line-height: 1.5; }

/* ═══════════════════════════════════════
   FILTERS / SEARCH
═══════════════════════════════════════ */
.filters {
  display: grid;
  grid-template-columns: 1fr 96px;
  gap: 8px; margin-bottom: 11px;
}

.filters input, .filters select {
  width: 100%;
  border: 1px solid var(--border);
  color: var(--text-main);
  background: var(--bg-raised);
  border-radius: var(--r);
  outline: none;
  padding: 9px 10px; font-size: 13px;
  transition: border-color 0.15s;
}

.filters input:focus, .filters select:focus { border-color: var(--accent); }
.filters input::placeholder { color: var(--text-faint); }
.filters select option { background: var(--bg-raised); }

/* ═══════════════════════════════════════
   INCIDENT LIST
═══════════════════════════════════════ */
.incident-list { display: grid; gap: 8px; max-height: 640px; overflow-y: auto; padding-right: 2px; }

.incident-item {
  width: 100%; text-align: left;
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  background: var(--bg-raised);
  padding: 11px;
  cursor: pointer; color: inherit;
  transition: all 0.15s ease;
}

.incident-item:hover {
  border-color: rgba(255,255,255,0.14);
  background: #19212F;
  transform: translateY(-1px);
}

.incident-item.active {
  border-color: var(--accent);
  background: var(--accent-glow);
}

.incident-top {
  display: flex; justify-content: space-between;
  gap: 10px; align-items: flex-start;
}

.incident-meta {
  display: flex; gap: 7px; align-items: center;
  margin-bottom: 5px; flex-wrap: wrap;
}

.incident-item h4 {
  margin: 0;
  color: var(--text-main);
  line-height: 1.35; font-size: 13px; font-weight: 600;
}

/* ═══════════════════════════════════════
   SEVERITY / STATUS BADGES
═══════════════════════════════════════ */
.sev {
  display: inline-flex; align-items: center;
  border-radius: var(--r-pill); border: 1px solid;
  padding: 2px 7px;
  font-size: 9px; font-weight: 800;
  font-family: var(--font-mono);
  letter-spacing: 0.05em; text-transform: uppercase;
  white-space: nowrap;
}

.sev-critical { color:var(--sev-critical); background:var(--sev-crit-bg); border-color:var(--sev-crit-bd); }
.sev-high     { color:var(--sev-high);     background:var(--sev-high-bg); border-color:var(--sev-high-bd); }
.sev-medium   { color:var(--sev-medium);   background:var(--sev-med-bg);  border-color:var(--sev-med-bd);  }
.sev-low      { color:var(--sev-low);      background:var(--sev-low-bg);  border-color:var(--sev-low-bd);  }

.status-pill {
  display: inline-flex; align-items: center; gap: 5px;
  border-radius: var(--r-pill); border: 1px solid var(--border);
  background: var(--bg-raised);
  padding: 2px 8px;
  font-size: 9px; font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: 0.05em; text-transform: uppercase;
  color: var(--text-dim);
  white-space: nowrap;
}

.status-pill.status-open          { color: var(--text-dim); }
.status-pill.status-investigating { color: var(--cyan); border-color: var(--border-cyan); background: var(--cyan-glow); }
.status-pill.status-contained     { color: var(--sev-low); border-color: var(--sev-low-bd); background: var(--sev-low-bg); }
.status-pill.status-resolved      { color: var(--accent); border-color: var(--border-accent); background: var(--accent-glow); }

/* ═══════════════════════════════════════
   RISK BOX
═══════════════════════════════════════ */
.risk-box {
  flex: 0 0 auto; min-width: 50px;
  text-align: center;
  border-radius: var(--r);
  padding: 7px 8px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
}

.risk-box strong {
  display: block;
  color: var(--text-main);
  font-size: 17px; font-weight: 700;
  font-family: var(--font-mono);
}

.risk-box span {
  color: var(--text-dim);
  font-size: 9px; text-transform: uppercase;
  letter-spacing: 0.1em;
  font-family: var(--font-mono);
}

/* ═══════════════════════════════════════
   INCIDENT GRID (mini meta)
═══════════════════════════════════════ */
.incident-grid {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 5px; margin-top: 9px;
}

.incident-grid div {
  padding: 6px 7px;
  border-radius: var(--r);
  background: rgba(0,0,0,0.25);
  border: 1px solid var(--border);
}

.incident-grid span {
  display: block;
  color: var(--text-dim);
  font-size: 9px; font-family: var(--font-mono);
  text-transform: uppercase; letter-spacing: 0.08em;
}

.incident-grid b {
  display: block; margin-top: 3px;
  color: var(--text-main);
  font-size: 11px; font-family: var(--font-mono);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ═══════════════════════════════════════
   DETAIL CARD
═══════════════════════════════════════ */
.detail-header {
  display: flex; justify-content: space-between;
  gap: 16px; align-items: flex-start;
}

.tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }

.soft-tag {
  border: 1px solid var(--border);
  background: var(--bg-raised);
  color: var(--text-dim);
  border-radius: var(--r-pill);
  padding: 3px 8px;
  font-size: 10px; font-family: var(--font-mono);
}

.detail-panel h2 {
  color: var(--text-main);
  margin: 6px 0 0;
  font-size: 19px; letter-spacing: -0.03em; font-weight: 700;
  line-height: 1.3;
}

.detail-panel p.summary {
  color: var(--text-dim);
  line-height: 1.65; margin: 8px 0 0; font-size: 13px;
}

.detail-actions { display: flex; gap: 8px; flex-shrink: 0; align-items: center; flex-wrap: wrap; }

.status-select {
  border: 1px solid var(--border);
  background: var(--bg-raised);
  color: var(--text-main);
  border-radius: var(--r);
  padding: 8px 10px; font-size: 12px;
  font-family: var(--font-mono);
}

.info-grid {
  display: grid; grid-template-columns: repeat(3, minmax(0,1fr));
  gap: 8px; margin-top: 14px;
}

.info-tile {
  padding: 11px;
  border-radius: var(--r);
  background: var(--bg-raised);
  border: 1px solid var(--border);
}

.info-tile span {
  display: block; color: var(--text-dim);
  font-size: 9px; font-family: var(--font-mono);
  text-transform: uppercase; letter-spacing: 0.1em;
}

.info-tile strong {
  display: block; color: var(--text-main);
  margin-top: 5px; font-size: 12px;
  font-family: var(--font-mono);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ═══════════════════════════════════════
   RISK GAUGE
═══════════════════════════════════════ */
.middle-grid {
  display: grid; grid-template-columns: 235px minmax(0,1fr);
  gap: 14px;
}

.risk-gauge-card {
  min-height: 275px; padding: 16px;
  border-radius: var(--r-xl);
  border: 1px solid var(--border);
  background: var(--bg-panel);
  display: grid; align-content: center;
  justify-items: center; text-align: center;
}

.gauge-wrap {
  position: relative; width: 155px; height: 155px;
  border-radius: 50%; display: grid; place-items: center;
  overflow: hidden;
  background: var(--bg-base);
  border: 1px solid var(--border);
}

.gauge-track, .gauge-fill {
  position: absolute; inset: 9px; border-radius: 50%;
  border: 10px solid var(--bg-raised);
}

.gauge-fill {
  border-color: var(--accent) transparent transparent transparent;
  transition: transform .38s cubic-bezier(.4,0,.2,1);
}

.gauge-inner {
  position: relative; width: 107px; height: 107px;
  border-radius: 50%;
  background: var(--bg-panel);
  display: grid; place-items: center; align-content: center;
  border: 1px solid var(--border);
}

.gauge-inner strong {
  color: var(--text-main); font-size: 35px;
  letter-spacing: -0.07em;
  font-family: var(--font-mono); font-weight: 700;
}

.gauge-inner span {
  color: var(--text-dim); font-size: 9px;
  font-family: var(--font-mono); text-transform: uppercase;
  letter-spacing: 0.07em;
}

.risk-gauge-card p {
  color: var(--text-dim); font-size: 12px;
  line-height: 1.6; max-width: 195px; margin-top: 13px;
}

/* ═══════════════════════════════════════
   GRAPH / DIGITAL TWIN
═══════════════════════════════════════ */
.graph-panel { min-height: 275px; }

#cyGraph {
  height: 460px;
  border-radius: var(--r);
  background: var(--bg-raised);
  border: 1px solid var(--border);
}

.graph-legend {
  display: flex; gap: 14px; flex-wrap: wrap;
  margin-top: 10px;
}

.graph-legend span {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--text-dim); font-size: 11px;
}

.legend-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }

/* ═══════════════════════════════════════
   CHARTS
═══════════════════════════════════════ */
.charts-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 14px; margin-top: 14px;
}

.chart-card { min-height: 180px; }

.line-chart {
  width: 100%; height: 110px;
  stroke: var(--cyan); stroke-width: 2;
  fill: none;
}

.bars { display: grid; gap: 9px; margin-top: 4px; }

.bar-row { display: grid; grid-template-columns: 70px 1fr 32px; align-items: center; gap: 9px; }
.bar-row span { color: var(--text-dim); font-size: 12px; }
.bar-row div { height: 7px; border-radius: var(--r-pill); background: var(--bg-raised); overflow: hidden; }
.bar-row i { display: block; height: 100%; background: var(--accent); border-radius: var(--r-pill); }
.bar-row b { color: var(--text-main); font-size: 12px; font-family: var(--font-mono); text-align: right; }

/* ═══════════════════════════════════════
   SOURCES / BACKEND PANEL
═══════════════════════════════════════ */
.source-list { display: grid; gap: 8px; }

.source-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 9px 10px;
  border-radius: var(--r);
  background: var(--bg-raised);
  border: 1px solid var(--border);
}

.source-row > div { display: flex; align-items: center; gap: 9px; }
.source-row b { color: var(--text-main); font-size: 12px; display: block; }
.source-row p { margin: 1px 0 0; color: var(--text-dim); font-size: 11px; }
.source-row > span { color: var(--text-dim); font-size: 11px; font-family: var(--font-mono); }

.status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.status-dot.online { background: var(--sev-low); box-shadow: 0 0 8px var(--sev-low); }
.status-dot.delay  { background: var(--sev-high); }

.api-list { display: grid; gap: 6px; }
.api-list code {
  display: block; padding: 8px 10px;
  border-radius: var(--r);
  background: var(--bg-raised);
  border: 1px solid var(--border);
  color: var(--cyan); font-size: 11px;
}

/* ═══════════════════════════════════════
   TIMELINE
═══════════════════════════════════════ */
.timeline { display: grid; gap: 0; }

.timeline-row {
  display: grid; grid-template-columns: 50px 16px 1fr;
  gap: 10px; padding-bottom: 16px; position: relative;
}

.timeline-row:not(:last-child)::before {
  content: ''; position: absolute; left: 57px; top: 16px; bottom: 0;
  width: 1px; background: var(--border);
}

.timeline-row .time {
  color: var(--text-dim); font-size: 11px; font-family: var(--font-mono); padding-top: 2px;
}

.timeline-row .node {
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--accent); margin-top: 4px; flex-shrink: 0;
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.timeline-row b { display: block; color: var(--text-main); font-size: 13px; }
.timeline-row p { margin: 3px 0 0; color: var(--text-dim); font-size: 12px; line-height: 1.4; }

/* ═══════════════════════════════════════
   MITRE HEATMAP
═══════════════════════════════════════ */
.heatmap-list { display: grid; gap: 7px; }

.heatmap-row {
  display: grid; grid-template-columns: 64px 1fr 90px 50px;
  align-items: center; gap: 10px;
  padding: 8px 9px;
  border-radius: var(--r);
  background: var(--bg-raised);
  border: 1px solid var(--border);
}

.heatmap-row code { color: var(--cyan); font-size: 11px; }
.heatmap-row .tname { color: var(--text-main); font-size: 12px; }
.heatmap-row .ttactic { color: var(--text-dim); font-size: 10px; }
.heatmap-row .tcount { text-align: right; color: var(--text-main); font-family: var(--font-mono); font-size: 13px; font-weight: 700; }

.heatmap-bar { height: 5px; border-radius: var(--r-pill); background: var(--bg-base); overflow: hidden; margin-top: 4px; }
.heatmap-bar i { display: block; height: 100%; background: var(--cyan); }

/* ═══════════════════════════════════════
   ATTACK CHAIN FLOW
═══════════════════════════════════════ */
.chain-flow {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  gap: 0;
}

.chain-node {
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding: 10px 12px;
  border-radius: var(--r);
  border: 1px solid var(--border);
  background: var(--bg-raised);
  border-left: 3px solid var(--text-faint);
}

.chain-node.sev-critical { border-left-color: var(--sev-critical); background: var(--sev-crit-bg); }
.chain-node.sev-high     { border-left-color: var(--sev-high);     background: var(--sev-high-bg); }
.chain-node.sev-medium   { border-left-color: var(--sev-medium);   background: var(--sev-med-bg); }
.chain-node.sev-low      { border-left-color: var(--sev-low);      background: var(--sev-low-bg); }

.chain-node-top {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}

.chain-node-label {
  color: var(--text-main); font-size: 13px; font-weight: 600;
}

.chain-node-id {
  color: var(--cyan);
  font-family: var(--font-mono); font-size: 11px;
  background: var(--bg-base);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 2px 7px;
  flex-shrink: 0;
}

.chain-node-tactic {
  color: var(--text-dim);
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: 0.04em; text-transform: uppercase;
}

.chain-node-conf {
  color: var(--text-faint);
  font-family: var(--font-mono); font-size: 10px;
}

/* A "stage" is one ATT&CK tactic in the lifecycle. It can contain several
   correlated techniques, which is what makes the chain reflect the real
   attacker journey instead of one node per technique. */
.chain-stage-header {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  margin-bottom: 6px;
}

.chain-stage-techniques {
  display: flex; flex-direction: column; gap: 6px;
}

.chain-tech-chip {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px;
  border-radius: var(--r);
  background: var(--bg-base);
  border: 1px solid var(--border);
  font-size: 12px;
}

.chain-tech-chip span { color: var(--text-main); flex: 1; }
.chain-tech-chip em {
  color: var(--text-dim); font-style: normal;
  font-family: var(--font-mono); font-size: 11px;
}

.chain-stage-empty {
  color: var(--text-faint); font-size: 11px; margin: 0;
  font-style: italic; line-height: 1.4;
}

/* Overall Chain Confidence / Chain Risk Score badges shown above the flow */
.chain-confidence-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px;
  margin-bottom: 12px;
}

.chain-confidence-badge {
  display: flex; flex-direction: column; gap: 4px;
  padding: 10px 12px;
  border-radius: var(--r);
  background: var(--bg-raised);
  border: 1px solid var(--border);
  cursor: help;
}

.chain-confidence-badge span {
  color: var(--text-dim); font-size: 10px; font-weight: 700;
  font-family: var(--font-mono); letter-spacing: 0.06em; text-transform: uppercase;
}

.chain-confidence-badge strong {
  color: var(--text-main); font-size: 18px; font-family: var(--font-mono);
}

/* Risk Contributors — plain-language justification for the risk score,
   so a number never appears on screen without an explanation attached. */
.risk-contributors {
  margin-bottom: 14px;
  padding: 10px 12px;
  border-radius: var(--r);
  background: var(--bg-raised);
  border: 1px solid var(--border);
}

.risk-contributors-title {
  display: block;
  color: var(--text-dim); font-size: 10px; font-weight: 700;
  font-family: var(--font-mono); letter-spacing: 0.06em; text-transform: uppercase;
  margin-bottom: 8px;
}

.risk-contributors-list {
  display: flex; flex-wrap: wrap; gap: 6px;
}

.risk-contributor-chip {
  padding: 3px 9px;
  border-radius: var(--r-pill);
  background: var(--bg-base);
  border: 1px solid var(--border);
  color: var(--text-main);
  font-size: 11px;
}

.chain-arrow {
  display: flex; justify-content: center;
  color: var(--text-faint);
  font-size: 13px;
  line-height: 1;
  padding: 3px 0;
}

.chain-legend {
  display: flex; flex-wrap: wrap; gap: 12px;
  margin-top: 12px; padding-top: 10px;
  border-top: 1px solid var(--border);
}

.chain-legend span {
  display: flex; align-items: center; gap: 6px;
  color: var(--text-dim); font-size: 11px;
}

/* Attack Chain Summary card */
.chain-summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
}

.chain-summary-item {
  display: flex; flex-direction: column; gap: 4px;
  padding: 10px 11px;
  border-radius: var(--r);
  background: var(--bg-raised);
  border: 1px solid var(--border);
}

.chain-summary-item span {
  color: var(--text-dim); font-size: 10px; font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: 0.08em; text-transform: uppercase;
}

.chain-summary-item strong {
  color: var(--text-main); font-size: 15px; font-family: var(--font-mono);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* Clickable KPI value (Attack Chains stat) */
.stat-value-btn {
  background: none; border: 0; padding: 0; margin: 0;
  font: inherit; color: inherit; cursor: pointer;
  text-align: left;
}

.stat-value-btn:hover, .stat-value-btn:focus-visible {
  color: var(--accent);
  text-decoration: underline;
  outline: none;
}

/* ═══════════════════════════════════════
   TRUST SCORE LEADERBOARD
═══════════════════════════════════════ */
.leaderboard-list { display: grid; gap: 7px; }

.leaderboard-row {
  display: grid; grid-template-columns: 28px 1fr 70px 110px;
  align-items: center; gap: 10px;
  padding: 9px 10px;
  border-radius: var(--r);
  background: var(--bg-raised);
  border: 1px solid var(--border);
  cursor: pointer;
}

.leaderboard-row:hover { border-color: var(--accent); }
.leaderboard-row .rank { color: var(--text-faint); font-family: var(--font-mono); font-size: 12px; }
.leaderboard-row .name { color: var(--text-main); font-size: 13px; }
.leaderboard-row .score { text-align: right; font-family: var(--font-mono); font-weight: 700; font-size: 14px; }

/* ═══════════════════════════════════════
   METRICS TABLE
═══════════════════════════════════════ */
.metrics-tiles {
  display: grid; grid-template-columns: repeat(4, minmax(0,1fr));
  gap: 10px;
}

.metric-tile {
  padding: 13px;
  border-radius: var(--r-lg);
  background: var(--bg-raised);
  border: 1px solid var(--border);
  text-align: center;
}

.metric-tile span { display: block; color: var(--text-dim); font-size: 10px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.08em; }
.metric-tile strong { display: block; margin-top: 6px; color: var(--text-main); font-size: 21px; font-family: var(--font-mono); }

/* ═══════════════════════════════════════
   AUDIT LIST
═══════════════════════════════════════ */
.audit-list { display: grid; gap: 0; max-height: 600px; overflow-y: auto; }

.audit-row {
  display: grid; grid-template-columns: 64px 1fr;
  gap: 12px; padding: 11px 0;
  border-bottom: 1px solid var(--border);
}

.audit-row:last-child { border-bottom: 0; }

.audit-row > span {
  color: var(--accent); font-weight: 700;
  font-family: var(--font-mono); font-size: 10px;
  padding-top: 2px;
}

.audit-row b { color: var(--text-main); font-size: 13px; }
.audit-row p { margin: 4px 0 0; color: var(--text-dim); font-size: 12px; line-height: 1.4; }

/* ═══════════════════════════════════════
   SEARCH / THREAT HUNTING
═══════════════════════════════════════ */
.hunt-bar {
  display: grid; grid-template-columns: 1fr 100px;
  gap: 8px; margin-bottom: 12px;
}

.hunt-bar input {
  width: 100%;
  border: 1px solid var(--border);
  color: var(--text-main);
  background: var(--bg-raised);
  border-radius: var(--r);
  outline: none;
  padding: 10px 12px; font-size: 13px;
  font-family: var(--font-mono);
}

.hunt-bar input:focus { border-color: var(--accent); }

.hunt-chips { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; }

.hunt-chip {
  border: 1px solid var(--border);
  background: var(--bg-raised);
  color: var(--text-dim);
  border-radius: var(--r-pill);
  padding: 6px 11px;
  font-size: 11px; font-family: var(--font-mono);
  cursor: pointer;
  transition: all 0.15s;
}

.hunt-chip:hover { color: var(--cyan); border-color: var(--border-cyan); background: var(--cyan-glow); }

.hunt-results-meta {
  color: var(--text-dim); font-size: 12px; font-family: var(--font-mono);
  margin-bottom: 10px;
}

/* ═══════════════════════════════════════
   TABLE
═══════════════════════════════════════ */
.table-wrap { overflow-x: auto; }

table {
  width: 100%; border-collapse: separate;
  border-spacing: 0 6px; min-width: 640px;
}

th {
  color: var(--text-dim); font-size: 10px;
  text-align: left; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em;
  padding: 0 12px 5px;
  font-family: var(--font-mono);
}

td {
  color: var(--text-main); padding: 11px 12px;
  background: var(--bg-raised);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}

td:first-child { border-left: 1px solid var(--border); border-radius: var(--r) 0 0 var(--r); }
td:last-child  { border-right: 1px solid var(--border); border-radius: 0 var(--r) var(--r) 0; }

tbody tr { cursor: pointer; transition: all 0.1s; }
tbody tr:hover td { background: var(--accent-glow); border-color: var(--accent); }

.empty-state { color: var(--text-dim); font-size: 13px; text-align: center; padding: 30px 10px; }

.loading-state {
  display: flex; align-items: center; justify-content: center;
  min-height: 240px;
  color: var(--text-dim); font-size: 13px; font-family: var(--font-mono);
}

/* ═══════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════ */
@media (max-width: 1500px) {
  .workspace { grid-template-columns: 326px minmax(0, 1fr); }
  .right-column { grid-column: 1 / -1; grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .module-layout { grid-template-columns: 326px minmax(0, 1fr); }
  .module-layout .right-column { grid-column: 1 / -1; grid-template-columns: repeat(3, minmax(0, 1fr)); }
}

@media (max-width: 1180px) {
  .sidebar { display: none; }
  .workspace, .module-layout { grid-template-columns: 1fr; }
  .right-column, .module-layout .right-column { grid-template-columns: 1fr; }
  .middle-grid, .charts-grid, .module-grid.two-column { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
  .metrics-tiles { grid-template-columns: repeat(2, minmax(0,1fr)); }
}

@media (max-width: 720px) {
  .main { padding: 14px; }
  .topbar, .detail-header { display: block; }
  .top-actions, .detail-actions { margin-top: 12px; justify-content: flex-start; }
  .stats-grid, .info-grid { grid-template-columns: 1fr; }
  .chain-summary-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
  .filters, .hunt-bar { grid-template-columns: 1fr; }
  .topbar h1 { font-size: 22px; }
}

═══════════════════════════════════════ */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-base); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: var(--r-pill); }

</head>
<body>
<div id="app"></div>
<script>
/* ================================================================
   CYBER CONTROL TOWER — Application
   ================================================================ */
const API_BASE = "";

async function api(path, options = {}) {
  const res = await fetch(API_BASE + path, {
    credentials: "include",
    headers: { "Content-Type": "application/json", ...(options.headers || {}) },
    ...options,
  });
  let body = null;
  try { body = await res.json(); } catch (e) { /* no body */ }
  if (!res.ok) {
    const err = new Error((body && (body.message || body.error)) || `Request failed (${res.status})`);
    err.status = res.status;
    err.body = body;
    throw err;
  }
  return body;
}

/* ── Global state ── */

/* ── Global auth state ── */
let currentUser    = null;
let permissions    = {};
let authMode       = "login";     // "login" | "register"
let authError      = "";
let authSuccess    = "";
let authSubmitting = false;

let activePage = "command";
let incidents = [];
let incidentsLoaded = false;
let incidentsError = "";
let selectedId = null;
let query = "";
let severityFilter = "All";
let notice = "";

let summary = null;
let graphData = null;
let mitreHeatmap = null;
let trustBoard = null;
let metricsReport = null;
let auditLog = null;
let huntQuery = "";
let huntResults = null;
let huntSuggested = [];
let demoAccounts = [];

const app = document.getElementById("app");

/* ── Utilities ── */
function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function severityClass(severity) {
  if (severity === "Critical") return "sev sev-critical";
  if (severity === "High")     return "sev sev-high";
  if (severity === "Medium")   return "sev sev-medium";
  return "sev sev-low";
}

function statusClass(status) {
  return "status-pill status-" + String(status || "open").toLowerCase();
}

function riskLabel(risk) {
  if (risk >= 80) return "Critical Exposure";
  if (risk >= 60) return "High Risk";
  if (risk >= 30) return "Needs Review";
  return "Stable";
}

function fmtDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return d.toLocaleString("en-US", { month: "short", day: "numeric", year: "numeric", hour: "2-digit", minute: "2-digit" });
}

function fmtMinutes(mins) {
  if (mins == null) return "—";
  if (mins < 60) return `${mins.toFixed(1)}m`;
  const h = Math.floor(mins / 60);
  const m = Math.round(mins % 60);
  return `${h}h ${m}m`;
}

function debounce(fn, ms) {
  let t = null;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

/* ══════════════════════════════════════════════════════════
   AUTH SCREEN  (login + register in one card with tabs)
══════════════════════════════════════════════════════════ */
function renderLogin() {
  app.innerHTML = `
    <div class="login-shell">
      <div class="login-card">

        <div class="login-brand">
          <div class="logo">⛭</div>
          <h1>Cyber Control Tower</h1>
        </div>
        <p class="subtitle">Sign in to access the SOC console.</p>

        <!-- Tab switcher -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--r);padding:4px;margin-bottom:20px;">
          <button
            id="tabLogin"
            style="border:0;border-radius:6px;padding:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;
                   background:${authMode==='login' ? 'var(--bg-panel)' : 'transparent'};
                   color:${authMode==='login' ? 'var(--accent)' : 'var(--text-dim)'};
                   ${authMode==='login' ? 'border:1px solid var(--border-accent);' : ''}">
            Sign in
          </button>
          <button
            id="tabRegister"
            style="border:0;border-radius:6px;padding:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;
                   background:${authMode==='register' ? 'var(--bg-panel)' : 'transparent'};
                   color:${authMode==='register' ? 'var(--accent)' : 'var(--text-dim)'};
                   ${authMode==='register' ? 'border:1px solid var(--border-accent);' : ''}">
            Sign up
          </button>
        </div>

        <!-- Error message -->
        ${authError   ? `<div class="login-error">${escapeHtml(authError)}</div>`   : ""}
        ${authSuccess ? `<div style="margin-bottom:14px;padding:10px 12px;border-radius:var(--r);background:var(--sev-low-bg);border:1px solid var(--sev-low-bd);color:var(--sev-low);font-size:12px;font-family:var(--font-mono);">${escapeHtml(authSuccess)}</div>` : ""}

        <!-- SIGN IN FORM -->
        ${authMode === "login" ? `
          <div id="loginForm">
            <div class="field">
              <label for="loginUsername">Username</label>
              <input id="loginUsername" autocomplete="username" placeholder="analyst" />
            </div>
            <div class="field">
              <label for="loginPassword">Password</label>
              <input id="loginPassword" type="password" autocomplete="current-password" placeholder="••••••••" />
            </div>
            <button class="login-submit" id="loginBtn" ${authSubmitting ? "disabled" : ""}>
              ${authSubmitting ? "Signing in…" : "Sign in"}
            </button>
          </div>

          <div class="login-divider"></div>
          <p class="demo-label">Demo accounts</p>
          ${demoAccounts.map((acc) => `
            <div class="demo-row">
              <div class="demo-row-id">
                <b>${escapeHtml(acc.role_label)}</b>
                <code>${escapeHtml(acc.username)} / ${escapeHtml(acc.password)}</code>
              </div>
              <button class="demo-use-btn"
                data-demo-user="${escapeHtml(acc.username)}"
                data-demo-pass="${escapeHtml(acc.password)}">Use</button>
            </div>
          `).join("")}
        ` : ""}

        <!-- SIGN UP FORM -->
        ${authMode === "register" ? `
          <div id="registerForm">
            <div class="field">
              <label for="regUsername">Username <span style="color:var(--sev-critical)">*</span></label>
              <input id="regUsername" autocomplete="username" placeholder="e.g. john_doe (min. 3 chars)" />
            </div>
            <div class="field">
              <label for="regDisplay">Display name</label>
              <input id="regDisplay" placeholder="e.g. John Smith (optional)" />
            </div>
            <div class="field">
              <label for="regRole">Role <span style="color:var(--sev-critical)">*</span></label>
              <select id="regRole" style="width:100%;border:1px solid var(--border);color:var(--text-main);background:var(--bg-raised);border-radius:var(--r);outline:none;padding:11px 12px;font-size:14px;">
                <option value="analyst">Security Analyst</option>
                <option value="manager">SOC Manager</option>
              </select>
            </div>
            <div class="field">
              <label for="regPassword">Password <span style="color:var(--sev-critical)">*</span></label>
              <input id="regPassword" type="password" autocomplete="new-password" placeholder="Min. 6 characters" />
            </div>
            <button class="login-submit" id="registerBtn" ${authSubmitting ? "disabled" : ""}>
              ${authSubmitting ? "Creating account…" : "Create account"}
            </button>
          </div>
        ` : ""}

      </div>
    </div>
  `;

  /* ── Tab switching ── */
  document.getElementById("tabLogin").addEventListener("click", () => {
    authMode = "login"; authError = ""; authSuccess = ""; renderLogin();
  });
  document.getElementById("tabRegister").addEventListener("click", () => {
    authMode = "register"; authError = ""; authSuccess = ""; renderLogin();
  });

  /* ── Sign in ── */
  if (authMode === "login") {
    const loginBtn = document.getElementById("loginBtn");

    loginBtn.addEventListener("click", () => {
      const username = (document.getElementById("loginUsername").value || "").trim();
      const password =  document.getElementById("loginPassword").value || "";
      submitLogin(username, password);
    });

    // Enter key in password field triggers login
    document.getElementById("loginPassword").addEventListener("keydown", (e) => {
      if (e.key === "Enter") loginBtn.click();
    });

    /*
     * "Use" button: FILLS the form fields only — does NOT auto-login.
     * The user reviews the credentials and clicks "Sign in" themselves.
     */
    document.querySelectorAll("[data-demo-user]").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.getElementById("loginUsername").value = btn.dataset.demoUser;
        document.getElementById("loginPassword").value = btn.dataset.demoPass;
        document.getElementById("loginBtn").focus();
      });
    });

    document.getElementById("loginUsername").focus();
  }

  /* ── Sign up ── */
  if (authMode === "register") {
    document.getElementById("registerBtn").addEventListener("click", () => {
      const username    = (document.getElementById("regUsername").value || "").trim();
      const displayName = (document.getElementById("regDisplay").value  || "").trim();
      const role        =  document.getElementById("regRole").value      || "analyst";
      const password    =  document.getElementById("regPassword").value  || "";
      submitRegister(username, displayName, role, password);
    });

    document.getElementById("regUsername").focus();
  }
}

/* ── Client-side validation before hitting the API ── */
function validateLogin(username, password) {
  if (!username)        return "Please enter your username.";
  if (!password)        return "Please enter your password.";
  return null;
}

function validateRegister(username, password) {
  if (!username)           return "Username is required.";
  if (username.length < 3) return "Username must be at least 3 characters.";
  if (!password)           return "Password is required.";
  if (password.length < 6) return "Password must be at least 6 characters.";
  return null;
}

/* ── Submit login ── */
async function submitLogin(username, password) {
  const validationError = validateLogin(username, password);
  if (validationError) {
    authError = validationError;
    renderLogin();
    return;
  }

  authSubmitting = true;
  authError      = "";
  renderLogin();

  try {
    const data = await api("/api/auth/login", {
      method: "POST",
      body: JSON.stringify({ username, password }),
    });
    currentUser    = data.user;
    permissions    = data.permissions || {};
    authSubmitting = false;
    authError      = "";
    authSuccess    = "";
    resetWorkspaceState();
    render();
  } catch (err) {
    authSubmitting = false;
    authError      = err.message || "Sign in failed. Check your username and password.";
    renderLogin();
  }
}

/* ── Submit register ── */
async function submitRegister(username, displayName, role, password) {
  const validationError = validateRegister(username, password);
  if (validationError) {
    authError = validationError;
    renderLogin();
    return;
  }

  authSubmitting = true;
  authError      = "";
  renderLogin();

  try {
    const data = await api("/api/auth/register", {
      method: "POST",
      body: JSON.stringify({ username, display_name: displayName, role, password }),
    });
    // Backend auto-logs in — same response shape as login
    currentUser    = data.user;
    permissions    = data.permissions || {};
    authSubmitting = false;
    authError      = "";
    authSuccess    = "";
    resetWorkspaceState();
    render();
  } catch (err) {
    authSubmitting = false;
    authError      = err.message || "Could not create account. Please try again.";
    renderLogin();
  }
}

async function handleLogout() {
  try { await api("/api/auth/logout", { method: "POST" }); } catch (e) { /* ignore */ }
  currentUser = null;
  permissions = {};
  authMode    = "login";
  authError   = "";
  authSuccess = "";
  resetWorkspaceState();
  render();
}

function resetWorkspaceState() {
  activePage      = "command";
  incidents       = [];
  incidentsLoaded = false;
  incidentsError  = "";
  selectedId      = null;
  query           = "";
  severityFilter  = "All";
  notice          = "";
  summary         = null;
  graphData       = null;
  mitreHeatmap    = null;
  trustBoard      = null;
  metricsReport   = null;
  auditLog        = null;
  huntQuery       = "";
  huntResults     = null;
}


async function bootstrap() {
  try {
    const accounts = await api("/api/auth/demo-accounts");
    demoAccounts = accounts;
  } catch (e) { /* non-fatal */ }

  try {
    const me = await api("/api/auth/me");
    if (me.user) {
      currentUser = me.user;
      permissions = me.permissions || {};
    }
  } catch (e) { /* not logged in */ }

  render();
}

/* ── Data loading ── */
async function loadIncidents() {
  try {
    incidents = await api("/api/incidents");
    incidentsLoaded = true;
    incidentsError = "";
    if (!selectedId && incidents.length) {
      selectedId = [...incidents].sort((a, b) => b.risk_score - a.risk_score)[0].incident_id;
    }
  } catch (err) {
    incidentsError = err.message || "Failed to load incidents.";
  }
  render();
}

async function loadSummary() {
  try { summary = await api("/api/summary"); } catch (err) { summary = { error: err.message }; }
  render();
}

async function loadGraph() {
  try { graphData = await api("/api/graph"); } catch (err) { graphData = { error: err.message }; }
  render();
}

async function loadMitreHeatmap() {
  try { mitreHeatmap = await api("/api/mitre/heatmap"); } catch (err) { mitreHeatmap = { error: err.message }; }
  render();
}

async function loadTrustBoard() {
  try { trustBoard = await api("/api/trust-scores"); } catch (err) { trustBoard = { error: err.message, status: err.status }; }
  render();
}

async function loadMetrics() {
  try { metricsReport = await api("/api/metrics"); } catch (err) { metricsReport = { error: err.message, status: err.status }; }
  render();
}

async function loadAudit() {
  try { auditLog = await api("/api/audit?limit=60"); } catch (err) { auditLog = { error: err.message }; }
  render();
}

async function loadSuggestedHunts() {
  try { huntSuggested = await api("/api/search/suggested"); } catch (e) { huntSuggested = []; }
  render();
}

async function runHunt(q) {
  huntQuery = q;
  try {
    const data = await api("/api/search?q=" + encodeURIComponent(q));
    huntResults = data;
  } catch (err) {
    huntResults = { error: err.message };
  }
  render();
}

async function changeIncidentStatus(incidentId, newStatus) {
  try {
    const updated = await api(`/api/incidents/${encodeURIComponent(incidentId)}/status`, {
      method: "POST",
      body: JSON.stringify({ status: newStatus }),
    });
    incidents = incidents.map((i) => (i.incident_id === incidentId ? updated : i));
    notice = `${incidentId} moved to ${newStatus}.`;
  } catch (err) {
    notice = "";
    showError(err.message || "Could not update status.");
  }
  render();
}

let transientError = "";
function showError(msg) {
  transientError = msg;
  render();
  setTimeout(() => { transientError = ""; render(); }, 4000);
}

/* ── Navigation ── */
const navItems = [
  { key: "command",     label: "Command Center",   cap: null },
  { key: "triage",      label: "Incident Triage",   cap: null },
  { key: "mitre",       label: "MITRE Heatmap",      cap: null },
  { key: "twin",        label: "Digital Twin & Chains", cap: null },
  { key: "hunting",     label: "Threat Hunting",     cap: null },
  { key: "trust",       label: "Trust Score",        cap: "view_trust_scores" },
  { key: "metrics",     label: "MTTD / MTTR",        cap: "view_metrics" },
  { key: "audit",       label: "Audit Trail",        cap: null },
];

const pageMeta = {
  command:  { title: "Cyber Control Tower",    subtitle: "SOC dashboard for correlation, triage, prioritization, and response." },
  triage:   { title: "Incident Triage",        subtitle: "Review correlated incidents, change workflow status, and inspect each attack story." },
  mitre:    { title: "MITRE ATT&CK Heatmap",   subtitle: "Technique frequency across all correlated incidents, mapped to the ATT&CK framework." },
  twin:     { title: "Cyber Digital Twin & Attack Chains", subtitle: "Graph view of users, hosts, and network segments derived from the live event stream — the same entities and movement that make up each incident's attack chain." },
  hunting:  { title: "Threat Hunting",         subtitle: "Run structured queries against the correlated incident set." },
  trust:    { title: "Trust Score Leaderboard", subtitle: "Behavior-based risk scoring per user account. Visible to SOC Managers." },
  metrics:  { title: "MTTD / MTTR Metrics",    subtitle: "Detection and response time performance, broken down by severity, attack type, and segment." },
  audit:    { title: "Audit Trail",            subtitle: "Real record of sign-ins, status changes, and hunt queries run in this session." },
};

function hasAccess(item) {
  if (!item.cap) return true;
  return !!permissions[item.cap];
}

function getFilteredIncidents() {
  return incidents
    .filter((item) => severityFilter === "All" || item.severity === severityFilter)
    .filter((item) =>
      `${item.incident_id} ${item.user} ${item.source_ip} ${item.dst_ip} ${item.attack_type} ${item.network_segment}`
        .toLowerCase()
        .includes(query.toLowerCase())
    )
    .sort((a, b) => b.risk_score - a.risk_score);
}

function getSelectedIncident() {
  return incidents.find((item) => item.incident_id === selectedId) || incidents[0] || null;
}

function renderNavigation() {
  return navItems.map((item) => {
    const allowed = hasAccess(item);
    return `
      <button class="${activePage === item.key ? "nav-active" : ""}" data-nav="${escapeHtml(item.key)}" ${!allowed ? 'data-locked="1"' : ""}>
        <span class="nav-label">${escapeHtml(item.label)}</span>
        ${!allowed ? '<span class="nav-lock">🔒</span>' : ""}
      </button>
    `;
  }).join("");
}

function renderTopbar(meta) {
  const now = new Date();
  const timeStr = now.toLocaleTimeString("en-US", { hour12: false });
  return `
    <header class="topbar">
      <div>
        <h1>${escapeHtml(meta.title)}</h1>
        <p>${escapeHtml(meta.subtitle)}</p>
      </div>
      <div class="top-actions">
        <span class="live-clock" id="liveClock">${escapeHtml(timeStr)}</span>
        <button class="ghost-btn" data-refresh>Refresh</button>
      </div>
    </header>
    ${notice ? `<div class="notice">${escapeHtml(notice)}</div>` : ""}
    ${transientError ? `<div class="notice error">${escapeHtml(transientError)}</div>` : ""}
  `;
}

function lockBanner(label) {
  return `
    <div class="lock-banner">
      <div class="lock-icon">🔒</div>
      <div>
        <h3>${escapeHtml(label)} is limited to the SOC Manager role</h3>
        <p>Your account (${escapeHtml(currentUser.role_label)}) doesn't have access to this view. Sign in as the SOC Manager demo account to see it.</p>
      </div>
    </div>
  `;
}

function renderContent() {
  const item = navItems.find((n) => n.key === activePage);
  if (item && !hasAccess(item)) {
    return lockBanner(pageMeta[activePage]?.title || "This view");
  }

  if (activePage === "triage")  return triageView();
  if (activePage === "mitre")   return mitreView();
  if (activePage === "twin")    return twinView();
  if (activePage === "hunting") return huntingView();
  if (activePage === "trust")   return trustView();
  if (activePage === "metrics") return metricsView();
  if (activePage === "audit")   return auditView();
  return commandCenterView();
}

/* ── Main render ── */
function render() {
  if (!currentUser) {
    renderLogin();
    return;
  }

  if (!incidentsLoaded && !incidentsError) {
    loadIncidents();
  }

  const meta = pageMeta[activePage] || pageMeta.command;
  const searchWasFocused = document.activeElement && (document.activeElement.id === "searchInput" || document.activeElement.id === "huntInput");
  const focusedSelectionStart = searchWasFocused ? document.activeElement.selectionStart : null;

  app.innerHTML = `
    <div class="cct-app">
      <aside class="sidebar">
        <div class="brand">
          <div class="logo">⛭</div>
          <div><h1>CCT</h1><p>Cyber Control Tower</p></div>
        </div>
        <div class="user-card">
          <div class="user-card-id">
            <b>${escapeHtml(currentUser.display_name)}</b>
            <span>${escapeHtml(currentUser.role_label)}</span>
          </div>
          <button class="logout-btn" data-logout>Sign out</button>
        </div>
        <nav>${renderNavigation()}</nav>
        <div class="sidebar-note">
          <b>Live backend</b>
          <p>Every view on this dashboard reads from the Flask API in real time — incidents, MITRE mapping, the digital twin graph, and trust scores are computed from the actual dataset, not mocked.</p>
        </div>
      </aside>

      <main class="main">
        ${renderTopbar(meta)}
        ${incidentsError ? `<div class="notice error">${escapeHtml(incidentsError)} <button class="ghost-btn" data-retry-incidents style="margin-left:8px;">Retry</button></div>` : ""}
        ${!incidentsLoaded && !incidentsError ? `<div class="loading-state">Loading incidents…</div>` : renderContent()}
      </main>
    </div>
  `;

  bindEvents();
  startClock();

  if (searchWasFocused) {
    const input = document.activeElement.id === "huntInput" ? document.getElementById("huntInput") : document.getElementById("searchInput");
    if (input) {
      input.focus();
      if (focusedSelectionStart != null) input.setSelectionRange(focusedSelectionStart, focusedSelectionStart);
    }
  }
}

/* ── Live clock ── */
let _clockInterval = null;
function startClock() {
  if (_clockInterval) clearInterval(_clockInterval);
  _clockInterval = setInterval(() => {
    const el = document.getElementById("liveClock");
    if (!el) { clearInterval(_clockInterval); return; }
    el.textContent = new Date().toLocaleTimeString("en-US", { hour12: false });
  }, 1000);
}

/* ── Shared components ── */
function statCard(title, value, subtitle, tone = "", navKey = null) {
  const valueHtml = navKey
    ? `<button type="button" class="stat-value-btn" data-nav="${escapeHtml(navKey)}" title="View Attack Chain visualizations">${escapeHtml(String(value))}</button>`
    : escapeHtml(String(value));
  return `
    <div class="stat-card ${tone}">
      <div>
        <p class="stat-title">${escapeHtml(title)}</p>
        <h3>${valueHtml}</h3>
        <p class="stat-subtitle">${escapeHtml(subtitle)}</p>
      </div>
      <div class="stat-dot"></div>
    </div>
  `;
}

function incidentItem(incident, active) {
  return `
    <button class="incident-item ${active ? "active" : ""}" data-select-incident="${escapeHtml(incident.incident_id)}">
      <div class="incident-top">
        <div>
          <div class="incident-meta">
            <span class="${severityClass(incident.severity)}">${escapeHtml(incident.severity)}</span>
            <span class="${statusClass(incident.status)}">${escapeHtml(incident.status)}</span>
            <span style="color:var(--text-dim);font-family:var(--font-mono);font-size:11px;">${escapeHtml(incident.incident_id)}</span>
          </div>
          <h4>${escapeHtml(incident.attack_type)} — ${escapeHtml(incident.user)}</h4>
        </div>
        <div class="risk-box">
          <strong>${escapeHtml(String(Math.round(incident.risk_score)))}</strong>
          <span>Risk</span>
        </div>
      </div>
      <div class="incident-grid">

/* ── Attack Chain Flow ──────────────────────────────────────────────
   Builds the actual attacker journey for the selected incident: every
   mapped MITRE technique is grouped under its ATT&CK tactic, and those
   tactic-stages are walked in the canonical MITRE lifecycle order (not
   in whatever order the API happened to return techniques in). Falls
   back to incident.tactic_chain, then to incident.attack_chain (plain
   stage labels) if per-technique data isn't available. Always bookends
   the sequence with Initial Access / Impact so the flow reads the same
   way regardless of source data shape. */

const KILL_CHAIN_ORDER = [
  "Initial Access", "Execution", "Persistence", "Privilege Escalation",
  "Defense Evasion", "Credential Access", "Discovery", "Lateral Movement",
  "Collection", "Command and Control", "Exfiltration", "Impact",
];

// Tactics that are inherently high-stakes get a severity floor regardless
// of the technique's own confidence score.
const TACTIC_SEVERITY = {
  "Initial Access":        "high",
  "Execution":              "high",
  "Persistence":            "medium",
  "Privilege Escalation":   "high",
  "Defense Evasion":        "medium",
  "Credential Access":      "critical",
  "Discovery":              "low",
  "Lateral Movement":       "high",
  "Collection":             "medium",
  "Command and Control":    "critical",
  "Exfiltration":           "critical",
  "Impact":                 "critical",
};

// Numeric MITRE criticality weight per tactic (0-10), used both in the
// Chain Risk Score and to split risk contribution across stages. Later
// kill-chain stages (data theft / impact) weigh more than early
// reconnaissance-style stages.
const TACTIC_CRITICALITY_WEIGHT = {
  "Initial Access":        7,
  "Execution":              7,
  "Persistence":            5,
  "Privilege Escalation":   8,
  "Defense Evasion":        5,
  "Credential Access":      9,
  "Discovery":              3,
  "Lateral Movement":       8,
  "Collection":             5,
  "Command and Control":    9,
  "Exfiltration":           10,
  "Impact":                 10,
};

const SEVERITY_WEIGHT = { critical: 40, high: 30, medium: 18, low: 8 };
const SEVERITY_RANK   = { low: 0, medium: 1, high: 2, critical: 3 };

// A textbook, fully-evidenced intrusion chain touches on the order of 6
// distinct techniques spread across its stages. Used only to normalize
// "how much evidence backs the chain" — more than this is full-strength
// evidence (density caps at 1.0), it isn't a hard requirement.
const EXPECTED_TECHNIQUES_FOR_FULL_CONFIDENCE = 6;

const CHAIN_CONFIDENCE_EXPLAINER =
  "Confidence represents how completely the observed evidence supports the reconstructed attack path — derived from how much of the ATT&CK lifecycle is covered by observed (non-inferred) techniques, and how many techniques back that coverage.";

function techniqueSeverity(t) {
  if (t.tactic && TACTIC_SEVERITY[t.tactic]) return TACTIC_SEVERITY[t.tactic];
  const c = t.confidence_score || 0;
  if (c >= 0.8) return "critical";
  if (c >= 0.6) return "high";
  if (c >= 0.4) return "medium";
  return "low";
}

// ── Overall Attack Chain Confidence ─────────────────────────────────────
// Deliberately does NOT depend on per-technique event-correlation counts
// (the correlation engine doesn't populate those yet, which is exactly
// what was driving confidence to 0% before). Instead it's a function of
// the two things we can always compute once techniques are mapped:
//   • stage coverage    — observedStages / 12 possible ATT&CK stages
//   • technique density — mappedTechniques / expected techniques for a
//                          fully-evidenced chain (capped at 1.0)
// If at least one technique is mapped, real evidence exists, so
// confidence is floored at 40% — it can never legitimately read 0%.
function calcChainConfidence(realStageCount, techniqueCount) {
  if (techniqueCount === 0) return null; // nothing mapped — no chain to be confident about
  const stageCoverage    = realStageCount / KILL_CHAIN_ORDER.length;
  const techniqueDensity = Math.min(1, techniqueCount / EXPECTED_TECHNIQUES_FOR_FULL_CONFIDENCE);
  const raw = (stageCoverage * 0.6 + techniqueDensity * 0.4) * 100;
  return Math.round(Math.min(100, Math.max(40, raw)));
}

// ── Chain Risk Score ─────────────────────────────────────────────────────
// Risk Score = Severity Weight + MITRE Criticality + Event Count Factor
//              + Attack Path Length Factor, composited to 0-100.
//   Severity Weight    (0-40) incident.severity (critical/high/medium/low)
//   MITRE Criticality  (0-25) avg ATT&CK-tactic criticality across observed stages
//   Event Count Factor (0-20) log-scaled correlated event volume (diminishing returns)
//   Path Length Factor (0-15) number of distinct observed stages the attacker moved through
function calcChainRisk(incident, realStages, totalEvents) {
  const severityWeight = SEVERITY_WEIGHT[(incident.severity || "").toLowerCase()] ?? 15;

  const avgCriticality = realStages.length
    ? realStages.reduce((sum, s) => sum + (TACTIC_CRITICALITY_WEIGHT[s.tactic] || 5), 0) / realStages.length
    : 5;
  const mitreCriticality = Math.round(avgCriticality * 2.5); // 0-25

  const eventCountFactor = Math.min(20, Math.round(Math.log2(totalEvents + 1) * 4)); // 0-20

  const pathLengthFactor = Math.min(15, realStages.length * 2.5); // 0-15

  const total = Math.round(Math.min(100, severityWeight + mitreCriticality + eventCountFactor + pathLengthFactor));
  return { total, breakdown: { severityWeight, mitreCriticality, eventCountFactor, pathLengthFactor } };
}

function buildAttackChain(incident) {
  const empty = {
    stages: [], overallConfidence: null, confidenceExplainer: CHAIN_CONFIDENCE_EXPLAINER,
    riskScore: 0, riskBreakdown: null, riskContributors: [], totalEvents: 0, techniqueCount: 0,
  };
  if (!incident) return empty;

  const techs = incident.mitre_techniques || [];
  const totalEvents = Number(incident.event_count) || 0;
  let stages = [];

  if (techs.length) {
    // 1) Group every technique by its ATT&CK tactic — multiple techniques
    // for the same tactic belong in the same stage, not separate nodes.
    const byTactic = new Map();
    techs.forEach((t) => {
      const tactic = t.tactic || "Unclassified";
      if (!byTactic.has(tactic)) byTactic.set(tactic, []);
      byTactic.get(tactic).push({
        label: t.technique_name || t.technique_id,
        techniqueId: t.technique_id || null,
        tactic,
        subTechnique: t.sub_technique || null,
        severity: techniqueSeverity(t),
      });
    });

    // 2) Walk the canonical MITRE lifecycle order and pull in every group
    // that has techniques — this is what makes the chain reflect the real
    // attacker journey instead of raw array/API order.
    const orderedTactics = KILL_CHAIN_ORDER.filter((tactic) => byTactic.has(tactic));
    byTactic.forEach((_, tactic) => {
      if (!orderedTactics.includes(tactic)) orderedTactics.push(tactic);
    });

    stages = orderedTactics.map((tactic) => {
      const stageTechs = byTactic.get(tactic);
      const worstSeverity = stageTechs.reduce(
        (worst, t) => (SEVERITY_RANK[t.severity] > SEVERITY_RANK[worst] ? t.severity : worst),
        "low"
      );
      return { tactic, label: tactic, techniques: stageTechs, severity: worstSeverity, synthetic: false, inferredReason: null };
    });
  } else if ((incident.tactic_chain || []).length) {
    const uniqueTactics = [...new Set(incident.tactic_chain)];
    const orderedTactics = KILL_CHAIN_ORDER.filter((t) => uniqueTactics.includes(t))
      .concat(uniqueTactics.filter((t) => !KILL_CHAIN_ORDER.includes(t)));
    stages = orderedTactics.map((tactic) => ({
      tactic, label: tactic, techniques: [], severity: TACTIC_SEVERITY[tactic] || "medium",
      synthetic: false, inferredReason: null,
    }));
  } else if ((incident.attack_chain || []).length) {
    stages = incident.attack_chain.map((label) => ({
      tactic: null, label, techniques: [], severity: "medium", synthetic: false, inferredReason: null,
    }));
  }

  if (!stages.length) return empty;

  // Capture what was actually observed at the edges *before* bookending,
  // so the inferred-stage explanations can reference real data instead of
  // appearing unexplained.
  const firstObservedLabel = stages[0].label;
  const lastObservedLabel  = stages[stages.length - 1].label;

  if (stages[0].tactic !== "Initial Access") {
    stages.unshift({
      tactic: "Initial Access", label: "Initial Access", techniques: [], severity: "high", synthetic: true,
      inferredReason: `No Initial Access technique was observed. The chain begins at ${firstObservedLabel}, therefore Initial Access is inferred as the probable entry stage.`,
    });
  }
  if (stages[stages.length - 1].tactic !== "Impact") {
    stages.push({
      tactic: "Impact", label: "Impact", techniques: [], severity: "critical", synthetic: true,
      inferredReason: `No Impact technique was observed. The chain currently ends at ${lastObservedLabel}. Impact is inferred as a potential future stage.`,
    });
  }

  const realStages = stages.filter((s) => !s.synthetic);
  const techniqueCount = realStages.reduce((sum, s) => sum + s.techniques.length, 0);

  // 3) Risk Contribution per stage: weighted by ATT&CK tactic criticality
  // and how much observed evidence (technique count) that stage carries.
  // Inferred stages have no observed evidence, so they don't compete for
  // a share of the contribution — only real, observed stages do, and
  // their contributions always sum to exactly 100%.
  const stageWeights = realStages.map((s) => (TACTIC_CRITICALITY_WEIGHT[s.tactic] || 5) * Math.max(1, s.techniques.length));
  const totalWeight = stageWeights.reduce((a, b) => a + b, 0) || 1;
  let running = 0;
  realStages.forEach((s, i) => {
    const pct = i === realStages.length - 1 ? 100 - running : Math.round((stageWeights[i] / totalWeight) * 100);
    running += pct;
    s.riskContribution = pct;
  });
  stages.filter((s) => s.synthetic).forEach((s) => { s.riskContribution = null; });

  const overallConfidence = calcChainConfidence(realStages.length, techniqueCount);
  const { total: riskScore, breakdown: riskBreakdown } = calcChainRisk(incident, realStages, totalEvents);

  // 4) Risk Contributors: the plain-language "why" behind the score, so the
  // number never appears without justification.
  const riskContributors = [
    `${incident.severity || "Unknown"} Severity`,
    `${totalEvents} Correlated Event${totalEvents === 1 ? "" : "s"}`,
    `${techniqueCount} MITRE Technique${techniqueCount === 1 ? "" : "s"}`,
    `${realStages.length} ATT&CK Stage${realStages.length === 1 ? "" : "s"}`,
  ];
  const dominantStage = [...realStages].sort(
    (a, b) => (TACTIC_CRITICALITY_WEIGHT[b.tactic] || 0) - (TACTIC_CRITICALITY_WEIGHT[a.tactic] || 0)
  )[0];
  if (dominantStage) riskContributors.push(`${dominantStage.tactic} Activity`);

  return {
    stages, overallConfidence, confidenceExplainer: CHAIN_CONFIDENCE_EXPLAINER,
    riskScore, riskBreakdown, riskContributors, totalEvents, techniqueCount,
  };
}

function attackChainFlowPanel(incident) {
  if (!incident) return "";
  const chain = buildAttackChain(incident);
  const stages = chain.stages;

  if (!stages.length) {
    return `
      <div class="panel">
        <div class="panel-title">
          <div><h3>Attack Chain Flow</h3><p>Sequenced attacker progression for this incident</p></div>
          <span class="panel-icon">⛓</span>
        </div>
        <p class="empty-state">No MITRE techniques mapped to this incident yet — a chain can't be reconstructed.</p>
      </div>
    `;
  }

  const rb = chain.riskBreakdown;
  const riskTooltip = rb
    ? `Severity Weight ${rb.severityWeight} + MITRE Criticality ${rb.mitreCriticality} + Event Count ${rb.eventCountFactor} + Path Length ${rb.pathLengthFactor} = ${chain.riskScore}`
    : "";

  return `
    <div class="panel">
      <div class="panel-title">
        <div><h3>Attack Chain Flow</h3><p>${stages.length}-stage ATT&CK lifecycle for ${escapeHtml(incident.incident_id)}</p></div>
        <span class="panel-icon">⛓</span>
      </div>

      <div class="chain-confidence-row">
        <div class="chain-confidence-badge" title="${escapeHtml(chain.confidenceExplainer)}">
          <span>Overall Chain Confidence</span>
          <strong>${chain.overallConfidence != null ? chain.overallConfidence + "%" : "—"}</strong>
        </div>
        <div class="chain-confidence-badge" title="${escapeHtml(riskTooltip)}">
          <span>Chain Risk Score</span>
          <strong>${chain.riskScore}/100</strong>
        </div>
      </div>

      ${chain.riskContributors.length ? `
        <div class="risk-contributors">
          <span class="risk-contributors-title">Risk Contributors</span>
          <div class="risk-contributors-list">
            ${chain.riskContributors.map((c) => `<span class="risk-contributor-chip">${escapeHtml(c)}</span>`).join("")}
          </div>
        </div>
      ` : ""}

      <div class="chain-flow">
        ${stages.map((s, idx) => `
          <div class="chain-node sev-${s.severity}">
            <div class="chain-stage-header">
              <span class="chain-node-label">${escapeHtml(s.label)}${s.synthetic ? " (Inferred)" : ""}</span>
              ${!s.synthetic ? `<span class="chain-node-conf">${s.techniques.length} Technique${s.techniques.length === 1 ? "" : "s"} · Risk Contribution: ${s.riskContribution}%</span>` : ""}
            </div>
            ${s.synthetic
              ? `<p class="chain-stage-empty">${escapeHtml(s.inferredReason)}</p>`
              : `<div class="chain-stage-techniques">
                  ${s.techniques.map((t) => `
                    <div class="chain-tech-chip" title="Technique ID: ${escapeHtml(t.techniqueId || "—")} | Technique: ${escapeHtml(t.label)} | Tactic: ${escapeHtml(t.tactic)} | Risk Contribution: ${Math.round((s.riskContribution || 0) / s.techniques.length)}%">
                      ${t.techniqueId ? `<code class="chain-node-id">${escapeHtml(t.techniqueId)}</code>` : ""}
                      <span>${escapeHtml(t.label)}${t.subTechnique ? " · " + escapeHtml(t.subTechnique) : ""}</span>
                    </div>
                  `).join("")}
                </div>`}
          </div>
          ${idx < stages.length - 1 ? `<div class="chain-arrow">↓</div>` : ""}
        `).join("")}
      </div>
      <div class="chain-legend">
        <span><i class="legend-dot" style="background:var(--sev-critical)"></i> Critical</span>
        <span><i class="legend-dot" style="background:var(--sev-high)"></i> High</span>
        <span><i class="legend-dot" style="background:var(--sev-medium)"></i> Medium</span>
        <span><i class="legend-dot" style="background:var(--sev-low)"></i> Low</span>
      </div>
    </div>
  `;
}

function attackChainSummary(incident) {
  const chain = buildAttackChain(incident);
  if (!chain.stages.length) return null;

  const realStages = chain.stages.filter((s) => !s.synthetic);
  const initialStage = realStages[0] || chain.stages[0];
  const finalStage = realStages[realStages.length - 1] || chain.stages[chain.stages.length - 1];
  const initialTech = initialStage.techniques[0];
  const finalTech = finalStage.techniques[finalStage.techniques.length - 1];

  return {
    stageCount: chain.stages.length,
    initialLabel: (initialTech && (initialTech.techniqueId || initialTech.label)) || initialStage.label,
    finalLabel: (finalTech && (finalTech.techniqueId || finalTech.label)) || finalStage.label,
    confidence: chain.overallConfidence,
    confidenceExplainer: chain.confidenceExplainer,
    riskScore: chain.riskScore,
  };
}
