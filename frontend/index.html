<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cyber Control Tower — SOC Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ================================================================
   CYBER CONTROL TOWER — Design System
   ────────────────────────────────────────────────────────────────
   Dark ops-room aesthetic. IBM Plex Mono for data/labels, Inter for
   UI copy. Amber is the single brand signal; cyan is the secondary
   data accent; severity colors are semantic, not decorative.
   ================================================================ */

:root {
  --bg-base:   #090C13;
  --bg-panel:  #0D1119;
  --bg-raised: #131A24;
  --border:         #1B2332;
  --border-accent:  rgba(245,166,35,0.22);
  --border-cyan:    rgba(34,211,238,0.18);
  --text-main:  #E2E8EE;
  --text-dim:   #67778A;
  --text-faint: #3D4A58;
  --accent:       #F5A623;
  --accent-hover: #FFBE45;
  --accent-glow:  rgba(245,166,35,0.13);
  --cyan:       #22D3EE;
  --cyan-glow:  rgba(34,211,238,0.10);
  --sev-critical: #E5484D;
  --sev-crit-bg:  rgba(229,72,77,0.11);
  --sev-crit-bd:  rgba(229,72,77,0.25);
  --sev-high:     #F5A623;
  --sev-high-bg:  rgba(245,166,35,0.11);
  --sev-high-bd:  rgba(245,166,35,0.25);
  --sev-medium:   #E8C547;
  --sev-med-bg:   rgba(232,197,71,0.11);
  --sev-med-bd:   rgba(232,197,71,0.25);
  --sev-low:      #3FB68B;
  --sev-low-bg:   rgba(63,182,139,0.11);
  --sev-low-bd:   rgba(63,182,139,0.25);
  --font-ui:   'Inter', system-ui, sans-serif;
  --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
  --r:    8px;
  --r-lg: 12px;
  --r-xl: 16px;
  --r-pill: 999px;
}

*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  background: var(--bg-base);
  color: var(--text-main);
  font-family: var(--font-ui);
}

body::before {
  content: "";
  position: fixed; inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,0.013) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.013) 1px, transparent 1px);
  background-size: 32px 32px;
  z-index: 0;
}

body::after {
  content: "";
  position: fixed; inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 14% 0%, rgba(245,166,35,0.05), transparent 38%),
    radial-gradient(circle at 87% 6%, rgba(34,211,238,0.05), transparent 34%);
  z-index: 0;
}

button, input, select { font: inherit; }
::selection { background: var(--accent); color: #0A0900; }
a { color: var(--accent); text-decoration: none; }

/* ═══════════════════════════════════════
   LOGIN SCREEN
═══════════════════════════════════════ */
.login-shell {
  min-height: 100vh;
  display: grid; place-items: center;
  position: relative; z-index: 1;
  padding: 24px;
}

.login-card {
  width: 100%; max-width: 428px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 28px;
}

.login-brand {
  display: flex; align-items: center; gap: 11px;
  margin-bottom: 4px;
}

.login-brand .logo {
  width: 34px; height: 34px;
  border-radius: var(--r);
  display: grid; place-items: center;
  font-size: 16px;
  color: var(--bg-base);
  background: var(--accent);
  box-shadow: 0 0 22px var(--accent-glow);
  flex-shrink: 0;
}

.login-brand h1 {
  margin: 0;
  font-size: 14px; font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: 0.07em;
  text-transform: uppercase;
}

.login-card > p.subtitle {
  margin: 14px 0 22px;
  color: var(--text-dim);
  font-size: 13px;
}

.field { margin-bottom: 14px; }

.field label {
  display: block;
  color: var(--text-dim);
  font-size: 10px; font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 6px;
}

.field input {
  width: 100%;
  border: 1px solid var(--border);
  color: var(--text-main);
  background: var(--bg-raised);
  border-radius: var(--r);
  outline: none;
  padding: 11px 12px; font-size: 14px;
  transition: border-color 0.15s;
}

.field input:focus { border-color: var(--accent); }

.login-error {
  margin-bottom: 14px;
  padding: 10px 12px;
  border-radius: var(--r);
  background: var(--sev-crit-bg);
  border: 1px solid var(--sev-crit-bd);
  color: var(--sev-critical);
  font-size: 12px; font-family: var(--font-mono);
}

.login-submit {
  width: 100%;
  border: 0; border-radius: var(--r);
  padding: 12px 13px;
  cursor: pointer; font-weight: 700; font-size: 14px;
  background: var(--accent);
  color: #0A0900;
  transition: all 0.15s ease;
}

.login-submit:hover:not(:disabled) {
  background: var(--accent-hover);
  box-shadow: 0 0 22px var(--accent-glow);
}

.login-submit:disabled { opacity: 0.6; cursor: default; }

.login-divider {
  margin: 22px 0 16px;
  border-top: 1px solid var(--border);
  position: relative;
}

.demo-label {
  color: var(--text-faint);
  font-size: 9px; font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: 0.13em; text-transform: uppercase;
  margin-bottom: 11px;
}

.demo-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
  padding: 10px 0;
}

.demo-row + .demo-row { border-top: 1px solid var(--border); }

.demo-row-id b {
  display: block; color: var(--text-main); font-size: 13px;
}

.demo-row-id code {
  display: block; margin-top: 2px;
  color: var(--accent); font-family: var(--font-mono); font-size: 11px;
}

.demo-use-btn {
  border: 1px solid var(--border);
  background: var(--bg-raised);
  color: var(--text-main);
  border-radius: var(--r);
  padding: 7px 12px;
  font-size: 12px; font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
}

.demo-use-btn:hover { border-color: var(--accent); color: var(--accent); }

.login-back {
  display: block; text-align: center;
  margin-top: 18px;
  color: var(--text-dim);
  font-size: 12px;
}

.login-back:hover { color: var(--text-main); }

/* ═══════════════════════════════════════
   APP SHELL
═══════════════════════════════════════ */
.cct-app {
  min-height: 100vh;
  display: flex;
  position: relative;
  z-index: 1;
}

/* ═══════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════ */
.sidebar {
  width: 248px;
  min-height: 100vh;
  position: sticky;
  top: 0; height: 100vh;
  padding: 16px 11px 16px 12px;
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  flex-shrink: 0;
}

.brand {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 11px 12px;
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  background: rgba(255,255,255,0.018);
  text-decoration: none;
}

.logo {
  width: 40px; height: 40px;
  border-radius: var(--r);
  display: grid; place-items: center;
  font-size: 19px;
  color: var(--bg-base);
  background: var(--accent);
  box-shadow: 0 0 22px var(--accent-glow);
  flex-shrink: 0;
}

.brand h1 {
  margin: 0;
  font-size: 13px; font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: 0.07em;
  color: var(--text-main);
  text-transform: uppercase;
}

.brand p {
  margin: 2px 0 0;
  color: var(--text-dim);
  font-size: 10px;
  font-family: var(--font-mono);
}

.user-card {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
  margin-top: 10px;
  padding: 10px 11px;
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  background: var(--bg-raised);
}

.user-card-id b {
  display: block; color: var(--text-main); font-size: 12px;
}

.user-card-id span {
  display: block; margin-top: 2px;
  color: var(--accent); font-size: 10px;
  font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.06em;
}

.logout-btn {
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  border-radius: var(--r);
  padding: 6px 9px;
  font-size: 11px; font-weight: 600;
  cursor: pointer;
  flex-shrink: 0;
}

.logout-btn:hover { color: var(--sev-critical); border-color: var(--sev-crit-bd); background: var(--sev-crit-bg); }

nav {
  margin-top: 16px;
  display: flex; flex-direction: column;
  gap: 2px;
}

.nav-section-label {
  margin: 14px 0 4px 11px;
  color: var(--text-faint);
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.13em; text-transform: uppercase;
  font-family: var(--font-mono);
}

nav button {
  width: 100%;
  padding: 9px 11px;
  border: 0;
  border-radius: var(--r);
  color: var(--text-dim);
  background: transparent;
  text-align: left;
  cursor: pointer;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px; font-weight: 500;
  transition: all 0.15s ease;
  position: relative;
  gap: 8px;
}

nav button:hover { background: var(--bg-raised); color: var(--text-main); }
nav button:focus { outline: none; }
nav button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

.nav-active {
  background: var(--accent-glow) !important;
  color: var(--accent) !important;
  font-weight: 600 !important;
}

.nav-active::before {
  content: '';
  position: absolute; left: 0; top: 5px; bottom: 5px;
  width: 3px;
  background: var(--accent);
  border-radius: var(--r-pill);
}

nav button span.badge {
  background: var(--sev-crit-bg);
  color: var(--sev-critical);
  border: 1px solid var(--sev-crit-bd);
  padding: 2px 7px;
  border-radius: var(--r-pill);
  font-size: 10px;
  font-family: var(--font-mono);
  font-weight: 700;
  flex-shrink: 0;
}

nav button .nav-label { display: flex; align-items: center; gap: 7px; overflow: hidden; }
nav button .nav-lock { color: var(--text-faint); font-size: 11px; flex-shrink: 0; }

.sidebar-note {
  margin-top: auto;
  padding: 13px;
  border-radius: var(--r-lg);
  border: 1px solid var(--border-accent);
  background: var(--accent-glow);
}

.sidebar-note b {
  color: var(--accent);
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  display: block; margin-bottom: 6px;
  font-family: var(--font-mono);
}

.sidebar-note p {
  color: var(--text-dim);
  line-height: 1.6; font-size: 12px;
  margin: 0;
}

/* ═══════════════════════════════════════
   MAIN CONTENT
═══════════════════════════════════════ */
.main {
  flex: 1; min-width: 0;
  padding: 20px 22px;
  overflow-y: auto;
}

/* ═══════════════════════════════════════
   TOPBAR
═══════════════════════════════════════ */
.topbar {
  display: flex;
  justify-content: space-between;
  gap: 20px; align-items: center;
  margin-bottom: 18px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--border);
}

.topbar h1 {
  margin: 0;
  color: var(--text-main);
  font-size: 24px; letter-spacing: -0.04em; font-weight: 800;
}

.topbar p { margin: 5px 0 0; color: var(--text-dim); font-size: 13px; }

.top-actions {
  display: flex; align-items: center;
  gap: 8px; flex-wrap: wrap;
  justify-content: flex-end;
}

.top-actions > span {
  color: var(--text-dim);
  font-family: var(--font-mono); font-size: 11px;
  padding: 8px 10px;
  border-radius: var(--r);
  background: var(--bg-raised);
  border: 1px solid var(--border);
}

.live-clock {
  color: var(--accent) !important;
  background: var(--accent-glow) !important;
  border: 1px solid var(--border-accent) !important;
  letter-spacing: 0.08em !important;
  font-weight: 500 !important;
}

/* ═══════════════════════════════════════
   BUTTONS
═══════════════════════════════════════ */
.primary-btn, .ghost-btn {
  border: 0; border-radius: var(--r);
  padding: 9px 13px;
  cursor: pointer; font-weight: 600; font-size: 13px;
  transition: all 0.15s ease;
  white-space: nowrap;
}

.primary-btn {
  background: var(--accent);
  color: #0A0900; font-weight: 700;
}

.primary-btn:hover:not(:disabled) {
  background: var(--accent-hover);
  box-shadow: 0 0 22px var(--accent-glow);
}

.primary-btn:disabled { opacity: 0.55; cursor: default; }

.ghost-btn {
  color: var(--text-dim);
  background: transparent;
  border: 1px solid var(--border);
}

.ghost-btn:hover { color: var(--text-main); border-color: var(--text-dim); background: var(--bg-raised); }

/* ═══════════════════════════════════════
   NOTICE / ERROR
═══════════════════════════════════════ */
.notice {
  margin: -6px 0 16px;
  padding: 9px 13px;
  border-radius: var(--r);
  color: var(--accent);
  background: var(--accent-glow);
  border: 1px solid var(--border-accent);
  font-size: 12px; font-family: var(--font-mono);
}

.notice.error {
  color: var(--sev-critical);
  background: var(--sev-crit-bg);
  border-color: var(--sev-crit-bd);
}

/* ═══════════════════════════════════════
   STATS GRID
═══════════════════════════════════════ */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0,1fr));
  gap: 12px; margin-bottom: 18px;
}

.stat-card {
  position: relative;
  padding: 16px;
  border-radius: var(--r-lg);
  border: 1px solid var(--border);
  border-top: 2px solid var(--border);
  background: var(--bg-panel);
}

.stat-card:not(.danger):not(.warning):not(.success):not(.cyan) { border-top-color: var(--cyan); }
.stat-card.cyan    { border-top-color: var(--cyan); }
.stat-card.danger  { border-top-color: var(--sev-critical); }
.stat-card.warning { border-top-color: var(--sev-high); }
.stat-card.success { border-top-color: var(--sev-low); }

.stat-title {
  margin: 0;
  color: var(--text-dim);
  font-size: 10px; font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: 0.13em; text-transform: uppercase;
}

.stat-card h3 {
  margin: 10px 0 0;
  color: var(--text-main);
  font-size: 30px; letter-spacing: -0.05em; font-weight: 800;
  font-family: var(--font-mono);
}

.stat-subtitle { margin: 5px 0 0; color: var(--text-dim); font-size: 12px; }

.stat-dot {
  position: absolute; top: 14px; right: 14px;
  width: 8px; height: 8px;
  border-radius: var(--r-pill);
  background: var(--cyan);
  animation: dotPulse 2.2s infinite;
}

.stat-card.danger  .stat-dot { background: var(--sev-critical); }
.stat-card.warning .stat-dot { background: var(--sev-high); }
.stat-card.success .stat-dot { background: var(--sev-low); }

@keyframes dotPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: 0.35; transform: scale(0.8); }
}

/* ═══════════════════════════════════════
   WORKSPACE / LAYOUT GRIDS
═══════════════════════════════════════ */
.workspace {
  display: grid;
  grid-template-columns: 346px minmax(0, 1fr) 326px;
  gap: 14px; align-items: start;
}

.module-layout {
  display: grid;
  grid-template-columns: 346px minmax(0, 1fr) 326px;
  gap: 14px; align-items: start;
}

.left-column, .center-column, .right-column { display: grid; gap: 14px; align-content: start; }

.module-grid { display: grid; gap: 14px; margin-top: 14px; }
.module-grid.two-column { grid-template-columns: minmax(0,1fr) minmax(0,1fr); }

/* ═══════════════════════════════════════
   PANELS
═══════════════════════════════════════ */
.panel {
  border: 1px solid var(--border);
  background: var(--bg-panel);
  border-radius: var(--r-xl);
  padding: 14px;
}

.panel-title {
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px; margin-bottom: 13px;
  padding-bottom: 11px;
  border-bottom: 1px solid var(--border);
}

.panel-title h3 {
  margin: 0;
  color: var(--text-main);
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  font-family: var(--font-mono);
}

.panel-title.compact { margin-bottom: 10px; padding-bottom: 0; border-bottom: 0; }
.panel-title.compact h3 { font-size: 11px; }

.panel-title p { margin: 3px 0 0; color: var(--text-dim); font-size: 11px; }

.panel-title > span:not(.panel-icon) {
  margin: 0;
  color: var(--text-dim); font-size: 11px;
}

.panel-icon {
  display: grid; place-items: center;
  width: 28px; height: 28px;
  border-radius: var(--r);
  background: var(--bg-raised);
  color: var(--accent) !important;
  margin: 0 !important;
  font-size: 13px;
  border: 1px solid var(--border);
  flex-shrink: 0;
}

.lock-banner {
  display: flex; align-items: center; gap: 12px;
  padding: 22px;
  border: 1px dashed var(--border);
  border-radius: var(--r-xl);
  background: var(--bg-panel);
}

.lock-banner .lock-icon {
  width: 40px; height: 40px; flex-shrink: 0;
  display: grid; place-items: center;
  border-radius: var(--r-lg);
  background: var(--bg-raised);
  border: 1px solid var(--border);
  font-size: 18px;
  color: var(--text-dim);
}

.lock-banner h3 { margin: 0; font-size: 14px; color: var(--text-main); }
.lock-banner p { margin: 4px 0 0; font-size: 12px; color: var(--text-dim); line-height: 1.5; }

/* ═══════════════════════════════════════
   FILTERS / SEARCH
═══════════════════════════════════════ */
.filters {
  display: grid;
  grid-template-columns: 1fr 96px;
  gap: 8px; margin-bottom: 11px;
}

.filters input, .filters select {
  width: 100%;
  border: 1px solid var(--border);
  color: var(--text-main);
  background: var(--bg-raised);
  border-radius: var(--r);
  outline: none;
  padding: 9px 10px; font-size: 13px;
  transition: border-color 0.15s;
}

.filters input:focus, .filters select:focus { border-color: var(--accent); }
.filters input::placeholder { color: var(--text-faint); }
.filters select option { background: var(--bg-raised); }

/* ═══════════════════════════════════════
   INCIDENT LIST
═══════════════════════════════════════ */
.incident-list { display: grid; gap: 8px; max-height: 640px; overflow-y: auto; padding-right: 2px; }

.incident-item {
  width: 100%; text-align: left;
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  background: var(--bg-raised);
  padding: 11px;
  cursor: pointer; color: inherit;
  transition: all 0.15s ease;
}

.incident-item:hover {
  border-color: rgba(255,255,255,0.14);
  background: #19212F;
  transform: translateY(-1px);
}

.incident-item.active {
  border-color: var(--accent);
  background: var(--accent-glow);
}

.incident-top {
  display: flex; justify-content: space-between;
  gap: 10px; align-items: flex-start;
}

.incident-meta {
  display: flex; gap: 7px; align-items: center;
  margin-bottom: 5px; flex-wrap: wrap;
}

.incident-item h4 {
  margin: 0;
  color: var(--text-main);
  line-height: 1.35; font-size: 13px; font-weight: 600;
}

/* ═══════════════════════════════════════
   SEVERITY / STATUS BADGES
═══════════════════════════════════════ */
.sev {
  display: inline-flex; align-items: center;
  border-radius: var(--r-pill); border: 1px solid;
  padding: 2px 7px;
  font-size: 9px; font-weight: 800;
  font-family: var(--font-mono);
  letter-spacing: 0.05em; text-transform: uppercase;
  white-space: nowrap;
}

.sev-critical { color:var(--sev-critical); background:var(--sev-crit-bg); border-color:var(--sev-crit-bd); }
.sev-high     { color:var(--sev-high);     background:var(--sev-high-bg); border-color:var(--sev-high-bd); }
.sev-medium   { color:var(--sev-medium);   background:var(--sev-med-bg);  border-color:var(--sev-med-bd);  }
.sev-low      { color:var(--sev-low);      background:var(--sev-low-bg);  border-color:var(--sev-low-bd);  }

.status-pill {
  display: inline-flex; align-items: center; gap: 5px;
  border-radius: var(--r-pill); border: 1px solid var(--border);
  background: var(--bg-raised);
  padding: 2px 8px;
  font-size: 9px; font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: 0.05em; text-transform: uppercase;
  color: var(--text-dim);
  white-space: nowrap;
}

.status-pill.status-open          { color: var(--text-dim); }
.status-pill.status-investigating { color: var(--cyan); border-color: var(--border-cyan); background: var(--cyan-glow); }
.status-pill.status-contained     { color: var(--sev-low); border-color: var(--sev-low-bd); background: var(--sev-low-bg); }
.status-pill.status-resolved      { color: var(--accent); border-color: var(--border-accent); background: var(--accent-glow); }

/* ═══════════════════════════════════════
   RISK BOX
═══════════════════════════════════════ */
.risk-box {
  flex: 0 0 auto; min-width: 50px;
  text-align: center;
  border-radius: var(--r);
  padding: 7px 8px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
}

.risk-box strong {
  display: block;
  color: var(--text-main);
  font-size: 17px; font-weight: 700;
  font-family: var(--font-mono);
}

.risk-box span {
  color: var(--text-dim);
  font-size: 9px; text-transform: uppercase;
  letter-spacing: 0.1em;
  font-family: var(--font-mono);
}

/* ═══════════════════════════════════════
   INCIDENT GRID (mini meta)
═══════════════════════════════════════ */
.incident-grid {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 5px; margin-top: 9px;
}

.incident-grid div {
  padding: 6px 7px;
  border-radius: var(--r);
  background: rgba(0,0,0,0.25);
  border: 1px solid var(--border);
}

.incident-grid span {
  display: block;
  color: var(--text-dim);
  font-size: 9px; font-family: var(--font-mono);
  text-transform: uppercase; letter-spacing: 0.08em;
}

.incident-grid b {
  display: block; margin-top: 3px;
  color: var(--text-main);
  font-size: 11px; font-family: var(--font-mono);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ═══════════════════════════════════════
   DETAIL CARD
═══════════════════════════════════════ */
.detail-header {
  display: flex; justify-content: space-between;
  gap: 16px; align-items: flex-start;
}

.tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }

.soft-tag {
  border: 1px solid var(--border);

  border-radius: var(--r-pill);

}

.detail-panel h2 {
  color: var(--text-main);
  margin: 6px 0 0;
  font-size: 19px; letter-spacing: -0.03em; font-weight: 700;
  line-height: 1.3;
}

.detail-panel p.summary {
  color: var(--text-dim);
  line-height: 1.65; margin: 8px 0 0; font-size: 13px;
}

.detail-actions { display: flex; gap: 8px; flex-shrink: 0; align-items: center; flex-wrap: wrap; }

.status-select {
  border: 1px solid var(--border);
  background: var(--bg-raised);
  color: var(--text-main);
  border-radius: var(--r);
  padding: 8px 10px; font-size: 12px;
  font-family: var(--font-mono);
}

.info-grid {
  display: grid; grid-template-columns: repeat(3, minmax(0,1fr));
  gap: 8px; margin-top: 14px;
}

.info-tile {
  padding: 11px;
  border-radius: var(--r);
  background: var(--bg-raised);
  border: 1px solid var(--border);
}

.info-tile span {
  display: block; color: var(--text-dim);
  font-size: 9px; font-family: var(--font-mono);
  text-transform: uppercase; letter-spacing: 0.1em;
}

.info-tile strong {
  display: block; color: var(--text-main);
  margin-top: 5px; font-size: 12px;
  font-family: var(--font-mono);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ═══════════════════════════════════════
   RISK GAUGE
═══════════════════════════════════════ */
.middle-grid {
  display: grid; grid-template-columns: 235px minmax(0,1fr);
  gap: 14px;
}

.risk-gauge-card {
  min-height: 275px; padding: 16px;
  border-radius: var(--r-xl);
  border: 1px solid var(--border);
  background: var(--bg-panel);
  display: grid; align-content: center;
  justify-items: center; text-align: center;
}

.gauge-wrap {
  position: relative; width: 155px; height: 155px;
  border-radius: 50%; display: grid; place-items: center;
  overflow: hidden;
  background: var(--bg-base);
  border: 1px solid var(--border);
}

.gauge-track, .gauge-fill {
  position: absolute; inset: 9px; border-radius: 50%;
  border: 10px solid var(--bg-raised);
}

.gauge-fill {
  border-color: var(--accent) transparent transparent transparent;
  transition: transform .38s cubic-bezier(.4,0,.2,1);
}

.gauge-inner {
  position: relative; width: 107px; height: 107px;
  border-radius: 50%;
  background: var(--bg-panel);
  display: grid; place-items: center; align-content: center;

}

.gauge-inner strong {
  color: var(--text-main); font-size: 35px;
  letter-spacing: -0.07em;
  font-family: var(--font-mono); font-weight: 700;
}

.gauge-inner span {
  color: var(--text-dim); font-size: 9px;
  font-family: var(--font-mono); text-transform: uppercase;
  letter-spacing: 0.07em;
}

.risk-gauge-card p {
  color: var(--text-dim); font-size: 12px;
  line-height: 1.6; max-width: 195px; margin-top: 13px;
}

/* ═══════════════════════════════════════
   GRAPH / DIGITAL TWIN
═══════════════════════════════════════ */
.graph-panel { min-height: 275px; }

#cyGraph {
  height: 460px;
  border-radius: var(--r);
  background: var(--bg-raised);
  border: 1px solid var(--border);
}

.graph-legend {
  display: flex; gap: 14px; flex-wrap: wrap;

}

.graph-legend span {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--text-dim); font-size: 11px;
}

.legend-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }

/* ═══════════════════════════════════════
   CHARTS
═══════════════════════════════════════ */
.charts-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 14px; margin-top: 14px;
}

.chart-card { min-height: 180px; }

.line-chart {
  width: 100%; height: 110px;
  stroke: var(--cyan); stroke-width: 2;

.bars { display: grid; gap: 9px; margin-top: 4px; }

.bar-row { display: grid; grid-template-columns: 70px 1fr 32px; align-items: center; gap: 9px; }
.bar-row span { color: var(--text-dim); font-size: 12px; }
.bar-row div { height: 7px; border-radius: var(--r-pill); background: var(--bg-raised); overflow: hidden; }
.bar-row i { display: block; height: 100%; background: var(--accent); border-radius: var(--r-pill); }
.bar-row b { color: var(--text-main); font-size: 12px; font-family: var(--font-mono); text-align: right; }

/* ═══════════════════════════════════════
   SOURCES / BACKEND PANEL
═══════════════════════════════════════ */
.source-list { display: grid; gap: 8px; }

.source-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 9px 10px;
  border-radius: var(--r);
  background: var(--bg-raised);
  border: 1px solid var(--border);
}

.source-row > div { display: flex; align-items: center; gap: 9px; }
.source-row b { color: var(--text-main); font-size: 12px; display: block; }
.source-row p { margin: 1px 0 0; color: var(--text-dim); font-size: 11px; }
.source-row > span { color: var(--text-dim); font-size: 11px; font-family: var(--font-mono); }

.status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.status-dot.online { background: var(--sev-low); box-shadow: 0 0 8px var(--sev-low); }

.api-list { display: grid; gap: 6px; }
.api-list code {
  display: block; padding: 8px 10px;
  border-radius: var(--r);
  background: var(--bg-raised);
  border: 1px solid var(--border);
  color: var(--cyan); font-size: 11px;

/* ═══════════════════════════════════════
   TIMELINE
═══════════════════════════════════════ */
.timeline { display: grid; gap: 0; }

.timeline-row {
  display: grid; grid-template-columns: 50px 16px 1fr;
  gap: 10px; padding-bottom: 16px; position: relative;
}

.timeline-row:not(:last-child)::before {

}

.timeline-row .node {
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--accent); margin-top: 4px; flex-shrink: 0;
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.timeline-row b { display: block; color: var(--text-main); font-size: 13px; }
.timeline-row p { margin: 3px 0 0; color: var(--text-dim); font-size: 12px; line-height: 1.4; }

/* ═══════════════════════════════════════

═══════════════════════════════════════ */
.heatmap-list { display: grid; gap: 7px; }

.heatmap-row {
  display: grid; grid-template-columns: 64px 1fr 90px 50px;

  border-radius: var(--r);
  background: var(--bg-raised);
  border: 1px solid var(--border);
}

.heatmap-row code { color: var(--cyan); font-size: 11px; }
.heatmap-row .tname { color: var(--text-main); font-size: 12px; }
.heatmap-row .ttactic { color: var(--text-dim); font-size: 10px; }
.heatmap-row .tcount { text-align: right; color: var(--text-main); font-family: var(--font-mono); font-size: 13px; font-weight: 700; }

.heatmap-bar { height: 5px; border-radius: var(--r-pill); background: var(--bg-base); overflow: hidden; margin-top: 4px; }
.heatmap-bar i { display: block; height: 100%; background: var(--cyan); }

/* ═══════════════════════════════════════
   TRUST SCORE LEADERBOARD
═══════════════════════════════════════ */
.leaderboard-list { display: grid; gap: 7px; }

.leaderboard-row {
  display: grid; grid-template-columns: 28px 1fr 70px 110px;
  align-items: center; gap: 10px;
  padding: 9px 10px;
  border-radius: var(--r);
  background: var(--bg-raised);
  border: 1px solid var(--border);
  cursor: pointer;
}

.leaderboard-row:hover { border-color: var(--accent); }
.leaderboard-row .rank { color: var(--text-faint); font-family: var(--font-mono); font-size: 12px; }
.leaderboard-row .name { color: var(--text-main); font-size: 13px; }
.leaderboard-row .score { text-align: right; font-family: var(--font-mono); font-weight: 700; font-size: 14px; }

/* ═══════════════════════════════════════

═══════════════════════════════════════ */
.metrics-tiles {
  display: grid; grid-template-columns: repeat(4, minmax(0,1fr));
  gap: 10px;
}

.metric-tile {
  padding: 13px;
  border-radius: var(--r-lg);
  background: var(--bg-raised);
  border: 1px solid var(--border);
  text-align: center;
}

.metric-tile span { display: block; color: var(--text-dim); font-size: 10px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.08em; }
.metric-tile strong { display: block; margin-top: 6px; color: var(--text-main); font-size: 21px; font-family: var(--font-mono); }

/* ═══════════════════════════════════════
   AUDIT LIST
═══════════════════════════════════════ */
.audit-list { display: grid; gap: 0; max-height: 600px; overflow-y: auto; }

.audit-row {
  display: grid; grid-template-columns: 64px 1fr;
  gap: 12px; padding: 11px 0;
  border-bottom: 1px solid var(--border);
}

.audit-row:last-child { border-bottom: 0; }

.audit-row > span {
  color: var(--accent); font-weight: 700;
  font-family: var(--font-mono); font-size: 10px;
  padding-top: 2px;
}

.audit-row b { color: var(--text-main); font-size: 13px; }
.audit-row p { margin: 4px 0 0; color: var(--text-dim); font-size: 12px; line-height: 1.4; }

/* ═══════════════════════════════════════
   SEARCH / THREAT HUNTING
═══════════════════════════════════════ */
.hunt-bar {
  display: grid; grid-template-columns: 1fr 100px;
  gap: 8px; margin-bottom: 12px;
}

.hunt-bar input {
  width: 100%;
  border: 1px solid var(--border);
  color: var(--text-main);
  background: var(--bg-raised);
  border-radius: var(--r);

  font-family: var(--font-mono);

.hunt-bar input:focus { border-color: var(--accent); }

.hunt-chips { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; }

.hunt-chip {
  border: 1px solid var(--border);
  background: var(--bg-raised);
  color: var(--text-dim);
  border-radius: var(--r-pill);
  padding: 6px 11px;
  font-size: 11px; font-family: var(--font-mono);
  cursor: pointer;
  transition: all 0.15s;
}

.hunt-chip:hover { color: var(--cyan); border-color: var(--border-cyan); background: var(--cyan-glow); }

.hunt-results-meta {
  color: var(--text-dim); font-size: 12px; font-family: var(--font-mono);
  margin-bottom: 10px;
}

/* ═══════════════════════════════════════
   TABLE
═══════════════════════════════════════ */
.table-wrap { overflow-x: auto; }

table {
  width: 100%; border-collapse: separate;
  border-spacing: 0 6px; min-width: 640px;
}

th {
  color: var(--text-dim); font-size: 10px;
  text-align: left; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em;
  padding: 0 12px 5px;
  font-family: var(--font-mono);
}

td {
  color: var(--text-main); padding: 11px 12px;
  background: var(--bg-raised);

}

td:first-child { border-left: 1px solid var(--border); border-radius: var(--r) 0 0 var(--r); }
td:last-child  { border-right: 1px solid var(--border); border-radius: 0 var(--r) var(--r) 0; }

tbody tr { cursor: pointer; transition: all 0.1s; }
tbody tr:hover td { background: var(--accent-glow); border-color: var(--accent); }

.empty-state { color: var(--text-dim); font-size: 13px; text-align: center; padding: 30px 10px; }

.loading-state {

/* ═══════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════ */
@media (max-width: 1500px) {
  .workspace { grid-template-columns: 326px minmax(0, 1fr); }
  .right-column { grid-column: 1 / -1; grid-template-columns: repeat(3, minmax(0, 1fr)); }

}

  .workspace, .module-layout { grid-template-columns: 1fr; }
  .right-column, .module-layout .right-column { grid-template-columns: 1fr; }

  .topbar, .detail-header { display: block; }

  .stats-grid, .info-grid { grid-template-columns: 1fr; }
  .filters, .hunt-bar { grid-template-columns: 1fr; }
  .topbar h1 { font-size: 22px; }
}

/* ═══════════════════════════════════════
   SCROLLBAR
═══════════════════════════════════════ */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-base); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: var(--r-pill); }
::-webkit-scrollbar-thumb:hover { background: var(--text-faint); }
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ================================================================
   CYBER CONTROL TOWER — Application
   ================================================================ */
const API_BASE = "";

async function api(path, options = {}) {
  const res = await fetch(API_BASE + path, {
    credentials: "include",
    headers: { "Content-Type": "application/json", ...(options.headers || {}) },
    ...options,
  });
  let body = null;
  try { body = await res.json(); } catch (e) { /* no body */ }
  if (!res.ok) {
    const err = new Error((body && (body.message || body.error)) || `Request failed (${res.status})`);
    err.status = res.status;
    err.body = body;
    throw err;
  }
  return body;
}

/* ── Global state ── */
let currentUser = null;        // { username, display_name, role, role_label }
let permissions = {};          // capability map from /api/auth/me
let loginError = "";
let loginSubmitting = false;

let activePage = "command";
let incidents = [];
let incidentsLoaded = false;
let incidentsError = "";
let selectedId = null;
let query = "";
let severityFilter = "All";
let notice = "";

let summary = null;
let graphData = null;
let mitreHeatmap = null;
let trustBoard = null;
let metricsReport = null;
let auditLog = null;
let huntQuery = "";
let huntResults = null;
let huntSuggested = [];
let demoAccounts = [];

const app = document.getElementById("app");

/* ── Utilities ── */
function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function severityClass(severity) {
  if (severity === "Critical") return "sev sev-critical";
  if (severity === "High")     return "sev sev-high";
  if (severity === "Medium")   return "sev sev-medium";
  return "sev sev-low";
}

function statusClass(status) {
  return "status-pill status-" + String(status || "open").toLowerCase();
}

function riskLabel(risk) {
  if (risk >= 80) return "Critical Exposure";
  if (risk >= 60) return "High Risk";
  if (risk >= 30) return "Needs Review";
  return "Stable";
}

function fmtDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return d.toLocaleString("en-US", { month: "short", day: "numeric", year: "numeric", hour: "2-digit", minute: "2-digit" });
}

function fmtMinutes(mins) {
  if (mins == null) return "—";
  if (mins < 60) return `${mins.toFixed(1)}m`;
  const h = Math.floor(mins / 60);
  const m = Math.round(mins % 60);
  return `${h}h ${m}m`;
}

function debounce(fn, ms) {
  let t = null;
  return (...args) => {
    clearTimeout(t);
    t = setTimeout(() => fn(...args), ms);
  };
}

/* ── Login screen ── */
function renderLogin() {
  app.innerHTML = `
    <div class="login-shell">
      <div class="login-card">
        <div class="login-brand">
          <div class="logo">⛭</div>
          <h1>Cyber Control Tower</h1>
        </div>
        <p class="subtitle">Sign in to access the SOC console.</p>

        ${loginError ? `<div class="login-error">${escapeHtml(loginError)}</div>` : ""}

        <form id="loginForm">
          <div class="field">
            <label for="usernameInput">Username</label>
            <input id="usernameInput" name="username" autocomplete="username" />
          </div>
          <div class="field">
            <label for="passwordInput">Password</label>
            <input id="passwordInput" name="password" type="password" autocomplete="current-password" />
          </div>
          <button class="login-submit" type="submit" ${loginSubmitting ? "disabled" : ""}>
            ${loginSubmitting ? "Signing in…" : "Sign in"}
          </button>
        </form>

        <div class="login-divider"></div>
        <p class="demo-label">Demo accounts</p>
        ${demoAccounts.map((acc) => `
          <div class="demo-row">
            <div class="demo-row-id">
              <b>${escapeHtml(acc.role_label)}</b>
              <code>${escapeHtml(acc.username)} / ${escapeHtml(acc.password)}</code>
            </div>
            <button class="demo-use-btn" data-fill-demo="${escapeHtml(acc.username)}|${escapeHtml(acc.password)}">Use</button>
          </div>
        `).join("")}
      </div>
    </div>
  `;

  const form = document.getElementById("loginForm");
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const username = document.getElementById("usernameInput").value.trim();
    const password = document.getElementById("passwordInput").value;
    await submitLogin(username, password);
  });

  document.querySelectorAll("[data-fill-demo]").forEach((btn) => {
    btn.addEventListener("click", async () => {
      const [username, password] = btn.dataset.fillDemo.split("|");
      await submitLogin(username, password);
    });
  });

  const usernameInput = document.getElementById("usernameInput");
  if (usernameInput) usernameInput.focus();
}

async function submitLogin(username, password) {
  loginSubmitting = true;
  loginError = "";
  renderLogin();
  try {
    const data = await api("/api/auth/login", {
      method: "POST",
      body: JSON.stringify({ username, password }),
    });
    currentUser = data.user;
    permissions = data.permissions || {};
    loginSubmitting = false;
    resetWorkspaceState();
    render();
  } catch (err) {
    loginSubmitting = false;
    loginError = err.message || "Sign in failed.";
    renderLogin();
  }
}

async function handleLogout() {
  try { await api("/api/auth/logout", { method: "POST" }); } catch (e) { /* ignore */ }
  currentUser = null;
  permissions = {};
  resetWorkspaceState();
  render();
}

function resetWorkspaceState() {
  activePage = "command";
  incidents = [];
  incidentsLoaded = false;
  incidentsError = "";
  selectedId = null;
  query = "";
  severityFilter = "All";
  notice = "";
  summary = null;
  graphData = null;
  mitreHeatmap = null;
  trustBoard = null;
  metricsReport = null;
  auditLog = null;
  huntQuery = "";
  huntResults = null;
}

async function bootstrap() {
  try {
    const accounts = await api("/api/auth/demo-accounts");
    demoAccounts = accounts;
  } catch (e) { /* non-fatal */ }

  try {
    const me = await api("/api/auth/me");
    if (me.user) {
      currentUser = me.user;
      permissions = me.permissions || {};
    }
  } catch (e) { /* not logged in */ }

  render();
}

/* ── Data loading ── */
async function loadIncidents() {
  try {
    incidents = await api("/api/incidents");
    incidentsLoaded = true;
    incidentsError = "";
    if (!selectedId && incidents.length) {
      selectedId = [...incidents].sort((a, b) => b.risk_score - a.risk_score)[0].incident_id;
    }
  } catch (err) {
    incidentsError = err.message || "Failed to load incidents.";
  }
  render();
}

async function loadSummary() {
  try { summary = await api("/api/summary"); } catch (err) { summary = { error: err.message }; }
  render();
}

async function loadGraph() {
  try { graphData = await api("/api/graph"); } catch (err) { graphData = { error: err.message }; }
  render();
}

async function loadMitreHeatmap() {
  try { mitreHeatmap = await api("/api/mitre/heatmap"); } catch (err) { mitreHeatmap = { error: err.message }; }
  render();
}

async function loadTrustBoard() {
  try { trustBoard = await api("/api/trust-scores"); } catch (err) { trustBoard = { error: err.message, status: err.status }; }
  render();
}

async function loadMetrics() {
  try { metricsReport = await api("/api/metrics"); } catch (err) { metricsReport = { error: err.message, status: err.status }; }
  render();
}

async function loadAudit() {
  try { auditLog = await api("/api/audit?limit=60"); } catch (err) { auditLog = { error: err.message }; }
  render();
}

async function loadSuggestedHunts() {
  try { huntSuggested = await api("/api/search/suggested"); } catch (e) { huntSuggested = []; }
  render();
}

async function runHunt(q) {
  huntQuery = q;
  try {
    const data = await api("/api/search?q=" + encodeURIComponent(q));
    huntResults = data;
  } catch (err) {
    huntResults = { error: err.message };
  }
  render();
}

async function changeIncidentStatus(incidentId, newStatus) {
  try {
    const updated = await api(`/api/incidents/${encodeURIComponent(incidentId)}/status`, {
      method: "POST",
      body: JSON.stringify({ status: newStatus }),
    });
    incidents = incidents.map((i) => (i.incident_id === incidentId ? updated : i));
    notice = `${incidentId} moved to ${newStatus}.`;
  } catch (err) {
    notice = "";
    showError(err.message || "Could not update status.");
  }
  render();
}

let transientError = "";
function showError(msg) {
  transientError = msg;
  render();
  setTimeout(() => { transientError = ""; render(); }, 4000);
}

/* ── Navigation ── */
const navItems = [
  { key: "command",     label: "Command Center",   cap: null },
  { key: "triage",      label: "Incident Triage",   cap: null },
  { key: "mitre",       label: "MITRE Heatmap",      cap: null },
  { key: "twin",        label: "Cyber Digital Twin", cap: null },
  { key: "hunting",     label: "Threat Hunting",     cap: null },
  { key: "trust",       label: "Trust Score",        cap: "view_trust_scores" },
  { key: "metrics",     label: "MTTD / MTTR",        cap: "view_metrics" },
  { key: "audit",       label: "Audit Trail",        cap: null },
];

const pageMeta = {
  command:  { title: "Cyber Control Tower",    subtitle: "SOC dashboard for correlation, triage, prioritization, and response." },
  triage:   { title: "Incident Triage",        subtitle: "Review correlated incidents, change workflow status, and inspect each attack story." },
  mitre:    { title: "MITRE ATT&CK Heatmap",   subtitle: "Technique frequency across all correlated incidents, mapped to the ATT&CK framework." },
  twin:     { title: "Cyber Digital Twin",     subtitle: "Graph view of users, hosts, and network segments derived from the live event stream." },
  hunting:  { title: "Threat Hunting",         subtitle: "Run structured queries against the correlated incident set." },
  trust:    { title: "Trust Score Leaderboard", subtitle: "Behavior-based risk scoring per user account. Visible to SOC Managers." },
  metrics:  { title: "MTTD / MTTR Metrics",    subtitle: "Detection and response time performance, broken down by severity, attack type, and segment." },
  audit:    { title: "Audit Trail",            subtitle: "Real record of sign-ins, status changes, and hunt queries run in this session." },
};

function hasAccess(item) {
  if (!item.cap) return true;
  return !!permissions[item.cap];
}

function getFilteredIncidents() {
  return incidents
    .filter((item) => severityFilter === "All" || item.severity === severityFilter)
    .filter((item) =>
      `${item.incident_id} ${item.user} ${item.source_ip} ${item.dst_ip} ${item.attack_type} ${item.network_segment}`
        .toLowerCase()
        .includes(query.toLowerCase())
    )
    .sort((a, b) => b.risk_score - a.risk_score);
}

function getSelectedIncident() {
  return incidents.find((item) => item.incident_id === selectedId) || incidents[0] || null;
}

function renderNavigation() {
  return navItems.map((item) => {
    const allowed = hasAccess(item);
    return `
      <button class="${activePage === item.key ? "nav-active" : ""}" data-nav="${escapeHtml(item.key)}" ${!allowed ? 'data-locked="1"' : ""}>
        <span class="nav-label">${escapeHtml(item.label)}</span>
        ${!allowed ? '<span class="nav-lock">🔒</span>' : ""}
      </button>
    `;
  }).join("");
}

function renderTopbar(meta) {
  const now = new Date();
  const timeStr = now.toLocaleTimeString("en-US", { hour12: false });
  return `
    <header class="topbar">
      <div>
        <h1>${escapeHtml(meta.title)}</h1>
        <p>${escapeHtml(meta.subtitle)}</p>
      </div>
      <div class="top-actions">
        <span class="live-clock" id="liveClock">${escapeHtml(timeStr)}</span>
        <button class="ghost-btn" data-refresh>Refresh</button>
      </div>
    </header>
    ${notice ? `<div class="notice">${escapeHtml(notice)}</div>` : ""}
    ${transientError ? `<div class="notice error">${escapeHtml(transientError)}</div>` : ""}
  `;
}

function lockBanner(label) {
  return `
    <div class="lock-banner">
      <div class="lock-icon">🔒</div>
      <div>
        <h3>${escapeHtml(label)} is limited to the SOC Manager role</h3>
        <p>Your account (${escapeHtml(currentUser.role_label)}) doesn't have access to this view. Sign in as the SOC Manager demo account to see it.</p>
      </div>
    </div>
  `;
}

function renderContent() {
  const item = navItems.find((n) => n.key === activePage);
  if (item && !hasAccess(item)) {
    return lockBanner(pageMeta[activePage]?.title || "This view");
  }

  if (activePage === "triage")  return triageView();
  if (activePage === "mitre")   return mitreView();
  if (activePage === "twin")    return twinView();
  if (activePage === "hunting") return huntingView();
  if (activePage === "trust")   return trustView();
  if (activePage === "metrics") return metricsView();
  if (activePage === "audit")   return auditView();
  return commandCenterView();
}

/* ── Main render ── */
function render() {
  if (!currentUser) {
    renderLogin();
    return;
  }

  if (!incidentsLoaded && !incidentsError) {
    loadIncidents();
  }

  const meta = pageMeta[activePage] || pageMeta.command;
  const searchWasFocused = document.activeElement && (document.activeElement.id === "searchInput" || document.activeElement.id === "huntInput");
  const focusedSelectionStart = searchWasFocused ? document.activeElement.selectionStart : null;

  app.innerHTML = `
    <div class="cct-app">
      <aside class="sidebar">
        <div class="brand">
          <div class="logo">⛭</div>
          <div><h1>CCT</h1><p>Cyber Control Tower</p></div>
        </div>
        <div class="user-card">
          <div class="user-card-id">
            <b>${escapeHtml(currentUser.display_name)}</b>
            <span>${escapeHtml(currentUser.role_label)}</span>
          </div>
          <button class="logout-btn" data-logout>Sign out</button>
        </div>
        <nav>${renderNavigation()}</nav>
        <div class="sidebar-note">
          <b>Live backend</b>
          <p>Every view on this dashboard reads from the Flask API in real time — incidents, MITRE mapping, the digital twin graph, and trust scores are computed from the actual dataset, not mocked.</p>
        </div>
      </aside>

      <main class="main">
        ${renderTopbar(meta)}
        ${incidentsError ? `<div class="notice error">${escapeHtml(incidentsError)} <button class="ghost-btn" data-retry-incidents style="margin-left:8px;">Retry</button></div>` : ""}
        ${!incidentsLoaded && !incidentsError ? `<div class="loading-state">Loading incidents…</div>` : renderContent()}
      </main>
    </div>
  `;

  bindEvents();
  startClock();

  if (searchWasFocused) {
    const input = document.activeElement.id === "huntInput" ? document.getElementById("huntInput") : document.getElementById("searchInput");
    if (input) {
      input.focus();
      if (focusedSelectionStart != null) input.setSelectionRange(focusedSelectionStart, focusedSelectionStart);
    }
  }
}

/* ── Live clock ── */
let _clockInterval = null;
function startClock() {
  if (_clockInterval) clearInterval(_clockInterval);
  _clockInterval = setInterval(() => {
    const el = document.getElementById("liveClock");
    if (!el) { clearInterval(_clockInterval); return; }
    el.textContent = new Date().toLocaleTimeString("en-US", { hour12: false });
  }, 1000);
}

/* ── Shared components ── */
function statCard(title, value, subtitle, tone = "") {
  return `
    <div class="stat-card ${tone}">
      <div>
        <p class="stat-title">${escapeHtml(title)}</p>
        <h3>${escapeHtml(String(value))}</h3>
        <p class="stat-subtitle">${escapeHtml(subtitle)}</p>
      </div>
      <div class="stat-dot"></div>
    </div>
  `;
}

function incidentItem(incident, active) {
  return `
    <button class="incident-item ${active ? "active" : ""}" data-select-incident="${escapeHtml(incident.incident_id)}">
      <div class="incident-top">
        <div>
          <div class="incident-meta">
            <span class="${severityClass(incident.severity)}">${escapeHtml(incident.severity)}</span>
            <span class="${statusClass(incident.status)}">${escapeHtml(incident.status)}</span>
            <span style="color:var(--text-dim);font-family:var(--font-mono);font-size:11px;">${escapeHtml(incident.incident_id)}</span>
          </div>
          <h4>${escapeHtml(incident.attack_type)} — ${escapeHtml(incident.user)}</h4>
        </div>
        <div class="risk-box">
          <strong>${escapeHtml(String(Math.round(incident.risk_score)))}</strong>
          <span>Risk</span>
        </div>
      </div>
      <div class="incident-grid">
        <div><span>Segment</span><b>${escapeHtml(incident.network_segment)}</b></div>
        <div><span>Events</span><b>${escapeHtml(String(incident.event_count))}</b></div>
        <div><span>MTTD</span><b>${escapeHtml(fmtMinutes(incident.mttd_minutes))}</b></div>
      </div>
    </button>
  `;
}

function riskGauge(risk, label = "Risk score") {
  const angle = Math.min(100, Math.max(0, risk)) * 1.8;
  return `
    <div class="risk-gauge-card">
      <div class="gauge-wrap">
        <div class="gauge-track"></div>
        <div class="gauge-fill" style="transform: rotate(${angle}deg)"></div>
        <div class="gauge-inner">
          <strong>${escapeHtml(String(Math.round(risk)))}</strong>
          <span>${escapeHtml(riskLabel(risk))}</span>
        </div>
      </div>
      <p>${escapeHtml(label)} — computed server-side from severity, event count, attack-chain confidence, and MITRE tactic criticality.</p>
    </div>
  `;
}

function infoTile(label, value) {
  return `
    <div class="info-tile">
      <span>${escapeHtml(label)}</span>
      <strong title="${escapeHtml(value)}">${escapeHtml(value)}</strong>
    </div>
  `;
}

function detailCard(incident) {
  if (!incident) return `<div class="panel"><p class="empty-state">No incident selected.</p></div>`;
  const canChange = !!permissions.change_incident_status;
  const statuses = ["Open", "Investigating", "Contained", "Resolved"];
  const techNames = (incident.mitre_techniques || []).slice(0, 4).map((t) => t.technique_id).join(" / ") || "—";

  return `
    <div class="panel detail-panel">
      <div class="detail-header">
        <div>
          <div class="tag-row">
            <span class="${severityClass(incident.severity)}">${escapeHtml(incident.severity)}</span>
            <span class="soft-tag">${escapeHtml(incident.attack_type)}</span>
            <span class="${statusClass(incident.status)}">${escapeHtml(incident.status)}</span>
          </div>
          <h2>${escapeHtml(incident.incident_id)} — ${escapeHtml(incident.attack_type)} affecting ${escapeHtml(incident.user)}</h2>
          <p class="summary">${escapeHtml(incident.correlation_reason)}</p>
        </div>
        <div class="detail-actions">
          ${canChange ? `
            <select class="status-select" data-status-select="${escapeHtml(incident.incident_id)}">
              ${statuses.map((s) => `<option value="${s}" ${s === incident.status ? "selected" : ""}>${s}</option>`).join("")}
            </select>
          ` : ""}
          <button class="primary-btn" data-export-incident="${escapeHtml(incident.incident_id)}">Export report</button>
        </div>
      </div>
      <div class="info-grid">
        ${infoTile("Network segment", incident.network_segment)}
        ${infoTile("Source IP", incident.source_ip)}
        ${infoTile("Destination IP", incident.dst_ip)}
        ${infoTile("Identity", incident.user)}
        ${infoTile("Action taken", incident.action_taken)}
        ${infoTile("MITRE techniques", techNames)}
        ${infoTile("Event count", String(incident.event_count))}
        ${infoTile("MTTD", fmtMinutes(incident.mttd_minutes))}
        ${infoTile("MTTR", fmtMinutes(incident.mttr_minutes))}
      </div>
    </div>
  `;
}

function timelinePanel(incident) {
  if (!incident) return "";
  const rows = [
    [fmtDate(incident.occurred_at), "Event occurred", `Primary event ${incident.event_id}, severity ${incident.severity}.`],
    [fmtDate(incident.detected_at), "Detected", `Flagged by the detection layer after ${fmtMinutes(incident.mttd_minutes)}.`],
    [fmtDate(incident.resolved_at), "Resolved / actioned", `${incident.action_taken} after ${fmtMinutes(incident.mttr_minutes)} from detection.`],
  ];
  return `
    <div class="panel">
      <div class="panel-title">
        <div><h3>Attack story</h3><p>${escapeHtml(incident.event_count)} related event(s) merged into this incident timeline</p></div>
        <span class="panel-icon">⏱</span>
      </div>
      <div class="timeline">
        ${rows.map(([time, title, text]) => `
          <div class="timeline-row">
            <span class="time">${escapeHtml(time)}</span>
            <span class="node"></span>
            <div>
              <b>${escapeHtml(title)}</b>
              <p>${escapeHtml(text)}</p>
            </div>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

function mitreChainPanel(incident) {
  if (!incident) return "";
  const techs = incident.mitre_techniques || [];
  return `
    <div class="panel">
      <div class="panel-title">
        <div><h3>MITRE ATT&CK mapping</h3><p>Tactic chain: ${escapeHtml((incident.tactic_chain || []).join(" → ") || "—")}</p></div>
        <span class="panel-icon">⛨</span>
      </div>
      <div class="heatmap-list">
        ${techs.length ? techs.map((t) => `
          <div class="heatmap-row" style="grid-template-columns: 64px 1fr 80px;">
            <code>${escapeHtml(t.technique_id)}</code>
            <div>
              <div class="tname">${escapeHtml(t.technique_name)}</div>
              <div class="ttactic">${escapeHtml(t.tactic)}${t.sub_technique ? " · " + escapeHtml(t.sub_technique) : ""}</div>
            </div>
            <div class="tcount">${Math.round(t.confidence_score * 100)}%</div>
          </div>
        `).join("") : `<p class="empty-state">No techniques mapped.</p>`}
      </div>
    </div>
  `;
}

function sourcesPanel() {
  const sources = [
    ["Ingestion layer",   "Online", `${summary ? summary.total_events : "—"} events`, "live"],
    ["Correlation engine","Online", `${summary ? summary.total_incidents : "—"} incidents`, "live"],
    ["MITRE mapping",     "Online", "dynamic per-event", "live"],
    ["Trust Score engine","Online", `${summary ? summary.total_users : "—"} users scored`, "live"],
  ];
  return `
    <div class="panel">
      <div class="panel-title">
        <div><h3>Backend modules</h3><p>Live status of each Flask service layer</p></div>
        <span class="panel-icon">▣</span>
      </div>
      <div class="source-list">
        ${sources.map(([name, status, detail, latency]) => `
          <div class="source-row">
            <div>
              <span class="status-dot online"></span>
              <div>
                <b>${escapeHtml(name)}</b>
                <p>${escapeHtml(detail)}</p>
              </div>
            </div>
            <span>${escapeHtml(latency)}</span>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

function backendPanel() {
  const routes = [
    "GET /api/incidents",
    "POST /api/incidents/:id/status",
    "GET /api/mitre/heatmap",
    "GET /api/graph",
    "GET /api/search?q=",
  ];
  return `
    <div class="panel backend-panel">
      <div class="panel-title">
        <div><h3>API endpoints in use</h3><p>This view's data comes from these routes</p></div>
        <span class="panel-icon">{ }</span>
      </div>
      <div class="api-list">
        ${routes.map((r) => `<code>${escapeHtml(r)}</code>`).join("")}
      </div>
    </div>
  `;
}

/* ── Stats (loads /api/summary lazily) ── */
function renderStats() {
  if (!summary) {
    loadSummary();
    return `<section class="stats-grid">${[1,2,3,4].map(() => statCard("…", "—", "Loading…")).join("")}</section>`;
  }
  if (summary.error) {
    return `<div class="notice error">Could not load summary: ${escapeHtml(summary.error)}</div>`;
  }
  const avgRisk = incidents.length ? Math.round(incidents.reduce((s, i) => s + i.risk_score, 0) / incidents.length) : 0;
  const openCount = incidents.filter((i) => i.status !== "Contained" && i.status !== "Resolved").length;
  const containedCount = incidents.filter((i) => i.status === "Contained" || i.status === "Resolved").length;

  return `
    <section class="stats-grid">
      ${statCard("Avg risk score", `${avgRisk}/100`, "Across all correlated incidents", "danger")}
      ${statCard("Open incidents", openCount, "Awaiting investigation or containment", "warning")}
      ${statCard("Attack chains", summary.attack_chain_count, "Multi-stage incidents detected", "cyan")}
      ${statCard("Contained / Resolved", containedCount, "Moved through the workflow", "success")}
    </section>
  `;
}

function incidentQueuePanel(filtered, selected) {
  return `
    <div class="panel queue-panel">
      <div class="panel-title">
        <div><h3>Incident queue</h3><p>Sorted by live risk score</p></div>
        <span class="panel-icon">☰</span>
      </div>
      <div class="filters">
        <input id="searchInput" value="${escapeHtml(query)}" placeholder="Search id, user, ip, segment" />
        <select id="severityFilter">
          ${["All","Critical","High","Medium","Low"]
            .map((item) => `<option ${item === severityFilter ? "selected" : ""}>${item}</option>`)
            .join("")}
        </select>
      </div>
      <div class="incident-list">
        ${filtered.length
          ? filtered.map((incident) => incidentItem(incident, selected && incident.incident_id === selected.incident_id)).join("")
          : `<p class="empty-state">No incidents found.</p>`}
      </div>
    </div>
  `;
}

function miniCharts() {
  if (!summary || summary.error) return "";
  const trend = (summary.overall_mttd_mttr) ? null : null;
  const attackCounts = summary.attack_type_breakdown || {};
  const entries = Object.entries(attackCounts).sort((a, b) => b[1] - a[1]).slice(0, 6);
  const maxCount = Math.max(1, ...entries.map(([, v]) => v));

  return `
    <div class="charts-grid">
      <div class="panel chart-card">
        <div class="panel-title compact">
          <h3>MTTD / MTTR overall</h3>
          <span style="color:var(--text-dim);font-size:11px;">All correlated incidents</span>
        </div>
        <div class="metrics-tiles" style="grid-template-columns: repeat(2, minmax(0,1fr)); margin-top: 10px;">
          <div class="metric-tile"><span>Mean MTTD</span><strong>${fmtMinutes(summary.overall_mttd_mttr.mttd_mean)}</strong></div>
          <div class="metric-tile"><span>Mean MTTR</span><strong>${fmtMinutes(summary.overall_mttd_mttr.mttr_mean)}</strong></div>
        </div>
      </div>
      <div class="panel chart-card">
        <div class="panel-title compact">
          <h3>Attack types</h3>
          <span style="color:var(--text-dim);font-size:11px;">Incident count by type</span>
        </div>
        <div class="bars">
          ${entries.map(([name, value]) => `
            <div class="bar-row">
              <span>${escapeHtml(name)}</span>
              <div><i style="width:${Math.round((value / maxCount) * 100)}%"></i></div>
              <b>${escapeHtml(String(value))}</b>
            </div>
          `).join("")}
        </div>
      </div>
    </div>
  `;
}

/* ── Views ── */
function commandCenterView() {
  const filtered = getFilteredIncidents();
  const selected = getSelectedIncident();
  return `
    ${renderStats()}
    <section class="workspace">
      <div class="left-column">
        ${incidentQueuePanel(filtered, selected)}
        ${sourcesPanel()}
      </div>
      <div class="center-column">
        ${detailCard(selected)}
        <div class="middle-grid">
          ${riskGauge(selected ? selected.risk_score : 0)}
          ${mitreChainPanel(selected)}
        </div>
        ${miniCharts()}
      </div>
      <div class="right-column">
        ${timelinePanel(selected)}
        ${backendPanel()}
      </div>
    </section>
  `;
}

function triageView() {
  const filtered = getFilteredIncidents();
  const selected = getSelectedIncident();
  const canChange = !!permissions.change_incident_status;
  return `
    ${renderStats()}
    <section class="module-layout">
      <div class="left-column">
        ${incidentQueuePanel(filtered, selected)}
      </div>
      <div class="center-column">
        ${detailCard(selected)}
        ${timelinePanel(selected)}
      </div>
      <div class="right-column">
        ${riskGauge(selected ? selected.risk_score : 0)}
        <div class="panel">
          <div class="panel-title">
            <div><h3>Triage decision</h3><p>What the analyst should do next</p></div>
            <span class="panel-icon">✓</span>
          </div>
          ${selected ? `
            <div class="decision-list" style="display:grid; gap:10px;">

/* ── Cyber Digital Twin rendering (lightweight force-directed canvas) ── */
let graphFocusMode = true; // true = show users, segments, and highest-signal IPs only

function riskColor(score) {
  if (score >= 80) return "#E5484D";
  if (score >= 60) return "#F5A623";
  if (score >= 30) return "#E8C547";
  if (score > 0)   return "#3FB68B";
  return "#22D3EE";
}

function getGraphSubset() {
  if (!graphData || !graphData.nodes) return { nodes: [], edges: [] };
  if (!graphFocusMode) return graphData;

  const keepIds = new Set();
  graphData.nodes.forEach((n) => {
    if (n.data.type === "user" || n.data.type === "segment") keepIds.add(n.data.id);
  });
  // Keep the highest-signal IP nodes (by risk, then by activity) so the
  // graph stays readable while still reflecting real backend data.
  const ipNodes = graphData.nodes
    .filter((n) => n.data.type === "ip")
    .sort((a, b) => (b.data.risk_score - a.data.risk_score) || (b.data.event_count - a.data.event_count));
  ipNodes.slice(0, 40).forEach((n) => keepIds.add(n.data.id));

  const nodes = graphData.nodes.filter((n) => keepIds.has(n.data.id));
  const edges = graphData.edges.filter((e) => keepIds.has(e.data.source) && keepIds.has(e.data.target));
  return { nodes, edges };
}

function drawGraph() {
  const container = document.getElementById("cyGraph");
  if (!container || !graphData || !graphData.nodes) return;

  const subset = getGraphSubset();
  const width = container.clientWidth || 600;
  const height = container.clientHeight || 460;

  const nodes = subset.nodes.map((n, idx) => ({
    id: n.data.id,
    label: n.data.label || n.data.id,
    type: n.data.type,
    risk: n.data.risk_score || 0,
    x: width / 2 + Math.cos((idx / subset.nodes.length) * 2 * Math.PI) * (Math.min(width, height) / 2 - 60) + (Math.random() - 0.5) * 30,
    y: height / 2 + Math.sin((idx / subset.nodes.length) * 2 * Math.PI) * (Math.min(width, height) / 2 - 60) + (Math.random() - 0.5) * 30,
  }));
  const nodeIndex = Object.fromEntries(nodes.map((n) => [n.id, n]));
  const edges = subset.edges
    .map((e) => ({ source: nodeIndex[e.data.source], target: nodeIndex[e.data.target] }))
    .filter((e) => e.source && e.target);

  // simple repulsion + spring relaxation, a handful of iterations is enough for a readable static layout
  for (let iter = 0; iter < 140; iter++) {
    for (let i = 0; i < nodes.length; i++) {
      let fx = 0, fy = 0;
      for (let j = 0; j < nodes.length; j++) {
        if (i === j) continue;
        const dx = nodes[i].x - nodes[j].x;
        const dy = nodes[i].y - nodes[j].y;
        const distSq = Math.max(dx * dx + dy * dy, 60);
        const force = 1400 / distSq;
        fx += (dx / Math.sqrt(distSq)) * force;
        fy += (dy / Math.sqrt(distSq)) * force;
      }
      nodes[i]._fx = fx; nodes[i]._fy = fy;
    }
    edges.forEach((e) => {
      const dx = e.target.x - e.source.x;
      const dy = e.target.y - e.source.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const targetDist = 110;
      const k = (dist - targetDist) * 0.02;
      e.source._fx += (dx / dist) * k; e.source._fy += (dy / dist) * k;
      e.target._fx -= (dx / dist) * k; e.target._fy -= (dy / dist) * k;
    });
    nodes.forEach((n) => {
      n.x += Math.max(-4, Math.min(4, n._fx));
      n.y += Math.max(-4, Math.min(4, n._fy));
      n.x = Math.max(46, Math.min(width - 46, n.x));
      n.y = Math.max(46, Math.min(height - 46, n.y));
    });
  }

  const svgEdges = edges.map((e) =>
    `<line x1="${e.source.x}" y1="${e.source.y}" x2="${e.target.x}" y2="${e.target.y}" stroke="rgba(255,255,255,0.08)" stroke-width="1" />`
  ).join("");

  // Only label users and segments (and the very highest-risk IPs) so text doesn't overlap into noise.
  const svgNodes = nodes.map((n) => {
    const r = n.type === "segment" ? 12 : n.type === "user" ? 8 : 5;
    const color = n.type === "segment" ? "#22D3EE" : riskColor(n.risk);
    const showLabel = n.type === "segment" || n.type === "user" || n.risk >= 70;
    const label = n.label.length > 13 ? n.label.slice(0, 12) + "…" : n.label;
    return `
      <g>
        <circle cx="${n.x}" cy="${n.y}" r="${r}" fill="${color}" fill-opacity="0.88" stroke="${color}" stroke-width="1.5">
          <title>${escapeHtml(n.label)} (${escapeHtml(n.type)}, risk ${Math.round(n.risk)})</title>
        </circle>
        ${showLabel ? `<text x="${n.x}" y="${n.y + r + 11}" fill="#8A96A6" font-size="9" font-family="IBM Plex Mono, monospace" text-anchor="middle">${escapeHtml(label)}</text>` : ""}
      </g>
    `;
  }).join("");

  container.innerHTML = `<svg width="100%" height="100%" viewBox="0 0 ${width} ${height}">${svgEdges}${svgNodes}</svg>`;
}

/* ── Export (client-side text report, no backend round trip needed) ── */
function exportIncidentReport(incident) {
  const lines = [
    `CYBER CONTROL TOWER — INCIDENT REPORT`,
    `Generated: ${new Date().toLocaleString()}`,
    `Generated by: ${currentUser.display_name} (${currentUser.role_label})`,
    ``,
    `Incident ID:      ${incident.incident_id}`,
    `Status:           ${incident.status}`,
    `Severity:         ${incident.severity}`,
    `Risk score:       ${incident.risk_score} (${riskLabel(incident.risk_score)})`,
    `Attack type:      ${incident.attack_type}`,
    `User:             ${incident.user}`,
    `Network segment:  ${incident.network_segment}`,
    `Source IP:        ${incident.source_ip}`,
    `Destination IP:   ${incident.dst_ip}`,
    `Action taken:     ${incident.action_taken}`,
    `Event count:      ${incident.event_count}`,
    `MTTD:             ${fmtMinutes(incident.mttd_minutes)}`,
    `MTTR:             ${fmtMinutes(incident.mttr_minutes)}`,
    `Correlation:      ${incident.correlation_reason}`,
    `Attack chain:     ${(incident.attack_chain || []).join(" -> ")}`,
    `MITRE techniques: ${(incident.mitre_techniques || []).map((t) => `${t.technique_id} ${t.technique_name}`).join(", ")}`,
  ];
  const blob = new Blob([lines.join("\n")], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${incident.incident_id}-report.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ── Event binding ── */
function bindEvents() {
  document.querySelectorAll("[data-nav]").forEach((btn) => {
    btn.addEventListener("click", () => {
      const key = btn.dataset.nav;
      if (btn.dataset.locked) {
        showError(`${pageMeta[key]?.title || "This view"} requires the SOC Manager role.`);
        return;
      }
      transientError = "";
      notice = "";
      activePage = key;
      render();
    });
  });

  const logoutBtn = document.querySelector("[data-logout]");
  if (logoutBtn) logoutBtn.addEventListener("click", handleLogout);

  const refreshBtn = document.querySelector("[data-refresh]");
  if (refreshBtn) {
    refreshBtn.addEventListener("click", () => {
      incidentsLoaded = false;
      incidentsError = "";
      summary = null;
      graphData = null;
      mitreHeatmap = null;
      trustBoard = null;
      metricsReport = null;
      auditLog = null;
      render();
    });
  }

  const retryBtn = document.querySelector("[data-retry-incidents]");
  if (retryBtn) retryBtn.addEventListener("click", () => { incidentsError = ""; loadIncidents(); });

  document.querySelectorAll("[data-select-incident]").forEach((btn) => {
    btn.addEventListener("click", () => {
      selectedId = btn.dataset.selectIncident;
      render();
    });
  });

  const searchInput = document.getElementById("searchInput");
  if (searchInput) {
    searchInput.addEventListener("input", debounce((e) => {
      query = e.target.value;
      render();
    }, 180));
  }

  const sevFilter = document.getElementById("severityFilter");
  if (sevFilter) {
    sevFilter.addEventListener("change", (e) => {
      severityFilter = e.target.value;
      render();
    });
  }

  document.querySelectorAll("[data-status-select]").forEach((select) => {
    select.addEventListener("change", (e) => {
      changeIncidentStatus(select.dataset.statusSelect, e.target.value);
    });
  });

  document.querySelectorAll("[data-quick-status]").forEach((btn) => {
    btn.addEventListener("click", () => {
      const [id, status] = btn.dataset.quickStatus.split("|");
      changeIncidentStatus(id, status);
    });
  });

  document.querySelectorAll("[data-export-incident]").forEach((btn) => {
    btn.addEventListener("click", () => {
      const incident = incidents.find((i) => i.incident_id === btn.dataset.exportIncident);
      if (incident) {
        exportIncidentReport(incident);
        notice = `Exported report for ${incident.incident_id}.`;
        render();
      }
    });
  });

  document.querySelectorAll("[data-trust-user]").forEach((row) => {
    row.addEventListener("click", () => {
      query = row.dataset.trustUser;
      activePage = "triage";
      render();
    });
  });

  const huntInput = document.getElementById("huntInput");
  const runHuntBtn = document.querySelector("[data-run-hunt]");
  if (huntInput) {
    huntInput.addEventListener("input", (e) => { huntQuery = e.target.value; });
    huntInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") runHunt(huntInput.value);
    });
  }
  if (runHuntBtn) runHuntBtn.addEventListener("click", () => runHunt(huntInput ? huntInput.value : huntQuery));

  document.querySelectorAll("[data-hunt-chip]").forEach((chip) => {
    chip.addEventListener("click", () => runHunt(chip.dataset.huntChip));
  });

  const graphToggle = document.querySelector("[data-graph-toggle]");
  if (graphToggle) {
    graphToggle.addEventListener("click", () => {
      graphFocusMode = !graphFocusMode;
      render();
    });
  }

  if (activePage === "twin" && graphData && !graphData.error) {
    requestAnimationFrame(drawGraph);
  }
}

/* ── Boot ── */
window.addEventListener("resize", debounce(() => {
  if (activePage === "twin" && graphData && !graphData.error) drawGraph();
}, 200));

bootstrap();







</script>
</body>
</html>
