<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Cyber Control Tower</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="page-outer">

  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <span class="brand-mark">⛭</span>
        <span class="login-brand-text">CYBER CONTROL TOWER</span>
      </div>
      <p class="login-sub">Sign in to access the SOC console.</p>

      <form id="login-form" autocomplete="off">
        <label class="login-label" for="username">Username</label>
        <input class="toolbar-input login-input" id="username" name="username" type="text" placeholder="analyst" required />

        <label class="login-label" for="password">Password</label>
        <input class="toolbar-input login-input" id="password" name="password" type="password" placeholder="••••••••" required />

        <div class="login-error" id="login-error" style="display:none;"></div>

        <button type="submit" class="btn-primary login-submit" id="login-submit">Sign In →</button>
      </form>

      <div class="login-demo-box">
        <div class="login-demo-title">Demo accounts</div>
        <div class="login-demo-row">
          <span>Security Analyst</span>
          <code>analyst / analyst123</code>
          <button class="page-btn" data-fill-user="analyst" data-fill-pass="analyst123">Use</button>
        </div>
        <div class="login-demo-row">
          <span>SOC Manager</span>
          <code>manager / manager123</code>
          <button class="page-btn" data-fill-user="manager" data-fill-pass="manager123">Use</button>
        </div>
      </div>

      <a href="/" class="login-back">← Back to overview</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('login-error');
    const submitBtn = document.getElementById('login-submit');

    document.querySelectorAll('[data-fill-user]').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.getElementById('username').value = btn.dataset.fillUser;
        document.getElementById('password').value = btn.dataset.fillPass;
      });
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in…';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Login failed');
        }

        window.location.href = '/console';
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In →';
      }
    });
  </script>
</body>
</html>
