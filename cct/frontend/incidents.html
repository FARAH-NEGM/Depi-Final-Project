<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incidents — Cyber Control Tower</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="page-outer">

  <div id="site-nav"></div>

  <main class="incidents-page">
    <div class="incidents-head">
      <div>
        <h1>Incidents</h1>
        <p>Every correlated incident, MITRE-mapped, with detection &amp; response timing.</p>
      </div>
    </div>

    <div class="incidents-toolbar">
      <input type="text" class="toolbar-input" id="search-input" placeholder="Search by user, IP, or attack type…" />
      <select class="toolbar-select" id="filter-severity">
        <option value="">All Severities</option>
        <option value="Critical">Critical</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>
      <select class="toolbar-select" id="filter-attack">
        <option value="">All Attack Types</option>
      </select>
      <select class="toolbar-select" id="filter-action">
        <option value="">All Actions</option>
        <option value="Blocked">Blocked</option>
        <option value="Quarantined">Quarantined</option>
        <option value="Logged">Logged</option>
        <option value="Ignored">Ignored</option>
      </select>
      <span class="toolbar-count" id="result-count">— results</span>
    </div>

    <div class="incidents-table-wrap">
      <table class="incidents-table" id="incidents-table">
        <thead>
          <tr>
            <th data-sort="occurred_at">Occurred <span class="sort-arrow">▾</span></th>
            <th data-sort="incident_id">Incident ID <span class="sort-arrow">▾</span></th>
            <th data-sort="user">User <span class="sort-arrow">▾</span></th>
            <th data-sort="attack_type">Attack Type <span class="sort-arrow">▾</span></th>
            <th data-sort="severity">Severity <span class="sort-arrow">▾</span></th>
            <th data-sort="network_segment">Segment <span class="sort-arrow">▾</span></th>
            <th data-sort="action_taken">Action <span class="sort-arrow">▾</span></th>
            <th data-sort="mttd_minutes">MTTD <span class="sort-arrow">▾</span></th>
            <th data-sort="mttr_minutes">MTTR <span class="sort-arrow">▾</span></th>
          </tr>
        </thead>
        <tbody id="incidents-tbody">
          <!-- rows or skeleton/empty state rendered by JS -->
        </tbody>
      </table>
      <div class="incidents-pagination" id="pagination">
        <span id="page-info">—</span>
        <div>
          <button class="page-btn" id="prev-page">← Prev</button>
          <button class="page-btn" id="next-page">Next →</button>
        </div>
      </div>
    </div>
  </main>

  <!-- ============ DETAIL DRAWER (reuses the same component as the dashboard) ============ -->
  <div class="drawer-backdrop" id="drawer-backdrop"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-head">
      <span id="drawer-title">Details</span>
      <button id="drawer-close" aria-label="Close">×</button>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
  </aside>

  <script src="/js/nav.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/util.js"></script>
  <script src="/js/incidents-page.js"></script>
</body>
</html>
